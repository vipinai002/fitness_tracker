html[data-theme="dark"]{color-scheme:dark}
html[data-theme="light"]{color-scheme:light;--bg:#f0f4f8;--surface:#ffffff;--surface2:#f1f5f9;--surface3:#e2e8f0;--line:#cbd5e1;--text:#0f172a;--muted:#64748b;--accent-soft:rgba(120,226,63,.18);--warn:#b45309;--danger:#dc2626;--blue:#1d6dce;--purple:#7c3aed;--shadow:0 4px 16px rgba(0,0,0,.1);--input-bg:#f8fafc;--track:#e2e8f0;--modal-bg:#ffffff;--topbar-bg:rgba(241,245,249,.95);--border-subtle:#94a3b8;--switch-off:#cbd5e1;--modal-head-bg:rgba(255,255,255,.97);--sidebar-bg:#f8fafc;--bottom-nav-bg:rgba(248,250,252,.97);--bottom-nav-border:#e2e8f0;--drop-border:#a1aab5;--card-grad-a:rgba(248,250,252,.99);--card-grad-b:rgba(255,255,255,.99)}
/* ── apply tokens to hardcoded element colours ─── */
.input,.select,.textarea{background:var(--input-bg)}
.mini-input,.set-input{background:var(--input-bg)}
.macro-chip{background:var(--input-bg)}
.progress{background:var(--track)}
.ring{background:conic-gradient(var(--accent) calc(var(--p)*1%),var(--track) 0)}
.drop{background:var(--track);border-color:var(--drop-border)}
.check-row button,.auto-check .status-dot{border-color:var(--border-subtle)}
.exercise-check,.set-check{border-color:var(--border-subtle)}
.modal{background:var(--modal-bg)}
.modal-head{background:var(--modal-head-bg)}
.topbar{background:var(--topbar-bg)}
.bottom-nav{background:var(--bottom-nav-bg);border-color:var(--bottom-nav-border)}
.file-drop{border-color:var(--border-subtle)}
.switch{background:var(--switch-off)}
.sidebar{background:var(--sidebar-bg)}
.card{background:linear-gradient(145deg,var(--card-grad-a),var(--card-grad-b))}
/* ── light-mode only tweaks ─────────────────── */
html[data-theme="light"] .notice{color:#7c5000}
html[data-theme="light"] .bottom-nav{box-shadow:0 8px 24px rgba(0,0,0,.15)}
html[data-theme="light"] .exercise-block,html[data-theme="light"] .food-item,html[data-theme="light"] .plan-meal,html[data-theme="light"] .exercise-row{border-bottom-color:var(--line)}
html[data-theme="light"] .check-row{background:rgba(0,0,0,.02);border-color:rgba(0,0,0,.07)}
html[data-theme="light"] .toggle{border-bottom-color:var(--line)}
/* ── more-actions button style ─── */
.more-actions-btn{border-style:dashed;opacity:.85}

function round(n,d=0){const p=10**d;return Math.round((Number(n)||0)*p)/p}

function calcTargets(){const p=state.profile;const bmr=10*p.weight+6.25*p.height-5*p.age+(p.sex==='male'?5:-161);const tdee=bmr*Number(p.activity);let calories=tdee;if(p.goal==='fat_loss')calories-=clamp((Number(p.rate)||.5)*7700/7,300,900);if(p.goal==='muscle_gain')calories+=250;if(p.adaptive===false)return {bmr:round(bmr),tdee:round(tdee),calories:Number(p.manualCalories),protein:Number(p.manualProtein),carbs:Number(p.manualCarbs),fat:Number(p.manualFat),fiber:Number(p.fiberGoal)};const min=p.sex==='male'?1500:1200;calories=Math.max(min,Math.round(calories/10)*10);let protein=Math.round(p.weight*Number(p.proteinPerKg));if(p.goal==='muscle_gain')protein=Math.max(protein,Math.round(p.weight*1.8));let fat=Math.round(Math.max(p.weight*.7,(calories*.25)/9));let carbs=Math.max(0,Math.round((calories-protein*4-fat*9)/4));return {bmr:round(bmr),tdee:round(tdee),calories,protein,carbs,fat,fiber:Number(p.fiberGoal)||30}}
function allFoods(){return [...BASE_FOODS,...state.customFoods]}
function allRecipes(){return [...BASE_RECIPES,...state.customRecipes]}
function foodById(id){return allFoods().find(f=>f.id===id)}
function exById(id){return EXERCISES.find(e=>e.id===id)||{id,name:id,group:'Custom',sets:3,reps:'8–12',rest:'90 sec',cue:''}}
function macroForFood(food,grams){const x=grams/100;return {kcal:food.kcal*x,protein:food.protein*x,carbs:food.carbs*x,fat:food.fat*x,fiber:food.fiber*x}}
function totalsForDay(date=state.selectedDate){const d=dayData(date);const t={kcal:0,protein:0,carbs:0,fat:0,fiber:0};MEALS.forEach(m=>d.meals[m].forEach(i=>{Object.keys(t).forEach(k=>t[k]+=Number(i[k])||0)}));return Object.fromEntries(Object.entries(t).map(([k,v])=>[k,round(v,1)]))}
function pct(v,t){return clamp(Math.round((Number(v)||0)/(Number(t)||1)*100),0,100)}
function fmt(n,d=0){return Number(n||0).toLocaleString(undefined,{maximumFractionDigits:d})}
function goalLabel(g=state.profile.goal){return ({fat_loss:'Fat loss',muscle_gain:'Muscle gain',maintenance:'Maintenance'})[g]||g}
function dietAllowed(diet){const p=state.profile.diet;if(p==='mixed')return true;if(p==='vegetarian')return diet==='veg';if(p==='eggetarian')return diet==='veg'||diet==='egg';return true}
function icon(name){const paths={dashboard:'<path d="M3 11.5 12 4l9 7.5v8a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/>',diary:'<path d="M5 3h14v18H5z"/><path d="M8 7h8M8 11h8M8 15h5"/>',workout:'<path d="M4 9v6M7 7v10M17 7v10M20 9v6M7 12h10"/>',foods:'<path d="M7 3v8M4 3v5a3 3 0 0 0 6 0V3M7 11v10M16 3v18M16 3c4 2 4 8 0 10"/>',more:'<circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/>',recipes:'<path d="M6 4h12v16H6zM9 8h6M9 12h6M9 16h4"/>',plans:'<path d="M4 5h16v14H4zM8 3v4M16 3v4M4 9h16"/>',progress:'<path d="M4 19V9M10 19V5M16 19v-7M22 19V3"/>',water:'<path d="M12 3s6 7 6 12a6 6 0 0 1-12 0c0-5 6-12 6-12z"/>',settings:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2.8 2.8-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2h-4V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1L4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9A1.7 1.7 0 0 0 3 14H2.8v-4H3a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9L4.2 7 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3A1.7 1.7 0 0 0 10 3V2.8h4V3a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1L19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.2v4H21a1.7 1.7 0 0 0-1.6 1z"/>'};return `<svg viewBox="0 0 24 24" aria-hidden="true">${paths[name]||paths.more}</svg>`}
function renderNav(){const bottom=[{id:'dashboard',label:'Home'},{id:'diary',label:'Diary'},{id:'workout',label:'Workout'},{id:'foods',label:'Foods'},{id:'more',label:'More'}];document.getElementById('bottomNav').innerHTML=bottom.map(n=>`<button class="nav-btn ${state.activePage===n.id||(n.id==='more'&&!bottom.some(x=>x.id===state.activePage))?'active':''}" data-nav="${n.id}">${icon(n.id)}<span>${n.label}</span></button>`).join('');document.getElementById('sideNav').innerHTML=MAIN_NAV.map(n=>`<button class="side-btn ${state.activePage===n.id?'active':''}" data-nav="${n.id}">${n.label}</button>`).join('')}
function pageHead(title,subtitle,action=''){return `<div class="page-head"><div><h1>${title}</h1><p>${subtitle}</p></div>${action}</div>`}
function metricCard(label,value,target,unit){return `<div class="card metric-card"><div class="metric-label">${label}</div><div class="metric-value">${fmt(value,1)} <span>/ ${fmt(target,1)} ${unit}</span></div><div class="progress"><i style="width:${pct(value,target)}%"></i></div></div>`}
function render(){document.documentElement.style.setProperty('--accent',state.profile.accent||'#78e23f');document.getElementById('globalDate').value=state.selectedDate;document.getElementById('headerSubtitle').textContent=`${goalLabel()} · ${state.profile.diet}`;const t=calcTargets();document.getElementById('sideTarget').textContent=`${fmt(t.calories)} kcal`;document.getElementById('sideGoal').textContent=goalLabel();renderNav();const main=document.getElementById('main');const fn={dashboard:renderDashboard,diary:renderDiary,workout:renderWorkout,foods:renderFoods,recipes:renderRecipes,plans:renderPlans,progress:renderProgress,water:renderWater,settings:renderSettings}[state.activePage]||renderDashboard;main.innerHTML=`<section class="page active">${fn()}</section>`;if(state.activePage==='progress')requestAnimationFrame(drawChart);saveState()}
function renderDashboard(){const d=dayData(),t=calcTargets(),x=totalsForDay();const checks=[['workout','Workout completed'],['protein','Protein target'],['steps','10,000 steps'],['water','Water target'],['noSugar','No sugary drinks']];d.checklist.protein=x.protein>=t.protein;d.checklist.steps=d.steps>=state.profile.stepGoal;d.checklist.water=d.water>=state.profile.waterGoal;return `${pageHead(`Today, ${state.profile.name}`,`${new Date(state.selectedDate+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'})}`,`<button class="btn outline small" data-nav="settings">Edit goals</button>`)}
<div class="grid grid-lg-2"><div class="card hero-card"><div class="ring" style="--p:${pct(x.kcal,t.calories)}"><div class="ring-content"><b>${fmt(x.kcal)}</b><span>of ${fmt(t.calories)} kcal</span></div></div><div><div class="strong">Daily nutrition</div>${['protein','carbs','fat'].map(k=>`<div class="macro-row"><label>${k[0].toUpperCase()+k.slice(1)}</label><div class="progress"><i style="width:${pct(x[k],t[k])}%"></i></div><b>${fmt(x[k])}/${fmt(t[k])}g</b></div>`).join('')}<div class="tiny muted">Fiber ${fmt(x.fiber,1)} / ${fmt(t.fiber)} g</div></div></div>
<div class="grid grid-2">${metricCard('Steps',d.steps,state.profile.stepGoal,'steps')}${metricCard('Water',d.water/1000,state.profile.waterGoal/1000,'L')}${metricCard('Weight',latestWeight(),state.profile.goalWeight,'kg')}${metricCard('Sleep',d.sleep,state.profile.sleepGoal,'h')}</div></div>
<div class="section-title"><h2>Quick actions</h2></div><div class="quick-grid"><button class="quick-btn" data-choose-meal="1">Log food<small>Add meal or snack</small></button><button class="quick-btn" data-nav="workout">Log workout<small>Track sets and reps</small></button><button class="quick-btn" data-water="250">Add water<small>+250 ml</small></button><button class="quick-btn" data-measure="1">Body stats<small>Weight and waist</small></button></div>
<div class="grid grid-lg-2"><div><div class="section-title"><h2>Daily checklist</h2><small>${checks.filter(c=>d.checklist[c[0]]).length}/${checks.length}</small></div><div class="card card-pad check-list">${checks.map(c=>`<div class="check-row ${d.checklist[c[0]]?'done':''}"><span>${c[1]}</span><button data-check="${c[0]}">✓</button></div>`).join('')}</div></div><div><div class="section-title"><h2>Today’s plan</h2><button class="btn small outline" data-nav="plans">Full plan</button></div><div class="card card-pad">${todayPlanPreview()}</div></div></div>

function todayPlanPreview(){const wd=new Date(state.selectedDate+'T12:00:00').getDay();const plan=state.workoutPlan.find(x=>x.day===wd);const meals=adaptiveMealDay()[wd===0?6:wd-1];return `<div class="strong accent">${plan?.name||'Rest day'}</div><div class="tiny muted" style="margin:5px 0 12px">${plan?.type||'Recovery'}</div>${(plan?.exercises||[]).slice(0,4).map(id=>`<div class="check-row"><span>${exById(id).name}</span><span class="tiny muted">${exById(id).sets} × ${exById(id).reps}</span></div>`).join('')||'<div class="muted tiny">Recovery walk and mobility.</div>'}<div class="divider"></div><div class="tiny muted">Meal focus</div><div class="strong" style="margin-top:5px">${meals?.Lunch||'Balanced protein meal'}</div>`}
function renderDiary(){const d=dayData(),t=calcTargets(),x=totalsForDay();return `${pageHead('Food diary','Track meals, portions and macros',`<button class="btn primary small" data-custom-food="1">New food</button>`)}<div class="summary-strip">${[['Calories',x.kcal,t.calories,'kcal'],['Protein',x.protein,t.protein,'g'],['Carbs',x.carbs,t.carbs,'g'],['Fat',x.fat,t.fat,'g'],['Fiber',x.fiber,t.fiber,'g']].map(a=>`<div class="summary-item"><span>${a[0]}</span><b>${fmt(a[1],1)}</b><small class="muted">/ ${fmt(a[2])}${a[3]}</small></div>`).join('')}</div><div class="stack" style="margin-top:14px">${MEALS.map(m=>renderMeal(m,d.meals[m])).join('')}</div><div class="section-title"><h2>Daily inputs</h2></div><div class="card card-pad form-grid"><div class="field"><label>Steps</label><input class="input" type="number" id="stepsInput" value="${d.steps||''}" placeholder="10000"></div><div class="field"><label>Sleep hours</label><input class="input" type="number" step="0.1" id="sleepInput" value="${d.sleep||''}" placeholder="8"></div></div>`}
function renderMeal(meal,items){const total=items.reduce((s,i)=>s+(i.kcal||0),0);return `<div class="card meal-card"><div class="meal-head"><div class="meal-title"><span class="meal-dot"></span><div><div class="strong">${meal}</div><div class="meal-total">${fmt(total)} kcal</div></div></div><button class="btn primary small" data-add-food="${meal}">Add</button></div>${items.length?items.map((i,idx)=>`<div class="food-item"><div><h3>${escapeHtml(i.name)}</h3><p>${fmt(i.grams||i.serving||0)} ${i.unit||'g'} · ${fmt(i.kcal)} kcal · P ${fmt(i.protein,1)}g · C ${fmt(i.carbs,1)}g · F ${fmt(i.fat,1)}g</p></div><div class="item-actions"><button class="btn small outline" data-edit-item="${meal}|${idx}">Edit</button><button class="btn small danger-btn" data-remove-item="${meal}|${idx}">×</button></div></div>`).join(''):`<div class="empty">Nothing logged yet.</div>`}</div>`}
function renderFoods(){const cats=['All',...new Set(allFoods().map(f=>f.category))];return `${pageHead('Food database','Indian-focused macro calculator and custom foods',`<button class="btn primary small" data-custom-food="1">Add food</button>`)}<div class="searchbar"><div class="search-row"><input class="input" id="foodSearch" placeholder="Search rice, dal, chicken, paneer..."><select class="select" id="foodCategory" style="max-width:135px">${cats.map(c=>`<option>${c}</option>`).join('')}</select></div><div class="tabs" style="margin-top:8px"><button class="tab active" data-food-diet="all">All</button><button class="tab" data-food-diet="veg">Veg</button><button class="tab" data-food-diet="egg">Egg</button><button class="tab" data-food-diet="nonveg">Non-veg</button></div></div><div class="notice">Values are reference estimates per 100 g. Raw-food data and branded foods vary; composite Indian dishes vary with recipe and oil. Use package labels or your own recipe for precision.</div><div class="food-list" id="foodList" style="margin-top:12px">${foodCards(allFoods().slice(0,40))}</div>`}
function foodCards(arr){return arr.map(f=>`<div class="card food-card"><div class="food-card-top"><div><h3>${escapeHtml(f.name)}</h3><p>${f.category} · default ${f.servingG} g</p></div><span class="pill ${f.diet==='veg'?'good':''}">${f.diet==='nonveg'?'Non-veg':f.diet==='egg'?'Egg':'Veg'}</span></div><div class="macro-chips"><span class="macro-chip">${fmt(f.kcal)} kcal</span><span class="macro-chip">P ${fmt(f.protein,1)}g</span><span class="macro-chip">C ${fmt(f.carbs,1)}g</span><span class="macro-chip">F ${fmt(f.fat,1)}g</span><span class="macro-chip">Fiber ${fmt(f.fiber,1)}g</span></div><div class="source-line">${escapeHtml(f.source||'Custom')} · per 100 g</div><div class="recipe-actions"><button class="btn small primary" data-calc-food="${f.id}">Calculate</button><button class="btn small outline" data-direct-add="${f.id}">Add to diary</button>${f.custom?`<button class="btn small danger-btn" data-delete-food="${f.id}">Delete</button>`:''}</div></div>`).join('')||'<div class="empty card">No matching foods.</div>'}
function renderRecipes(){return `${pageHead('Recipes','Goal-aware vegetarian, egg and non-vegetarian meals',`<button class="btn primary small" data-custom-recipe="1">New recipe</button>`)}<div class="searchbar"><div class="search-row"><input class="input" id="recipeSearch" placeholder="Search recipes..."><select class="select" id="recipeDiet" style="max-width:140px"><option value="all">All diets</option><option value="veg">Vegetarian</option><option value="egg">Egg</option><option value="nonveg">Non-veg</option></select></div></div><div class="recipe-list" id="recipeList">${recipeCards(allRecipes())}</div>`}
function recipeCards(arr){return arr.map(r=>`<div class="card recipe-card"><div class="food-card-top"><div><h3>${escapeHtml(r.name)}</h3><p>${r.meal} · ${r.time||15} min · ${r.servings||1} serving</p></div><span class="pill ${r.diet==='veg'?'good':''}">${r.diet==='nonveg'?'Non-veg':r.diet==='egg'?'Egg':'Veg'}</span></div><div class="macro-chips"><span class="macro-chip">${fmt(r.macros.kcal)} kcal</span><span class="macro-chip">P ${fmt(r.macros.protein)}g</span><span class="macro-chip">C ${fmt(r.macros.carbs)}g</span><span class="macro-chip">F ${fmt(r.macros.fat)}g</span><span class="macro-chip">Fiber ${fmt(r.macros.fiber)}g</span></div><div class="source-line">${escapeHtml(r.source||'Custom recipe calculation')}</div><div class="recipe-actions"><button class="btn small outline" data-view-recipe="${r.id}">View</button><button class="btn small primary" data-add-recipe="${r.id}">Add to diary</button>${r.custom?`<button class="btn small danger-btn" data-delete-recipe="${r.id}">Delete</button>`:''}</div></div>`).join('')||'<div class="empty card">No matching recipes.</div>'}
function workoutForDate(){const wd=new Date(state.selectedDate+'T12:00:00').getDay();return state.workoutPlan.find(x=>x.day===wd)||{day:wd,name:'Custom day',type:'Rest',exercises:[]}}
function renderWorkout(){const p=workoutForDate(),d=dayData(),days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];return `${pageHead('Workout','Research-aligned training with editable plans',`<button class="btn outline small" data-edit-workout="1">Edit day</button>`)}<div class="tabs">${days.map((x,i)=>{const plan=state.workoutPlan.find(p=>p.day===i);return `<button class="tab ${p.day===i?'active':''}" data-workout-day="${i}">${x} · ${plan?.name||'Rest'}</button>`}).join('')}</div><div class="card exercise-card" style="margin-top:12px"><div class="food-card-top"><div><h3>${p.name}</h3><p>${p.type} · ${p.exercises.length} activities</p></div><span class="pill good">ACSM 2026 aligned</span></div><div style="margin-top:10px">${p.exercises.map(id=>renderExercise(exById(id),d)).join('')||'<div class="empty">Rest, gentle walking and mobility as comfortable.</div>'}</div><button class="btn ${d.workout.completed?'outline':'primary'} wide" style="margin-top:14px" data-finish-workout="1">${d.workout.completed?'Workout completed · tap to undo':'Finish workout'}</button></div><div class="section-title"><h2>Programming guidance</h2></div><div class="card card-pad"><div class="notice">Train all major muscle groups at least twice weekly. Consistency matters more than complex techniques. For general strength, heavier loads and 2–3 sets can be effective; for muscle growth, weekly volume near 10 sets per muscle group is a useful target. Failure training is optional, not mandatory.</div><div class="tiny muted" style="margin-top:10px">Source: American College of Sports Medicine, 2026 resistance-training position stand.</div></div>`}
function renderExercise(e,d){const log=d.workout.logs[e.id]||{};return `<div class="exercise-row ${log.done?'done':''}"><button class="exercise-check" data-ex-check="${e.id}">✓</button><div class="exercise-main"><h3>${e.name}</h3><p>${e.sets} sets · ${e.reps} · rest ${e.rest}</p><p>${e.cue}</p></div><div class="exercise-log"><input class="mini-input" data-ex-weight="${e.id}" type="number" placeholder="kg" value="${log.weight||''}"><input class="mini-input" data-ex-reps="${e.id}" type="text" placeholder="reps" value="${log.reps||''}"></div></div>`}
function adaptiveMealDay(){const veg=['High-protein banana oats','Low-fat paneer bhurji bowl','Chana protein salad','Tofu vegetable stir-fry','Moong chilla with paneer filling','Balanced rajma rice bowl','Dal and paneer mini thali'];const egg=['Egg and vegetable omelette','Sprout and egg chaat','Light egg curry with rice'];const non=['Grilled chicken rice bowl','Fish, roti and vegetable plate','Tandoori chicken whole-wheat wrap','Chicken vegetable soup meal','Fish quinoa bowl'];let pool=[...veg];if(state.profile.diet==='eggetarian'||state.profile.diet==='mixed')pool.push(...egg);if(state.profile.diet==='mixed')pool.push(...non);const days=[];for(let i=0;i<7;i++){const offset=i*3;days.push({Breakfast:pool[offset%pool.length],Lunch:pool[(offset+1)%pool.length],Snacks:pool[(offset+2)%pool.length],Dinner:pool[(offset+3)%pool.length]})}return days}
function renderPlans(){const t=calcTargets(),days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'],plan=adaptiveMealDay();return `${pageHead('Adaptive plans',`Plans update with your ${goalLabel().toLowerCase()} goal and ${state.profile.diet} preference`,`<button class="btn outline small" data-nav="settings">Change goal</button>`)}<div class="grid grid-2 grid-lg-4">${metricCard('Calories',t.calories,t.tdee,'kcal')}${metricCard('Protein',t.protein,t.protein,'g')}${metricCard('Expected rate',state.profile.goal==='fat_loss'?state.profile.rate:0,state.profile.rate,'kg/wk')}${metricCard('Training',state.profile.workoutDays,4,'days')}</div><div class="section-title"><h2>Weekly meal plan</h2><small>Serving sizes should be adjusted to targets</small></div><div class="grid grid-lg-2">${days.map((day,i)=>`<div class="card plan-day"><div class="food-card-top"><div><h3>${day}</h3><p>${goalLabel()} · ${state.profile.diet}</p></div><button class="btn small primary" data-apply-plan="${i}">Add day</button></div>${MEALS.map(m=>`<div class="plan-meal"><span>${m}</span><b>${plan[i][m]}</b><button class="btn small outline" data-find-recipe="${encodeURIComponent(plan[i][m])}">View</button></div>`).join('')}</div>`).join('')}</div><div class="section-title"><h2>Weekly workout structure</h2></div><div class="card card-pad">${state.workoutPlan.sort((a,b)=>(a.day||7)-(b.day||7)).map(p=>`<div class="check-row"><div><div class="strong">${['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][p.day]} · ${p.name}</div><div class="tiny muted">${p.exercises.length?p.exercises.map(id=>exById(id).name).slice(0,3).join(', '):'Recovery'}</div></div><span class="pill">${p.type}</span></div>`).join('')}</div>`}
function latestWeight(){return [...state.measurements].sort((a,b)=>a.date.localeCompare(b.date)).at(-1)?.weight||state.profile.weight}
function renderProgress(){const ms=[...state.measurements].sort((a,b)=>a.date.localeCompare(b.date));const latest=ms.at(-1)||{},first=ms[0]||{};const week=weeklySummary();return `${pageHead('Progress','Weight, waist, adherence and weekly report',`<button class="btn primary small" data-measure="1">Add measurement</button>`)}<div class="stats-grid grid-lg-4"><div class="stat-box"><span>Current weight</span><b>${fmt(latest.weight,1)} kg</b></div><div class="stat-box"><span>Total change</span><b class="${latest.weight<=first.weight?'accent':''}">${fmt((latest.weight||0)-(first.weight||0),1)} kg</b></div><div class="stat-box"><span>Current waist</span><b>${fmt(latest.waist,1)} cm</b></div><div class="stat-box"><span>Goal weight</span><b>${fmt(state.profile.goalWeight,1)} kg</b></div></div><div class="section-title"><h2>Trend</h2><select class="select" id="chartMetric" aria-label="Chart metric" style="width:auto"><option value="weight">Weight</option><option value="waist">Waist</option><option value="bodyFat">Body fat</option></select></div><div class="card chart-card"><div class="chart-wrap"><canvas id="progressChart"></canvas></div></div><div class="section-title"><h2>Last 7 days</h2></div><div class="grid grid-2 grid-lg-4">${metricCard('Avg calories',week.avgCalories,calcTargets().calories,'kcal')}${metricCard('Avg protein',week.avgProtein,calcTargets().protein,'g')}${metricCard('Steps',week.avgSteps,state.profile.stepGoal,'avg')}${metricCard('Workouts',week.workouts,state.profile.workoutDays,'done')}</div><div class="section-title"><h2>Measurement history</h2></div><div class="card card-pad">${ms.slice().reverse().map((m,i)=>`<div class="history-row"><span class="tiny muted">${m.date}</span><div><b>${fmt(m.weight,1)} kg</b><div class="tiny muted">Waist ${fmt(m.waist,1)} cm · Body fat ${fmt(m.bodyFat,1)}%</div></div><button class="btn small danger-btn" data-delete-measure="${state.measurements.indexOf(m)}">×</button></div>`).join('')}</div>`}
function weeklySummary(){let sumC=0,sumP=0,sumS=0,n=0,w=0;for(let i=0;i<7;i++){const dte=new Date(state.selectedDate+'T12:00:00');dte.setDate(dte.getDate()-i);const key=localDate(dte);const day=state.diary[key];if(day){const t=totalsForDay(key);sumC+=t.kcal;sumP+=t.protein;sumS+=day.steps||0;w+=day.workout?.completed?1:0;n++}}return {avgCalories:n?round(sumC/n):0,avgProtein:n?round(sumP/n):0,avgSteps:n?round(sumS/n):0,workouts:w}}
function drawChart(){const canvas=document.getElementById('progressChart');if(!canvas)return;const metric=document.getElementById('chartMetric')?.value||'weight';const arr=[...state.measurements].filter(x=>Number(x[metric])).sort((a,b)=>a.date.localeCompare(b.date));const rect=canvas.getBoundingClientRect(),dpr=window.devicePixelRatio||1;canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);const w=rect.width,h=rect.height,pad={l:42,r:14,t:20,b:34};ctx.clearRect(0,0,w,h);if(arr.length<1){ctx.fillStyle='#98a3b3';ctx.fillText('Add measurements to see a chart',20,40);return}const vals=arr.map(x=>Number(x[metric]));let min=Math.min(...vals),max=Math.max(...vals);if(min===max){min-=1;max+=1}else{const r=max-min;min-=r*.2;max+=r*.2}ctx.strokeStyle='#263140';ctx.lineWidth=1;ctx.fillStyle='#98a3b3';ctx.font='11px system-ui';for(let i=0;i<5;i++){const y=pad.t+(h-pad.t-pad.b)*i/4;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();const v=max-(max-min)*i/4;ctx.fillText(v.toFixed(1),4,y+4)}const accent=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#78e23f';ctx.strokeStyle=accent;ctx.lineWidth=3;ctx.beginPath();arr.forEach((x,i)=>{const px=pad.l+(w-pad.l-pad.r)*(arr.length===1?.5:i/(arr.length-1));const py=pad.t+(h-pad.t-pad.b)*(1-(Number(x[metric])-min)/(max-min));if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py)});ctx.stroke();arr.forEach((x,i)=>{const px=pad.l+(w-pad.l-pad.r)*(arr.length===1?.5:i/(arr.length-1));const py=pad.t+(h-pad.t-pad.b)*(1-(Number(x[metric])-min)/(max-min));ctx.fillStyle=accent;ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fill();if(i===0||i===arr.length-1){ctx.fillStyle='#98a3b3';ctx.fillText(x.date.slice(5),px-15,h-10)}})}
function renderWater(){const d=dayData(),goal=state.profile.waterGoal,count=8,filled=Math.round(pct(d.water,goal)/100*count);return `${pageHead('Water tracker','Build a consistent hydration habit',`<button class="btn outline small" data-nav="settings">Edit goal</button>`)}<div class="card water-hero"><div class="water-number">${fmt(d.water/1000,2)} <span>/ ${fmt(goal/1000,1)} L</span></div><div class="water-drops">${Array.from({length:count},(_,i)=>`<div class="drop ${i<filled?'filled':''}"></div>`).join('')}</div><div class="progress"><i style="width:${pct(d.water,goal)}%"></i></div><div class="water-actions" style="margin-top:18px"><button class="btn primary" data-water="250">+250 ml</button><button class="btn primary" data-water="500">+500 ml</button><button class="btn outline" data-water="-250">Undo 250</button></div></div><div class="section-title"><h2>Seven-day history</h2></div><div class="card card-pad">${Array.from({length:7},(_,i)=>{const dt=new Date(state.selectedDate+'T12:00:00');dt.setDate(dt.getDate()-i);const key=localDate(dt),v=state.diary[key]?.water||0;return `<div class="history-row"><span>${dt.toLocaleDateString(undefined,{weekday:'short',day:'numeric'})}</span><div class="progress"><i style="width:${pct(v,goal)}%"></i></div><b>${fmt(v/1000,1)} L</b></div>`}).join('')}</div>`}

nput" id="p-rate" type="number" min="0.1" max="1.2" step="0.05" value="${p.rate}"></div><div class="field"><label for="p-diet">Diet preference</label><select class="select" id="p-diet"><option value="mixed" ${p.diet==='mixed'?'selected':''}>Vegetarian + egg + non-veg</option><option value="eggetarian" ${p.diet==='eggetarian'?'selected':''}>Vegetarian + egg</option><option value="vegetarian" ${p.diet==='vegetarian'?'selected':''}>Vegetarian</option></select></div><div class="field"><label>Protein target (g/kg)</label><input class="input" id="p-proteinPerKg" type="number" step="0.1" min="1" max="2.4" value="${p.proteinPerKg}"></div><div class="field"><label>Workout days/week</label><input class="input" id="p-workoutDays" type="number" min="1" max="7" value="${p.workoutDays}"></div><div class="field"><label>Daily steps</label><input class="input" id="p-stepGoal" type="number" value="${p.stepGoal}"></div><div class="field"><label>Water goal (ml)</label><input class="input" id="p-waterGoal" type="number" step="250" value="${p.waterGoal}"></div><div class="field"><label>Sleep goal (hours)</label><input class="input" id="p-sleepGoal" type="number" step="0.5" value="${p.sleepGoal}"></div><div class="field"><label>Fiber goal (g)</label><input class="input" id="p-fiberGoal" type="number" value="${p.fiberGoal}"></div></div><div class="toggle"><div><b>Adaptive targets</b><div class="tiny muted">Recalculate calories and macros when profile or goal changes.</div></div><button class="switch ${p.adaptive?'on':''}" data-toggle-adaptive="1"><i></i></button></div><div id="manualTargets" class="form-grid ${p.adaptive?'hidden':''}" style="margin-top:12px"><div class="field"><label>Calories</label><input class="input" id="p-manualCalories" type="number" value="${p.manualCalories}"></div><div class="field"><label>Protein (g)</label><input class="input" id="p-manualProtein" type="number" value="${p.manualProtein}"></div><div class="field"><label>Carbs (g)</label><input class="input" id="p-manualCarbs" type="number" value="${p.manualCarbs}"></div><div class="field"><label>Fat (g)</label><input class="input" id="p-manualFat" type="number" value="${p.manualFat}"></div></div><div class="notice" style="margin-top:14px">Current estimate: BMR ${fmt(t.bmr)} kcal, maintenance ${fmt(t.tdee)} kcal, target ${fmt(t.calories)} kcal; ${fmt(t.protein)} g protein, ${fmt(t.carbs)} g carbs and ${fmt(t.fat)} g fat.</div><button class="btn primary wide" style="margin-top:14px" data-save-profile="1">Save and adapt plan</button></div>

function escapeHtml(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function openModal(title,body){document.getElementById('modalRoot').innerHTML=`<div class="modal-backdrop" data-close-modal="1"><div class="modal" onclick="event.stopPropagation()"><div class="modal-head"><h2>${title}</h2><button class="close-btn" data-close-modal="1">×</button></div><div class="modal-body">${body}</div></div></div>`}
function closeModal(){document.getElementById('modalRoot').innerHTML=''}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>t.classList.remove('show'),1800)}
function moreModal(){openModal('All features',`<div class="more-grid">${MAIN_NAV.filter(x=>!['dashboard','diary','workout','foods'].includes(x.id)).map(n=>`<button class="more-btn" data-nav="${n.id}">${n.label}<small>${({recipes:'Meals with ingredients and macros',plans:'Weekly adaptive meal and training plans',progress:'Weight, waist and reports',water:'Daily hydration tracking',settings:'Goals, theme, import and export'})[n.id]}</small></button>`).join('')}</div>`)}

function addFoodToDiary(id,meal,grams){const f=foodById(id);if(!f)return;const m=macroForFood(f,grams);dayData().meals[meal].push({kind:'food',ref:id,name:f.name,grams:Number(grams),unit:'g',...Object.fromEntries(Object.entries(m).map(([k,v])=>[k,round(v,1)]))});saveState();toast('Food added');closeModal();render()}
function addRecipeToDiary(id,meal){const r=allRecipes().find(x=>x.id===id);if(!r)return;dayData().meals[meal||r.meal||'Lunch'].push({kind:'recipe',ref:id,name:r.name,serving:1,unit:'serving',...deepClone(r.macros)});saveState();toast('Recipe added');closeModal();render()}

function calcFoodModal(id){const f=foodById(id);openModal('Macro calculator',`<div class="card card-pad"><h3 style="margin-top:0">${escapeHtml(f.name)}</h3><div class="field"><label>Amount (g)</label><input class="input" id="calcGrams" type="number" value="${f.servingG}" min="1"></div><div id="calcResult" style="margin-top:12px"></div></div><button class="btn primary wide" style="margin-top:12px" data-calc-add="${id}">Add to diary</button>`);updateCalc(f)}

function viewRecipe(id){const r=allRecipes().find(x=>x.id===id);openModal(r.name,`<div class="summary-strip">${[['Calories',r.macros.kcal,'kcal'],['Protein',r.macros.protein,'g'],['Carbs',r.macros.carbs,'g'],['Fat',r.macros.fat,'g'],['Fiber',r.macros.fiber,'g']].map(x=>`<div class="summary-item"><span>${x[0]}</span><b>${x[1]}</b><small>${x[2]}</small></div>`).join('')}</div><div class="section-title"><h2>Ingredients</h2></div><div class="card card-pad">${r.ingredients.map(x=>`<div class="check-row"><span>${escapeHtml(x)}</span></div>`).join('')}</div><div class="section-title"><h2>Method</h2></div><div class="card card-pad">${r.steps.map((x,i)=>`<div class="check-row"><b>${i+1}</b><span style="flex:1">${escapeHtml(x)}</span></div>`).join('')}</div><div class="source-line">${escapeHtml(r.source||'Custom recipe')}</div><button class="btn primary wide" style="margin-top:14px" data-add-recipe="${r.id}">Add to diary</button>`)}
function measurementModal(){const last=state.measurements.at(-1)||{};openModal('Add body measurement',`<div class="form-grid"><div class="field"><label>Date</label><input class="input" id="m-date" type="date" value="${state.selectedDate}"></div><div class="field"><label>Weight (kg)</label><input class="input" id="m-weight" type="number" step="0.1" value="${last.weight||state.profile.weight}"></div><div class="field"><label>Waist at navel (cm)</label><input class="input" id="m-waist" type="number" step="0.1" value="${last.waist||''}"></div><div class="field"><label>Body fat estimate (%)</label><input class="input" id="m-bodyFat" type="number" step="0.1" value="${last.bodyFat||''}"></div></div><button class="btn primary wide" style="margin-top:14px" data-save-measure="1">Save measurement</button>`)}

function saveProfile(){const keys=['name','sex','age','height','weight','goalWeight','goal','activity','rate','diet','proteinPerKg','workoutDays','stepGoal','waterGoal','sleepGoal','fiberGoal','manualCalories','manualProtein','manualCarbs','manualFat'];keys.forEach(k=>{const el=document.getElementById('p-'+k);if(el)state.profile[k]=['name','sex','goal','diet'].includes(k)?el.value:Number(el.value)});state.profile.accent=document.getElementById('accentPicker')?.value||state.profile.accent;state.profile.weight=Number(state.profile.weight);saveState();toast('Profile and plans updated');render()}
function download(name,text,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},500)}

t.findRecipe){const name=decodeURIComponent(b.dataset.findRecipe),r=allRecipes().find(x=>x.name===name);if(r)viewRecipe(r.id);return}if(b.dataset.saveMeasure){const m={date:document.getElementById('m-date').value,weight:Number(document.getElementById('m-weight').value),waist:Number(document.getElementById('m-waist').value),bodyFat:Number(document.getElementById('m-bodyFat').value)};state.measurements=state.measurements.filter(x=>x.date!==m.date);state.measurements.push(m);state.profile.weight=m.weight;closeModal();render();toast('Measurement saved');return}if(b.dataset.deleteMeasure){state.measurements.splice(Number(b.dataset.deleteMeasure),1);render();return}if(b.dataset.toggleAdaptive){state.profile.adaptive=!state.profile.adaptive;const el=document.getElementById('manualTargets');el?.classList.toggle('hidden',state.profile.adaptive);b.classList.toggle('on',state.profile.adaptive);return}if(b.dataset.saveProfile){saveProfile();return}if(b.dataset.exportJson){exportJSON();return}if(b.dataset.exportCsv){exportCSV();return}if(b.dataset.importJson){document.getElementById('jsonFile').click();return}if(b.dataset.importFoods){document.getElementById('foodCsvFile').click();return}if(b.dataset.reset){if(confirm('Erase all FitTrack data stored in this browser?')){try{localStorage.removeItem(APP_KEY)}catch(e){};state=initialState();render();toast('App reset')}return}}
function handleInput(e){if(e.target.id==='dailyNotes'){dayData().notes=e.target.value;saveState()}if(e.target.id==='stepsInput'){dayData().steps=Number(e.target.value);saveState()}if(e.target.id==='sleepInput'){dayData().sleep=Number(e.target.value);saveState()}if(e.target.id==='foodSearch'||e.target.id==='foodCategory'){filterFoods()}if(e.target.dataset.foodDiet){filterFoods()}if(e.target.id==='recipeSearch'||e.target.id==='recipeDiet'){filterRecipes()}if(e.target.id==='pickerSearch'||e.target.id==='pickerType'){const meal=document.getElementById('pickerMeal')?.value||ftActivePickerMeal;if(!meal){console.error('No active picker meal');return}renderPicker(meal)}if(e.target.id==='calcGrams'){const id=document.querySelector('[data-calc-add]')?.dataset.calcAdd;if(id)updateCalc(foodById(id))}if(e.target.dataset.exWeight){const l=dayData().workout.logs[e.target.dataset.exWeight]||{};l.weight=e.target.value;dayData().workout.logs[e.target.dataset.exWeight]=l;saveState()}if(e.target.dataset.exReps){const l=dayData().workout.logs[e.target.dataset.exReps]||{};l.reps=e.target.value;dayData().workout.logs[e.target.dataset.exReps]=l;saveState()}if(e.target.id==='chartMetric')drawChart();if(e.target.id==='accentPicker'){state.profile.accent=e.target.value;document.documentElement.style.setProperty('--accent',e.target.value);saveState()}}

<script>
/* FitTrack interaction and logging upgrade */
if(!MEALS.includes('Supplements')) MEALS.push('Supplements');
if(!MEALS.includes('Other')) MEALS.push('Other');
const FT_CORE_MEALS=['Breakfast','Lunch','Dinner','Snacks'];
let ftActivePickerMeal=null;

openModal=function(title,body){
  document.body.classList.add('modal-open');
  document.getElementById('modalRoot').innerHTML=`<div class="modal-backdrop" data-modal-backdrop="1"><div class="modal" role="dialog" aria-modal="true" aria-label="${escapeHtml(title)}"><div class="modal-head"><h2>${title}</h2><button class="close-btn" aria-label="Close" data-close-modal="1">×</button></div><div class="modal-body">${body}</div></div></div>`;
};
closeModal=function(){document.body.classList.remove('modal-open');document.getElementById('modalRoot').innerHTML=''};
moreModal=function(){openModal('All features',`<div class="more-grid">${MAIN_NAV.filter(x=>!['dashboard','diary','workout','foods'].includes(x.id)).map(n=>`<button class="more-btn" data-nav="${n.id}">${n.label}<small>${({recipes:'Meals with ingredients and macros',plans:'Weekly adaptive meal and training plans',progress:'Weight, waist and reports',water:'Daily hydration tracking',settings:'Goals, theme, import and export'})[n.id]}</small></button>`).join('')}</div>`)};

function chooseDiarySection(){
  const help={Breakfast:'Morning meal',Lunch:'Midday meal',Dinner:'Evening meal',Snacks:'Between meals',Supplements:'Protein and supplements',Other:'Drinks or uncategorised'};
  openModal('Where do you want to add it?',`<div class="meal-choice-grid">${MEALS.map(m=>`<button class="meal-choice" data-open-food-picker="${m}">${m}<small>${help[m]}</small></button>`).join('')}</div>`);
}
foodPicker=function(meal){
  // Require an explicit, valid diary section. No silent fallback to Other/Breakfast.
  if(!meal||!MEALS.includes(meal)){
    console.error('foodPicker: missing or invalid diary section:',meal);
    openModal('Cannot add food',`<div class="notice" id="pickerSectionError" role="alert" style="border-color:#e05c5c;color:#e05c5c">No valid diary section was provided, so nothing was opened and no diary data was changed. Choose a section (Breakfast, Lunch, Dinner, Snacks, Supplements or Other) and try again.</div><button class="btn primary wide" style="margin-top:12px" data-choose-meal="1">Choose a section</button>`);
    return;
  }
  ftActivePickerMeal=meal;
  openModal(`Add to ${meal}`,`<div class="field"><label>Diary section</label><select class="select" id="pickerMeal">${MEALS.map(m=>`<option ${m===meal?'selected':''}>${m}</option>`).join('')}</select></div><div class="search-row picker-search-row" style="margin-top:10px"><input class="input" id="pickerSearch" placeholder="Search food or recipe..."><select class="select" id="pickerType" style="max-width:120px"><option value="foods">Foods</option><option value="recipes">Recipes</option></select><button class="btn outline picker-create-compact" data-v7-create="${escapeHtml(meal)}|" aria-label="Create custom food" title="Create custom food">+</button></div><div id="pickerList" class="stack" style="margin-top:12px"></div>`);
  renderPicker(meal);
};
/* Dead renderPicker layer (L2) removed during consolidation — superseded by the single
   canonical renderPicker defined later. */

function ensureSetLog(e,d=dayData()){
  let log=d.workout.logs[e.id];
  if(!log) log=d.workout.logs[e.id]={};
  if(e.group==='Cardio'){
    log.cardio=log.cardio||{duration:log.reps||'',distance:'',rpe:'',done:Boolean(log.done)};
    return log;
  }
  const target=Math.max(1,Number(e.sets)||1);
  if(!Array.isArray(log.sets)){
    log.sets=Array.from({length:target},(_,i)=>({weight:i===0?(log.weight||''):'',result:i===0?(log.reps||''):'',done:Boolean(log.done)}));
  }
  while(log.sets.length<target) log.sets.push({weight:'',result:'',done:false});
  return log;
}
function exerciseDone(e,log){return e.group==='Cardio'?Boolean(log.cardio?.done):Boolean(log.sets?.length&&log.sets.every(s=>s.done));}
function syncWorkoutCompletion(){
  const p=workoutForDate(),d=dayData();
  if(!p.exercises.length){d.workout.completed=false;return false}
  d.workout.completed=p.exercises.every(id=>{const e=exById(id),l=ensureSetLog(e,d);return exerciseDone(e,l)});
  d.checklist.workout=d.workout.completed;
  return d.workout.completed;
}
renderExercise=function(e,d){
  const log=ensureSetLog(e,d),done=exerciseDone(e,log);
  if(e.group==='Cardio'){
    return `<div class="exercise-block"><div class="exercise-header"><button class="exercise-check ${done?'done':''}" data-ex-check="${e.id}">✓</button><div><h3>${e.name}</h3><p>${e.reps} · ${e.cue}</p></div></div><div class="cardio-log"><div class="field"><label>Duration (min)</label><input class="set-input" type="number" min="0" step="1" data-cardio-duration="${e.id}" value="${log.cardio.duration||''}"></div><div class="field"><label>Distance (km, optional)</label><input class="set-input" type="number" min="0" step="0.1" data-cardio-distance="${e.id}" value="${log.cardio.distance||''}"></div><div class="field"><label>Effort RPE 1–10</label><input class="set-input" type="number" min="1" max="10" step="1" data-cardio-rpe="${e.id}" value="${log.cardio.rpe||''}"></div><button class="btn ${done?'outline':'primary'}" data-cardio-done="${e.id}">${done?'Completed':'Mark complete'}</button></div></div>`;
  }
  const timed=/sec|min/i.test(e.reps),hideLoad=['plank','dead-bug'].includes(e.id);
  const resultLabel=timed?'Seconds / minutes':'Reps';
  return `<div class="exercise-block"><div class="exercise-header"><button class="exercise-check ${done?'done':''}" data-ex-check="${e.id}">✓</button><div><h3>${e.name}</h3><p>Target: ${e.sets} sets · ${e.reps} · rest ${e.rest}</p><p>${e.cue}</p></div></div><div class="set-table">${hideLoad?`<div class="set-row head no-load"><span>Set</span><span>${resultLabel}</span><span>Done</span></div>`:`<div class="set-row head"><span>Set</span><span>Load kg</span><span>${resultLabel}</span><span>Done</span></div>`}${log.sets.map((s,i)=>hideLoad?`<div class="set-row no-load"><span class="set-label">${i+1}</span><input class="set-input" inputmode="decimal" data-set-result="${e.id}|${i}" value="${escapeHtml(s.result||'')}" placeholder="${timed?'sec':'reps'}"><button class="set-check ${s.done?'done':''}" data-set-done="${e.id}|${i}">✓</button></div>`:`<div class="set-row"><span class="set-label">${i+1}</span><input class="set-input" type="number" inputmode="decimal" min="0" step="0.5" data-set-weight="${e.id}|${i}" value="${escapeHtml(s.weight||'')}" placeholder="kg"><input class="set-input" inputmode="numeric" data-set-result="${e.id}|${i}" value="${escapeHtml(s.result||'')}" placeholder="reps"><button class="set-check ${s.done?'done':''}" data-set-done="${e.id}|${i}">✓</button></div>`).join('')}</div><div class="set-actions"><button class="btn small outline" data-add-set="${e.id}">Add set</button>${log.sets.length>1?`<button class="btn small outline" data-remove-set="${e.id}">Remove last</button>`:''}</div></div>`;
};
renderWorkout=function(){
  const p=workoutForDate(),d=dayData(),days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  syncWorkoutCompletion();
  const completed=p.exercises.filter(id=>exerciseDone(exById(id),ensureSetLog(exById(id),d))).length;
  return `${pageHead('Workout','Log every set with its own load and reps',`<button class="btn outline small" data-edit-workout="1">Edit day</button>`)}<div class="tabs">${days.map((x,i)=>{const plan=state.workoutPlan.find(p=>p.day===i);return `<button class="tab ${p.day===i?'active':''}" data-workout-day="${i}">${x} · ${plan?.name||'Rest'}</button>`}).join('')}</div><div class="card exercise-card" style="margin-top:12px"><div class="food-card-top"><div><h3>${p.name}</h3><p>${p.type} · ${p.exercises.length} activities</p><div class="workout-progress-note">${completed}/${p.exercises.length} activities completed</div></div><span class="pill good">Research aligned</span></div><div style="margin-top:10px">${p.exercises.map(id=>renderExercise(exById(id),d)).join('')||'<div class="empty">Rest, gentle walking and mobility as comfortable.</div>'}</div>${p.exercises.length?`<button class="btn ${d.workout.completed?'outline':'primary'} wide" style="margin-top:14px" data-finish-workout="1">${d.workout.completed?'All sets completed · tap to reset':'Mark all sets complete'}</button>`:''}</div><div class="section-title"><h2>How to log</h2></div><div class="card card-pad"><div class="notice">Enter the actual load and result for each set. Example: Set 1 = 20 kg × 12 reps, Set 2 = 25 kg × 10 reps, Set 3 = 25 kg × 8 reps. Tick each set only after completing it.</div></div>`;
};

function checklistItems(){
  const d=dayData(),t=calcTargets(),x=totalsForDay(),p=workoutForDate(); syncWorkoutCompletion();
  const mainLogged=['Breakfast','Lunch','Dinner'].filter(m=>d.meals[m]?.length).length;
  const calLow=Math.round(t.calories*.85),calHigh=Math.round(t.calories*1.1);
  const calDone=x.kcal>=calLow&&x.kcal<=calHigh;
  return [
    {label:'Calories within plan',done:calDone,detail:x.kcal<calLow?`${fmt(calLow-x.kcal)} kcal still to log`:x.kcal>calHigh?`${fmt(x.kcal-calHigh)} kcal above range`:'On target',nav:'diary'},
    {label:'Protein target',done:x.protein>=t.protein,detail:`${fmt(x.protein,1)} / ${fmt(t.protein)} g`,nav:'diary'},
    {label:'Main meals logged',done:mainLogged===3,detail:`${mainLogged} / 3 meals`,action:'chooseMeal'},
    {label:p.exercises.length?'Workout completed':'Recovery day',done:p.exercises.length?d.workout.completed:true,detail:p.exercises.length?`${p.name}`:'No strength session scheduled',nav:'workout'},
    {label:'Steps target',done:d.steps>=state.profile.stepGoal,detail:`${fmt(d.steps)} / ${fmt(state.profile.stepGoal)}`,nav:'diary'},
    {label:'Water target',done:d.water>=state.profile.waterGoal,detail:`${fmt(d.water/1000,1)} / ${fmt(state.profile.waterGoal/1000,1)} L`,nav:'water'},
    {label:'Sleep logged',done:d.sleep>=state.profile.sleepGoal,detail:`${fmt(d.sleep,1)} / ${fmt(state.profile.sleepGoal,1)} h`,nav:'diary'},
    {label:'Fiber target',done:x.fiber>=t.fiber,detail:`${fmt(x.fiber,1)} / ${fmt(t.fiber)} g`,nav:'diary'}
  ];
}
function nextMealName(){const d=dayData();return ['Breakfast','Lunch','Snacks','Dinner'].find(m=>!d.meals[m]?.length)||'Snacks'}
function mealSuggestions(){
  const meal=nextMealName(),t=calcTargets(),x=totalsForDay(),remainingK=Math.max(150,t.calories-x.kcal),remainingP=Math.max(0,t.protein-x.protein);
  let pool=allRecipes().filter(r=>dietAllowed(r.diet)&&(r.goal||[]).includes(state.profile.goal));
  const exact=pool.filter(r=>r.meal===meal); if(exact.length)pool=exact;
  return pool.map(r=>({r,score:Math.abs(r.macros.kcal-Math.min(remainingK,meal==='Snacks'?350:650))-Math.min(r.macros.protein,remainingP)*5})).sort((a,b)=>a.score-b.score).slice(0,3).map(x=>({meal,r:x.r}));
}
function renderSuggestions(){const s=mealSuggestions();return `<div class="suggestion-list">${s.map(({meal,r})=>`<div class="card suggestion-card"><div class="suggestion-top"><div><h3>${escapeHtml(r.name)}</h3><p>${meal} · ${r.macros.kcal} kcal · ${r.macros.protein} g protein</p></div><span class="pill">${r.diet==='nonveg'?'Non-veg':r.diet==='egg'?'Egg':'Veg'}</span></div><div class="recipe-actions"><button class="btn small outline" data-view-recipe="${r.id}">View</button><button class="btn small primary" data-suggest-recipe="${r.id}|${meal}">Add to ${meal}</button></div></div>`).join('')}</div>`}
renderDashboard=function(){

heck ${c.done?'done':'missing'}"><span class="status-dot">${c.done?'✓':'!'}</span><div class="auto-check-main"><b>${c.label}</b><span>${c.detail}</span></div>${c.done?'':c.action==='chooseMeal'?`<button class="btn small outline" data-choose-meal="1">Add</button>`:`<button class="btn small outline" data-nav="${c.nav}">Open</button>`}</div>`).join('')}</div></div><div><div class="section-title"><h2>What to eat next</h2><button class="btn small outline" data-apply-today-plan="1">Fill empty meals</button></div>${renderSuggestions()}</div></div><div class="section-title"><h2>Today’s plan</h2><button class="btn small outline" data-nav="plans">Full plan</button></div><div class="card card-pad">${todayPlanPreview()}</div><div class="section-title"><h2>Daily notes</h2></div><div class="card card-pad"><textarea class="textarea" id="dailyNotes" placeholder="Energy, hunger, pain, wins, observations...">${escapeHtml(d.notes||'')}</textarea></div>`;

renderDiary=function(){

};

const ftLegacyHandleClick=handleClick;
handleClick=function(e){
  const backdrop=e.target.closest?.('[data-modal-backdrop]');
  if(backdrop&&e.target===backdrop){closeModal();return}
  const b=e.target.closest?.('button,[data-nav]'); if(!b)return;
  if('closeModal' in b.dataset){closeModal();return}
  if('chooseMeal' in b.dataset){chooseDiarySection();return}
  if(b.dataset.openFoodPicker){foodPicker(b.dataset.openFoodPicker);return}
  if(b.dataset.suggestRecipe){const [id,meal]=b.dataset.suggestRecipe.split('|');addRecipeToDiary(id,meal);return}
  if('applyTodayPlan' in b.dataset){const wd=new Date(state.selectedDate+'T12:00:00').getDay(),index=wd===0?6:wd-1;applyMealPlan(index);return}
  if(b.dataset.setDone){const [id,idx]=b.dataset.setDone.split('|'),e2=exById(id),l=ensureSetLog(e2);l.sets[Number(idx)].done=!l.sets[Number(idx)].done;syncWorkoutCompletion();render();return}
  if(b.dataset.addSet){ensureSetLog(exById(b.dataset.addSet)).sets.push({weight:'',result:'',done:false});render();return}
  if(b.dataset.removeSet){const l=ensureSetLog(exById(b.dataset.removeSet));if(l.sets.length>1)l.sets.pop();syncWorkoutCompletion();render();return}
  if(b.dataset.cardioDone){const l=ensureSetLog(exById(b.dataset.cardioDone));l.cardio.done=!l.cardio.done;syncWorkoutCompletion();render();return}
  if(b.dataset.exCheck){const e2=exById(b.dataset.exCheck),l=ensureSetLog(e2),next=!exerciseDone(e2,l);if(e2.group==='Cardio')l.cardio.done=next;else l.sets.forEach(s=>s.done=next);syncWorkoutCompletion();render();return}
  if('finishWorkout' in b.dataset){const p=workoutForDate(),d=dayData(),next=!d.workout.completed;p.exercises.forEach(id=>{const e2=exById(id),l=ensureSetLog(e2,d);if(e2.group==='Cardio')l.cardio.done=next;else l.sets.forEach(s=>s.done=next)});syncWorkoutCompletion();render();return}
  return ftLegacyHandleClick(e);
};
const ftLegacyHandleInput=handleInput;
handleInput=function(e){
  ftLegacyHandleInput(e);
  if(e.target.id==='pickerMeal'){ftActivePickerMeal=e.target.value;const modalTitle=document.querySelector('.modal-head h2');if(modalTitle)modalTitle.textContent=`Add to ${ftActivePickerMeal}`;renderPicker(ftActivePickerMeal)}

  if(updateSet('setResult','result'))return;
  if(e.target.dataset.cardioDuration){ensureSetLog(exById(e.target.dataset.cardioDuration)).cardio.duration=e.target.value;saveState()}
  if(e.target.dataset.cardioDistance){ensureSetLog(exById(e.target.dataset.cardioDistance)).cardio.distance=e.target.value;saveState()}

};

render();
</script>

    for(let i=0;i<count;i++){const d=new Date(base);d.setDate(base.getDate()-i);result.push(localDate(d))}
    return result;
  }

    const dates=ftRecentDates(7),max=Math.max(state.profile.stepGoal,...dates.map(date=>Number(dayData(date).steps)||0),1);

  }
  function ftStepLog(d){
    if(!d.stepEntries.length)return '<div class="empty">No walk/session additions logged. Your saved daily total can still come from a phone or watch.</div>';

  }
  function renderActivity(){
    const d=dayData(),logged=d.stepLogged,updated=d.stepUpdatedAt?`Updated ${escapeHtml(d.stepUpdatedAt)}`:logged?'Saved for this date':'Not entered yet';
    return `${pageHead('Daily activity',`Steps and sleep for ${ftDateLabel(state.selectedDate)}`,`<button class="btn outline small" data-log-steps="1">Quick log</button>`)}<div class="activity-explainer"><b>How this works:</b> every entry belongs to the date selected at the top of the app. Use <b>Set daily total</b> when copying the total from your phone or watch. Use <b>Add walk/session</b> only when adding extra steps to the current total. These values automatically update the dashboard and daily checklist.</div><div class="activity-layout" style="margin-top:14px"><div class="stack"><div class="card activity-hero"><div class="activity-status"><span class="pill ${logged?'good':''}">${logged?'Steps logged':'Steps missing'}</span><span class="pill">Goal ${fmt(state.profile.stepGoal)}</span></div><div><div class="activity-total">${logged?fmt(d.steps):'—'} <small>steps</small></div><div class="step-source-line">${logged?escapeHtml(d.stepSource||'Manual'):'No source selected'} · ${updated}</div></div><div class="progress"><i style="width:${pct(d.steps,state.profile.stepGoal)}%"></i></div><div class="activity-form"><div class="field"><label>Daily step total</label><input class="input" id="activityStepsTotal" type="number" min="0" step="1" value="${logged?d.steps:''}" placeholder="Example: 8432"><div class="field-help">Enter the full total shown by your phone, watch or pedometer.</div></div><div class="field"><label>Source</label><select class="select" id="activityStepSource">${['Manual','iPhone / Apple Health','Android / Google Fit','Smartwatch','Treadmill','Other'].map(x=>`<option ${x===d.stepSource?'selected':''}>${x}</option>`).join('')}</select></div><div class="activity-form-actions full"><button class="btn primary" data-save-steps-total="1">Set daily total</button><button class="btn danger-btn" data-clear-steps="1">Clear steps</button></div></div><div><div class="strong" style="margin-bottom:9px">Add a walk/session</div><div class="quick-step-grid">${[500,1000,2000].map(v=>`<button class="btn outline" data-add-steps="${v}">+${fmt(v)} steps</button>`).join('')}</div><div class="field-help" style="margin-top:9px">These buttons add to the saved total and create a removable session entry.</div></div></div><div class="card card-pad"><div class="section-title" style="margin-top:0"><h2>Sleep</h2><span class="pill ${d.sleepLogged?'good':''}">${d.sleepLogged?'Logged':'Missing'}</span></div><div class="field"><label>Hours slept</label><input class="input" id="activitySleep" type="number" min="0" max="24" step="0.1" value="${d.sleepLogged?d.sleep:''}" placeholder="Example: 7.5"></div><div class="activity-form-actions" style="margin-top:12px"><button class="btn primary" data-save-sleep="1">Save sleep</button><button class="btn danger-btn" data-clear-sleep="1">Clear sleep</button></div><div class="progress" style="margin-top:14px"><i style="width:${pct(d.sleep,state.profile.sleepGoal)}%"></i></div><div class="tiny muted" style="margin-top:7px">Goal: ${fmt(state.profile.sleepGoal,1)} hours</div></div><div class="card card-pad"><div class="section-title" style="margin-top:0"><h2>Activity note</h2></div><textarea class="textarea" id="activityNote" placeholder="Walk route, soreness, energy, recovery...">${escapeHtml(d.activityNote||'')}</textarea></div></div><div class="stack"><div class="card card-pad"><div class="section-title" style="margin-top:0"><h2>Last 7 days</h2><small>Tap a day to edit</small></div>${ftActivityHistory()}</div><div class="card card-pad"><div class="section-title" style="margin-top:0"><h2>Walk/session log</h2><small>${d.stepEntries.length} entries</small></div>${ftStepLog(d)}</div></div></div>`;
  }

  const ftV3OldChecklist=checklistItems;
  checklistItems=function(){
    const base=ftV3OldChecklist().filter(x=>!['Steps target','Sleep logged'].includes(x.label));
    const d=dayData();
    const stepLogged={label:'Daily steps logged',done:d.stepLogged,detail:d.stepLogged?`${fmt(d.steps)} steps saved for this date`:'No daily step total entered',nav:'activity'};
    const stepTarget={label:'Steps target',done:d.stepLogged&&d.steps>=state.profile.stepGoal,detail:d.stepLogged?`${fmt(d.steps)} / ${fmt(state.profile.stepGoal)}`:'Log steps first',nav:'activity'};
    const sleep={label:'Sleep logged',done:d.sleepLogged,detail:d.sleepLogged?`${fmt(d.sleep,1)} / ${fmt(state.profile.sleepGoal,1)} h`:'No sleep duration entered',nav:'activity'};
    const waterIndex=Math.max(0,base.findIndex(x=>x.label==='Water target'));
    base.splice(waterIndex,0,stepLogged,stepTarget,sleep);

  };

  function ftMetricButton(label,value,target,unit,logged=true){return `<button class="card metric-card metric-button" data-nav="activity"><div class="metric-label">${label}</div><div class="metric-value">${logged?fmt(value,1):'Not logged'} ${logged?`<span>/ ${fmt(target,1)} ${unit}</span>`:''}</div><div class="progress"><i style="width:${logged?pct(value,target):0}%"></i></div></button>`}
  renderDashboard=function(){
    const d=dayData(),t=calcTargets(),x=totalsForDay(),checks=checklistItems(),missing=checks.filter(c=>!c.done);
    return `${pageHead(`Today, ${state.profile.name}`,`${new Date(state.selectedDate+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'})}`,`<button class="btn outline small" data-nav="settings">Edit goals</button>`)}<div class="grid grid-lg-2"><div class="card hero-card"><div class="ring" style="--p:${pct(x.kcal,t.calories)}"><div class="ring-content"><b>${fmt(x.kcal)}</b><span>of ${fmt(t.calories)} kcal</span></div></div><div><div class="strong">Daily nutrition</div>${['protein','carbs','fat'].map(k=>`<div class="macro-row"><label>${k[0].toUpperCase()+k.slice(1)}</label><div class="progress"><i style="width:${pct(x[k],t[k])}%"></i></div><b>${fmt(x[k])}/${fmt(t[k])}g</b></div>`).join('')}<div class="tiny muted">Fiber ${fmt(x.fiber,1)} / ${fmt(t.fiber)} g</div></div></div><div class="grid grid-2">${ftMetricButton('Steps',d.steps,state.profile.stepGoal,'steps',d.stepLogged)}${metricCard('Water',d.water/1000,state.profile.waterGoal/1000,'L')}${metricCard('Weight',latestWeight(),state.profile.goalWeight,'kg')}${ftMetricButton('Sleep',d.sleep,state.profile.sleepGoal,'h',d.sleepLogged)}</div></div><div class="section-title"><h2>Quick actions</h2></div><div class="quick-grid activity-actions"><button class="quick-btn" data-choose-meal="1">Log food<small>Breakfast, lunch, dinner and more</small></button><button class="quick-btn" data-log-steps="1">Log steps<small>Set phone/watch total or add a walk</small></button><button class="quick-btn" data-nav="workout">Log workout<small>Track every set</small></button><button class="quick-btn" data-water="250">Add water<small>+250 ml</small></button><button class="quick-btn" data-nav="activity">Log sleep<small>Daily recovery record</small></button><button class="quick-btn" data-measure="1">Body stats<small>Weight and waist</small></button></div><div class="grid grid-lg-2"><div><div class="section-title"><h2>Daily checklist</h2><small>${checks.length-missing.length}/${checks.length}</small></div><div class="card card-pad check-list">${missing.length?`<div class="missing-banner"><b>${missing.length} item${missing.length===1?'':'s'} still missing</b><span>${missing.slice(0,3).map(x=>x.label).join(', ')}</span></div>`:''}${checks.map(c=>`<div class="check-row auto-check ${c.done?'done':'missing'}"><span class="status-dot">${c.done?'✓':'!'}</span><div class="auto-check-main"><b>${c.label}</b><span>${c.detail}</span></div>${c.done?'':c.action==='chooseMeal'?`<button class="btn small outline" data-choose-meal="1">Add</button>`:`<button class="btn small outline" data-nav="${c.nav}">Open</button>`}</div>`).join('')}</div></div><div><div class="section-title"><h2>What to eat next</h2><button class="btn small outline" data-apply-today-plan="1">Fill empty meals</button></div>${renderSuggestions()}</div></div><div class="section-title"><h2>Today’s plan</h2><button class="btn small outline" data-nav="plans">Full plan</button></div><div class="card card-pad">${todayPlanPreview()}</div><div class="section-title"><h2>Daily notes</h2></div><div class="card card-pad"><textarea class="textarea" id="dailyNotes" placeholder="Energy, hunger, pain, wins, observations...">${escapeHtml(d.notes||'')}</textarea></div>`;
  };

  renderDiary=function(){
    const d=dayData(),t=calcTargets(),x=totalsForDay();
    return `${pageHead('Food diary','Meals and nutrition for the selected date',`<button class="btn primary small" data-choose-meal="1">Add item</button>`)}<div class="summary-strip">${[['Calories',x.kcal,t.calories,'kcal'],['Protein',x.protein,t.protein,'g'],['Carbs',x.carbs,t.carbs,'g'],['Fat',x.fat,t.fat,'g'],['Fiber',x.fiber,t.fiber,'g']].map(a=>`<div class="summary-item"><span>${a[0]}</span><b>${fmt(a[1],1)}</b><small class="muted">/ ${fmt(a[2])}${a[3]}</small></div>`).join('')}</div><div class="section-title"><h2>Suggested next meal</h2><button class="btn small outline" data-apply-today-plan="1">Fill empty meals</button></div>${renderSuggestions()}<div class="stack" style="margin-top:16px">${MEALS.map(m=>renderMeal(m,d.meals[m])).join('')}</div><div class="section-title"><h2>Activity and recovery</h2></div><div class="card activity-link-card"><div><b>Steps and sleep are logged separately</b><p class="tiny muted">This keeps the food diary focused. Activity entries still update the same date, dashboard and checklist.</p></div><button class="btn primary small" data-nav="activity">Open activity</button></div>`;
  };

  moreModal=function(){
    const descriptions={activity:'Daily steps, walks and sleep',recipes:'Meals with ingredients and macros',plans:'Weekly adaptive meal and training plans',progress:'Weight, waist and reports',water:'Daily hydration tracking',settings:'Goals, theme, import and export'};
    openModal('All features',`<div class="more-grid">${MAIN_NAV.filter(x=>!['dashboard','diary','workout','foods'].includes(x.id)).map(n=>`<button class="more-btn" data-nav="${n.id}">${n.label}<small>${descriptions[n.id]||''}</small></button>`).join('')}</div>`);
  };

  const ftV3OldRender=render;
  render=function(){
    document.documentElement.style.setProperty('--accent',state.profile.accent||'#78e23f');
    document.getElementById('globalDate').value=state.selectedDate;
    document.getElementById('headerSubtitle').textContent=`${goalLabel()} · ${state.profile.diet}`;
    const t=calcTargets();document.getElementById('sideTarget').textContent=`${fmt(t.calories)} kcal`;document.getElementById('sideGoal').textContent=goalLabel();renderNav();
    const main=document.getElementById('main');
    const fn={dashboard:renderDashboard,diary:renderDiary,workout:renderWorkout,foods:renderFoods,recipes:renderRecipes,plans:renderPlans,activity:renderActivity,progress:renderProgress,water:renderWater,settings:renderSettings}[state.activePage]||renderDashboard;
    main.innerHTML=`<section class="page active">${fn()}</section>`;
    if(state.activePage==='progress')requestAnimationFrame(drawChart);saveState();
  };

  function ftNowLabel(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
  function ftOpenStepsModal(){
    const d=dayData();openModal('Log daily steps',`<div class="activity-explainer"><b>Selected date:</b> ${ftDateLabel(state.selectedDate)}. Set the full total from your phone/watch, or add a walk to the existing total.</div><div class="field" style="margin-top:14px"><label>Daily step total</label><input class="input" id="modalStepsTotal" type="number" min="0" step="1" value="${d.stepLogged?d.steps:''}" placeholder="Example: 8432"></div><div class="field" style="margin-top:12px"><label>Source</label><select class="select" id="modalStepSource">${['Manual','iPhone / Apple Health','Android / Google Fit','Smartwatch','Treadmill','Other'].map(x=>`<option ${x===d.stepSource?'selected':''}>${x}</option>`).join('')}</select></div><button class="btn primary wide" style="margin-top:14px" data-save-modal-steps="1">Save daily total</button><div class="divider"></div><div class="strong">Add a walk/session</div><div class="quick-step-grid" style="margin-top:10px">${[500,1000,2000].map(v=>`<button class="btn outline" data-add-steps="${v}">+${fmt(v)}</button>`).join('')}</div>`);
  }

  const ftV3OldClick=handleClick;
  handleClick=function(e){
    const b=e.target.closest?.('button,[data-nav]');if(!b)return;
    if('logSteps' in b.dataset){ftOpenStepsModal();return}
    if('saveStepsTotal' in b.dataset){const d=dayData(),v=Math.max(0,Number(document.getElementById('activityStepsTotal')?.value)||0);d.steps=v;d.stepLogged=true;d.stepSource=document.getElementById('activityStepSource')?.value||'Manual';d.stepUpdatedAt=ftNowLabel();render();toast('Daily step total saved');return}
    if('saveModalSteps' in b.dataset){const d=dayData(),v=Math.max(0,Number(document.getElementById('modalStepsTotal')?.value)||0);d.steps=v;d.stepLogged=true;d.stepSource=document.getElementById('modalStepSource')?.value||'Manual';d.stepUpdatedAt=ftNowLabel();closeModal();render();toast('Daily step total saved');return}
    if(b.dataset.addSteps){const d=dayData(),amount=Number(b.dataset.addSteps)||0;d.steps=(Number(d.steps)||0)+amount;d.stepLogged=true;d.stepUpdatedAt=ftNowLabel();d.stepEntries.push({id:'step-'+Date.now()+'-'+Math.random().toString(16).slice(2),steps:amount,source:d.stepSource||'Manual',time:ftNowLabel()});if(document.querySelector('[data-modal-backdrop]'))closeModal();render();toast(`Added ${fmt(amount)} steps`);return}
    if(b.dataset.removeStepEntry){const d=dayData(),entry=d.stepEntries.find(x=>x.id===b.dataset.removeStepEntry);if(entry)d.steps=Math.max(0,(Number(d.steps)||0)-Number(entry.steps||0));d.stepEntries=d.stepEntries.filter(x=>x.id!==b.dataset.removeStepEntry);d.stepLogged=d.steps>0;render();toast('Walk entry removed');return}
    if('clearSteps' in b.dataset){const d=dayData();d.steps=0;d.stepLogged=false;d.stepEntries=[];d.stepUpdatedAt='';render();toast('Steps cleared');return}
    if('saveSleep' in b.dataset){const d=dayData(),v=Math.max(0,Math.min(24,Number(document.getElementById('activitySleep')?.value)||0));d.sleep=v;d.sleepLogged=true;d.sleepUpdatedAt=ftNowLabel();render();toast('Sleep saved');return}
    if('clearSleep' in b.dataset){const d=dayData();d.sleep=0;d.sleepLogged=false;d.sleepUpdatedAt='';render();toast('Sleep cleared');return}
    if(b.dataset.activityDate){state.selectedDate=b.dataset.activityDate;render();window.scrollTo({top:0,behavior:'smooth'});return}
    if('clearFoodSearch' in b.dataset){const input=document.getElementById('foodSearch');if(input)input.value='';filterFoods();return}
    if('customFoodQuery' in b.dataset){const q=b.dataset.customFoodQuery||'';customFoodModal();setTimeout(()=>{const input=document.getElementById('cf-name');if(input)input.value=q},0);return}
    return ftV3OldClick(e);
  };

  const ftV3OldInput=handleInput;
  handleInput=function(e){
    ftV3OldInput(e);
    if(e.target.id==='activityNote'){dayData().activityNote=e.target.value;saveState()}
  };

  render();
})();
</script>

function ftServingOptions(f){
  const custom=Array.isArray(f.servings)?f.servings.map((s,i)=>({key:s.key||'custom-'+i,label:s.label||s.name||'serving',grams:Number(s.grams)||Number(f.servingG)||100})):[];
  const mapped=(FT_SERVING_MAP[f.id]||[]).map(x=>({key:x[0],label:x[1],grams:x[2]}));
  const base=custom.length?custom:mapped;
  if(!base.length)base.push({key:'serving',label:`1 serving (${fmt(f.servingG)} g)`,grams:Number(f.servingG)||100});
  base.push({key:'grams',label:'grams',grams:1});
  return base;
}
function ftServingByKey(f,key){return ftServingOptions(f).find(x=>x.key===key)||ftServingOptions(f)[0]}
function ftDefaultServing(f){return ftServingOptions(f)[0]}
function ftQtyLabel(q,s){if(s.key==='grams')return `${fmt(q,1)} g`;if(Math.abs(Number(q)-1)<.001)return s.label;return `${fmt(q,1)} × ${s.label.replace(/^1\s*/, '')}`}

function ftMixedNumber(value){const whole=Math.floor(Number(value)||0),frac=Number(value)-whole;if(Math.abs(frac)<.001)return String(whole);if(Math.abs(frac-.5)<.001)return whole?`${whole} 1/2`:'1/2';return fmt(value,1)}
function ftPluralWord(word){if(/(s|x|z|ch|sh)$/i.test(word))return `${word}es`;if(/[^aeiou]y$/i.test(word))return `${word.slice(0,-1)}ies`;return `${word}s`}
function ftPluralServing(base,qty){if(base.includes('/'))return `${ftMixedNumber(qty)} x ${base}`;return base.replace(/([A-Za-z]+)(\s*(?:\([^)]*\))?)$/,(_,word,suffix)=>`${ftPluralWord(word)}${suffix}`)}
ftQtyLabel=function(q,s){const qty=Number(q)||0;if(s.key==='grams')return `${fmt(qty,1)} g`;const label=String(s.label||'serving').trim(),qtyText=ftMixedNumber(qty);if(label.toLowerCase().startsWith(`${qtyText} `.toLowerCase()))return label;if(Math.abs(qty-1)<.001)return label;if(/^1\/2\s+/i.test(label))return `${qtyText} x ${label}`;const base=label.replace(/^\d+(?:\s+\d+\/\d+)?\s+/i,'');return `${qtyText} ${ftPluralServing(base,qty)}`}

le"><h2>Ingredients and calculated macros</h2></div><div id="recipeDraftList"></div><div class="field" style="margin-top:12px"><label>Method, one step per line</label><textarea class="textarea" id="cr-steps"></textarea></div><button class="btn primary wide" style="margin-top:14px" data-save-calculated-recipe="1">Save calculated recipe</button>`);ftRenderRecipeDraft()};

/* ---------- activity and sleep ---------- */
function ftSleepDuration(start,end,awake=0){if(!start||!end)return 0;const [sh,sm]=start.split(':').map(Number),[eh,em]=end.split(':').map(Number);let mins=(eh*60+em)-(sh*60+sm);if(mins<=0)mins+=1440;return Math.max(0,(mins-Number(awake||0))/60)}
function ftSleepPreview(){const start=document.getElementById('sleepStart')?.value||'',end=document.getElementById('sleepEnd')?.value||'',awake=Number(document.getElementById('sleepAwake')?.value)||0,h=ftSleepDuration(start,end,awake),el=document.getElementById('sleepCalc');if(el)el.innerHTML=h?`<b>${fmt(h,2)} hours</b><span class="muted tiny">Calculated sleep after subtracting ${fmt(awake)} awake minutes.</span>`:'<span class="muted">Enter bedtime and wake time.</span>'}
function ftSleepCard(d){const legacy=d.sleepLogged&&!d.sleepStart;return `<div class="card card-pad"><div class="section-title" style="margin-top:0"><h2>Sleep interval</h2><span class="pill ${d.sleepLogged?'good':''}">${d.sleepLogged?'Recorded':'Missing'}</span></div>${legacy?`<div class="audit-note" style="margin-bottom:12px">Existing duration-only record: ${fmt(d.sleep,1)} h. Enter times below to replace it with a clearer record.</div>`:''}<div class="sleep-grid"><div class="field"><label>Bedtime</label><input class="input" id="sleepStart" type="time" value="${d.sleepStart||''}"></div><div class="field"><label>Wake time</label><input class="input" id="sleepEnd" type="time" value="${d.sleepEnd||''}"></div><div class="field"><label>Awake during night (min)</label><input class="input" id="sleepAwake" type="number" min="0" max="600" value="${d.awakeMinutes||0}"></div><div class="field"><label>Sleep quality</label><select class="select" id="sleepQuality"><option value="">Select</option>${['Poor','Fair','Good','Excellent'].map(x=>`<option ${d.sleepQuality===x?'selected':''}>${x}</option>`).join('')}</select></div></div><div class="sleep-result" id="sleepCalc">${d.sleepLogged?`<b>${fmt(d.sleep,2)} hours</b><span class="muted tiny">${d.sleepStart?`${d.sleepStart} to ${d.sleepEnd}`:'Duration-only record'}</span>`:'<span class="muted">Enter bedtime and wake time.</span>'}</div><div class="activity-form-actions" style="margin-top:12px"><button class="btn primary" data-save-sleep-times="1">Save sleep</button><button class="btn danger-btn" data-clear-sleep="1">Clear sleep</button></div></div>`}
function ftActivityHistoryV4(){return Array.from({length:7},(_,i)=>{const dt=new Date(state.selectedDate+'T12:00:00');dt.setDate(dt.getDate()-i);const key=localDate(dt),x=state.diary[key]||{},steps=Number(x.steps)||0,sleep=Number(x.sleep)||0;return `<button class="history-row ${key===state.selectedDate?'active':''}" data-activity-date="${key}"><span>${dt.toLocaleDateString(undefined,{weekday:'short',day:'numeric'})}</span><div><div class="history-bar"><i style="width:${pct(steps,state.profile.stepGoal)}%"></i></div><div class="tiny muted">${sleep?`${fmt(sleep,1)} h sleep`:'No sleep'}</div></div><b>${fmt(steps)}</b></button>`}).join('')}
function ftStepLogV4(d){return d.stepEntries.length?`<div class="activity-log">${d.stepEntries.map(x=>`<div class="activity-log-row"><div><b>+${fmt(x.steps)} steps</b><div class="tiny muted">${escapeHtml(x.source||'Manual')} · ${escapeHtml(x.time||'')}</div></div><button class="btn small danger-btn" data-remove-step-entry="${x.id}">Remove</button></div>`).join('')}</div>`:'<div class="empty">No separate walk sessions logged.</div>'}
window.renderActivityV4=function(){const d=dayData(),logged=d.stepLogged||Number(d.steps)>0,updated=d.stepUpdatedAt||'not updated';return `${pageHead('Activity and sleep',`Daily movement and recovery for ${new Date(state.selectedDate+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'short'})}`,`<button class="btn outline small" data-log-steps="1">Quick steps</button>`)}<div class="activity-explainer"><b>Selected-date tracker:</b> everything on this page is saved to the date shown at the top. Set the full step total from your phone/watch. Add a walk only when it is not already included in that total. Sleep is calculated automatically from bedtime and wake time.</div><div class="activity-layout" style="margin-top:14px"><div class="stack"><div class="card activity-hero"><div class="activity-status"><span class="pill ${logged?'good':''}">${logged?'Steps recorded':'Steps missing'}</span><span class="pill">Goal ${fmt(state.profile.stepGoal)}</span></div><div><div class="activity-total">${logged?fmt(d.steps):'—'} <small>steps</small></div><div class="step-source-line">${logged?escapeHtml(d.stepSource||'Manual'):'No source selected'} · ${updated}</div></div><div class="progress"><i style="width:${pct(d.steps,state.profile.stepGoal)}%"></i></div><div class="activity-form"><div class="field"><label>Daily step total</label><input class="input" id="activityStepsTotal" type="number" min="0" step="1" value="${logged?d.steps:''}" placeholder="Example: 8432"><div class="field-help">Enter the full total shown by your device.</div></div><div class="field"><label>Source</label><select class="select" id="activityStepSource">${['Manual','iPhone / Apple Health','Android / Google Fit','Smartwatch','Treadmill','Other'].map(x=>`<option ${x===d.stepSource?'selected':''}>${x}</option>`).join('')}</select></div><div class="activity-form-actions full"><button class="btn primary" data-save-steps-total="1">Set daily total</button><button class="btn danger-btn" data-clear-steps="1">Clear</button></div></div><div><div class="strong" style="margin-bottom:9px">Add a walk not included above</div><div class="quick-step-grid">${[500,1000,2000].map(v=>`<button class="btn outline" data-add-steps="${v}">+${fmt(v)} steps</button>`).join('')}</div></div></div>${ftSleepCard(d)}<div class="card card-pad"><div class="section-title" style="margin-top:0"><h2>Activity note</h2></div><textarea class="textarea" id="activityNote" placeholder="Walk route, soreness, energy, recovery...">${escapeHtml(d.activityNote||'')}</textarea></div></div><div class="stack"><div class="card card-pad"><div class="section-title" style="margin-top:0"><h2>Last 7 days</h2><small>Tap a day to edit</small></div>${ftActivityHistoryV4()}</div><div class="card card-pad"><div class="section-title" style="margin-top:0"><h2>Walk/session log</h2><small>${d.stepEntries.length} entries</small></div>${ftStepLogV4(d)}</div></div></div>`}
