function ftMetricNav(label,value,target,unit,nav,logged=true){return `<button class="card metric-card metric-button clickable-card" data-nav="${nav}" aria-label="Open ${label}"><div class="metric-label">${label}</div><div class="metric-value">${logged?fmt(value,1):'—'} <span>/ ${fmt(target,1)} ${unit}</span></div><div class="progress"><i style="width:${logged?pct(value,target):0}%"></i></div></button>`}
checklistItems=function(){const d=dayData(),t=calcTargets(),x=totalsForDay(),p=workoutForDate();syncWorkoutCompletion();const mainLogged=['Breakfast','Lunch','Dinner'].filter(m=>d.meals[m]?.length).length,calLow=Math.round(t.calories*.85),calHigh=Math.round(t.calories*1.1),calDone=x.kcal>=calLow&&x.kcal<=calHigh;return [
 {label:'Calories within plan',done:calDone,detail:x.kcal<calLow?`${fmt(calLow-x.kcal)} kcal remaining before minimum`:x.kcal>calHigh?`${fmt(x.kcal-calHigh)} kcal above range`:'Within target range',nav:'diary'},
 {label:'Protein target',done:x.protein>=t.protein,detail:`${fmt(x.protein,1)} / ${fmt(t.protein)} g`,nav:'diary'},
 {label:'Main meals recorded',done:mainLogged===3,detail:`${mainLogged} / 3 meals`,action:'chooseMeal'},
 {label:p.exercises.length?'Workout completed':'Recovery day',done:p.exercises.length?d.workout.completed:true,detail:p.exercises.length?p.name:'No strength workout scheduled',nav:'workout'},
 {label:'Steps recorded',done:Boolean(d.stepLogged||Number(d.steps)>0),detail:d.stepLogged||d.steps?`${fmt(d.steps)} steps recorded`:'No total recorded',nav:'activity'},
 {label:'Steps goal reached',done:Number(d.steps)>=state.profile.stepGoal,detail:`${fmt(d.steps)} / ${fmt(state.profile.stepGoal)}`,nav:'activity'},
 {label:'Water goal',done:d.water>=state.profile.waterGoal,detail:`${fmt(d.water/1000,1)} / ${fmt(state.profile.waterGoal/1000,1)} L`,nav:'water'},
 {label:'Sleep recorded',done:Boolean(d.sleepLogged),detail:d.sleepLogged?`${fmt(d.sleep,1)} h recorded`:'Bedtime and wake time missing',nav:'activity'},
 {label:'Sleep goal reached',done:Boolean(d.sleepLogged)&&d.sleep>=state.profile.sleepGoal,detail:`${fmt(d.sleep,1)} / ${fmt(state.profile.sleepGoal,1)} h`,nav:'activity'},
 {label:'Fiber target',done:x.fiber>=t.fiber,detail:`${fmt(x.fiber,1)} / ${fmt(t.fiber)} g`,nav:'diary'}]}
renderDashboard=function(){const d=dayData(),t=calcTargets(),x=totalsForDay(),checks=checklistItems(),missing=checks.filter(c=>!c.done),remaining={k:Math.max(0,t.calories-x.kcal),p:Math.max(0,t.protein-x.protein),w:Math.max(0,state.profile.waterGoal-d.water),s:Math.max(0,state.profile.stepGoal-d.steps)};return `${pageHead(`Today, ${state.profile.name}`,`${new Date(state.selectedDate+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'})}`,`<button class="btn outline small" data-nav="settings">Edit goals</button>`)}<div class="grid grid-lg-2"><div class="card hero-card"><div class="ring" style="--p:${pct(x.kcal,t.calories)}"><div class="ring-content"><b>${fmt(x.kcal)}</b><span>of ${fmt(t.calories)} kcal</span></div></div><div><div class="strong">Daily nutrition</div>${['protein','carbs','fat'].map(k=>`<div class="macro-row"><label>${k[0].toUpperCase()+k.slice(1)}</label><div class="progress"><i style="width:${pct(x[k],t[k])}%"></i></div><b>${fmt(x[k])}/${fmt(t[k])}g</b></div>`).join('')}<div class="tiny muted">Remaining: ${fmt(remaining.k)} kcal · ${fmt(remaining.p)} g protein</div></div></div><div class="grid grid-2">${ftMetricNav('Steps',d.steps,state.profile.stepGoal,'steps','activity',d.stepLogged||d.steps>0)}${ftMetricNav('Water',d.water/1000,state.profile.waterGoal/1000,'L','water',true)}${ftMetricNav('Weight',latestWeight(),state.profile.goalWeight,'kg','progress',true)}${ftMetricNav('Sleep',d.sleep,state.profile.sleepGoal,'h','activity',d.sleepLogged)}</div></div><div class="section-title"><h2>Quick actions</h2></div><div class="quick-grid activity-actions"><button class="quick-btn" data-choose-meal="1">Log food<small>Breakfast, lunch, dinner and more</small></button><button class="quick-btn" data-log-steps="1">Log steps<small>${fmt(remaining.s)} remaining</small></button><button class="quick-btn" data-nav="workout">Log workout<small>Track every set</small></button><button class="quick-btn" data-nav="water">Log water<small>${fmt(remaining.w)} ml remaining</small></button><button class="quick-btn" data-nav="activity">Log sleep<small>Bedtime and wake time</small></button><button class="quick-btn" data-measure="1">Body stats<small>Weight and waist</small></button></div><div class="grid grid-lg-2"><div><div class="section-title"><h2>Daily checklist</h2><small>${checks.length-missing.length}/${checks.length}</small></div><div class="card card-pad check-list">${missing.length?`<div class="missing-banner"><b>${missing.length} checks still incomplete</b><span>${missing.slice(0,3).map(x=>x.label).join(', ')}</span></div>`:''}${checks.map(c=>`<div class="check-row auto-check ${c.done?'done':'missing'}"><span class="status-dot">${c.done?'✓':'!'}</span><div class="auto-check-main"><b>${c.label}</b><span>${c.detail}</span></div>${c.done?'':c.action==='chooseMeal'?`<button class="btn small outline" data-choose-meal="1">Add</button>`:`<button class="btn small outline" data-nav="${c.nav}">Open</button>`}</div>`).join('')}</div></div><div><div class="section-title"><h2>What to eat next</h2><button class="btn small outline" data-apply-today-plan="1">Fill empty meals</button></div>${renderSuggestions()}</div></div><div class="section-title"><h2>Today’s plan</h2><button class="btn small outline" data-nav="plans">Full plan</button></div><div class="card card-pad">${todayPlanPreview()}</div><div class="section-title"><h2>Daily notes</h2></div><div class="card card-pad"><textarea class="textarea" id="dailyNotes" placeholder="Energy, hunger, pain, wins, observations...">${escapeHtml(d.notes||'')}</textarea></div>`}

function ftAddWater(amount,label){const d=dayData(),v=Math.max(0,Number(amount)||0);if(!v)return;d.waterEntries.push({id:'water-'+Date.now()+'-'+Math.random().toString(16).slice(2),amount:v,label:label||`${v} ml`,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});d.water=round(d.waterEntries.reduce((s,x)=>s+Number(x.amount||0),0));render();toast(`Added ${fmt(v)} ml`)}

tton>`}).join('')}</div>`}

ass="set-input" inputmode="decimal" data-set-result="${e.id}|${i}" value="${escapeHtml(s.result||'')}" placeholder="${timed?'sec':'reps'}"><input class="set-input" type="number" min="0" max="5" data-set-rir="${e.id}|${i}" value="${escapeHtml(s.rir||'')}" placeholder="RIR"><button class="set-check ${s.done?'done':''}" data-set-done-v4="${e.id}|${i}">✓</button></div>`:`<div class="set-row"><span class="set-label">${i+1}</span><input class="set-input" type="number" inputmode="decimal" min="0" step="0.5" data-set-weight="${e.id}|${i}" value="${escapeHtml(s.weight||'')}" placeholder="kg"><input class="set-input" inputmode="numeric" data-set-result="${e.id}|${i}" value="${escapeHtml(s.result||'')}" placeholder="reps"><input class="set-input" type="number" min="0" max="5" data-set-rir="${e.id}|${i}" value="${escapeHtml(s.rir||'')}" placeholder="RIR"><button class="set-check ${s.done?'done':''}" data-set-done-v4="${e.id}|${i}">✓</button></div>`).join('')}</div><div class="set-actions"><button class="btn small outline" data-add-set="${e.id}">Add set</button>${log.sets.length>1?`<button class="btn small outline" data-remove-set="${e.id}">Remove last</button>`:''}<button class="btn small outline" data-rest-timer="${ftRestSeconds(e.rest)}">Rest ${escapeHtml(e.rest)}</button></div></div>`}
renderWorkout=function(){const p=workoutForDate(),d=dayData(),days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];syncWorkoutCompletion();const completed=p.exercises.filter(id=>exerciseDone(exById(id),ensureSetLog(exById(id),d))).length;return `${pageHead('Workout','Log each set, compare previous performance and use RIR',`<button class="btn outline small" data-edit-workout="1">Edit day</button>`)}<div class="tabs">${days.map((x,i)=>{const plan=state.workoutPlan.find(p=>p.day===i);return `<button class="tab ${p.day===i?'active':''}" data-workout-day-v4="${i}">${x} · ${plan?.name||'Rest'}</button>`}).join('')}</div><div class="card exercise-card" style="margin-top:12px"><div class="food-card-top"><div><h3>${p.name}</h3><p>${p.type} · ${p.exercises.length} activities</p><div class="workout-progress-note">${completed}/${p.exercises.length} activities completed</div></div><span class="pill good">Research aligned</span></div><div style="margin-top:10px">${p.exercises.map(id=>renderExercise(exById(id),d)).join('')||'<div class="empty">Rest, gentle walking and mobility as comfortable.</div>'}</div>${p.exercises.length?`<button class="btn ${d.workout.completed?'outline':'primary'} wide" style="margin-top:14px" data-finish-workout-v4="1">${d.workout.completed?'All logged sets completed':'Complete filled sets'}</button>`:''}</div><div class="section-title"><h2>Logging guide</h2></div><div class="card card-pad"><div class="notice">Enter actual load and reps for every set. RIR means how many good repetitions you believe remained. A set cannot be marked complete until its result is entered. Previous-session values are shown for comparison.</div></div>`}

/* ---------- practical weekly plans ---------- */
function ftRecipeAllowed(r){const ex=(state.profile.excludedFoods||'').toLowerCase().split(',').map(x=>x.trim()).filter(Boolean);const text=[r.name,...(r.ingredients||[])].join(' ').toLowerCase();return !ex.some(x=>text.includes(x))}
function ftMondayOfSelected(){const dt=new Date(state.selectedDate+'T12:00:00'),day=dt.getDay(),diff=day===0?-6:1-day;dt.setDate(dt.getDate()+diff);return dt}
function ftPlanDate(index){const dt=ftMondayOfSelected();dt.setDate(dt.getDate()+index);return localDate(dt)}
function ftMealPools(){const allowed=allRecipes().filter(r=>dietAllowed(r.diet)&&ftRecipeAllowed(r)&&(r.goal||[]).includes(state.profile.goal));const by={};FT_CORE_MEALS.forEach(m=>by[m]=allowed.filter(r=>r.meal===m));return by}
function ftWeeklyPlan(){const by=ftMealPools();return Array.from({length:7},(_,i)=>{const meals={};FT_CORE_MEALS.forEach((m,j)=>{const pool=by[m];meals[m]=pool.length?pool[(i+j)%pool.length]:null});const base=FT_CORE_MEALS.reduce((s,m)=>s+(meals[m]?.macros?.kcal||0),0),scale=base?clamp(calcTargets().calories/base,.75,1.35):1;return {date:ftPlanDate(i),meals,scale,total:{kcal:round(base*scale),protein:round(FT_CORE_MEALS.reduce((s,m)=>s+(meals[m]?.macros?.protein||0),0)*scale),carbs:round(FT_CORE_MEALS.reduce((s,m)=>s+(meals[m]?.macros?.carbs||0),0)*scale),fat:round(FT_CORE_MEALS.reduce((s,m)=>s+(meals[m]?.macros?.fat||0),0)*scale)}}})}
renderPlans=function(){const t=calcTargets(),days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'],plan=ftWeeklyPlan();return `${pageHead('Adaptive plans',`Meal types and portions adapt to your ${goalLabel().toLowerCase()} target`,`<button class="btn outline small" data-nav="settings">Change goal</button>`)}<div class="grid grid-2 grid-lg-4">${metricCard('Target calories',t.calories,t.tdee,'kcal')}${metricCard('Protein',t.protein,t.protein,'g')}${metricCard('Expected rate',state.profile.goal==='fat_loss'?state.profile.rate:0,Math.max(state.profile.rate,.1),'kg/wk')}${metricCard('Training',state.profile.workoutDays,4,'days')}</div><div class="section-title"><h2>Weekly meal plan</h2><small>Preview before applying</small></div><div class="grid grid-lg-2">${days.map((day,i)=>{const p=plan[i];return `<div class="card plan-day"><div class="food-card-top"><div><h3>${day}</h3><div class="plan-date">${new Date(p.date+'T12:00:00').toLocaleDateString(undefined,{day:'numeric',month:'short'})}</div></div><button class="btn small primary" data-preview-plan-day="${i}">Review and add</button></div><div class="plan-total"><span class="pill good">${p.total.kcal} kcal</span><span class="pill">P ${p.total.protein}g</span><span class="pill">C ${p.total.carbs}g</span><span class="pill">F ${p.total.fat}g</span></div>${FT_CORE_MEALS.map(m=>`<div class="plan-meal"><span>${m}</span><b>${escapeHtml(p.meals[m]?.name||'No suitable recipe')}</b>${p.meals[m]?`<button class="btn small outline" data-view-recipe="${p.meals[m].id}">View</button>`:'<span></span>'}</div>`).join('')}<div class="unit-note">Portion multiplier: ${fmt(p.scale,2)}× to approach your calorie target.</div></div>`}).join('')}</div><div class="section-title"><h2>Weekly workout structure</h2></div><div class="card card-pad">${[...state.workoutPlan].sort((a,b)=>(a.day||7)-(b.day||7)).map(p=>`<div class="check-row"><div><div class="strong">${['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][p.day]} · ${p.name}</div><div class="tiny muted">${p.exercises.length?p.exercises.map(id=>exById(id).name).slice(0,3).join(', '):'Recovery'}</div></div><span class="pill">${p.type}</span></div>`).join('')}</div>`}
function ftApplyPlanDay(index){const p=ftWeeklyPlan()[index],d=dayData(p.date);FT_CORE_MEALS.forEach(m=>{if(d.meals[m].length||!p.meals[m])return;const r=p.meals[m],scale=p.scale;d.meals[m].push({kind:'recipe',ref:r.id,name:r.name,serving:round(scale,2),unit:'serving',...Object.fromEntries(Object.entries(r.macros).map(([k,v])=>[k,round(v*scale,1)]))})});state.selectedDate=p.date;closeModal();render();toast(`Plan added to ${new Date(p.date+'T12:00:00').toLocaleDateString()}`)}

/* ---------- progress ---------- */
function ftWeeklySummaryV4(){let sumC=0,sumP=0,sumS=0,loggedDays=0,stepDays=0,mealDays=0,w=0;for(let i=0;i<7;i++){const dt=new Date(state.selectedDate+'T12:00:00');dt.setDate(dt.getDate()-i);const key=localDate(dt),day=state.diary[key];if(!day)continue;const hasMeals=MEALS.some(m=>day.meals?.[m]?.length);if(hasMeals){const x=totalsForDay(key);sumC+=x.kcal;sumP+=x.protein;mealDays++}if(day.stepLogged||day.steps){sumS+=Number(day.steps)||0;stepDays++}if(hasMeals||day.stepLogged||day.sleepLogged||day.water||day.workout?.completed)loggedDays++;if(day.workout?.completed)w++}return {avgCalories:mealDays?round(sumC/mealDays):0,avgProtein:mealDays?round(sumP/mealDays):0,avgSteps:stepDays?round(sumS/stepDays):0,workouts:w,loggedDays,mealDays,stepDays}}
renderProgress=function(){const ms=[...state.measurements].sort((a,b)=>a.date.localeCompare(b.date)),latest=ms.at(-1)||{},first=ms[0]||{},week=ftWeeklySummaryV4();return `${pageHead('Progress','Weight, waist, adherence and transparent weekly averages',`<button class="btn primary small" data-measure="1">Add measurement</button>`)}<div class="stats-grid grid-lg-4"><div class="stat-box"><span>Current weight</span><b>${latest.weight?`${fmt(latest.weight,1)} kg`:'Not logged'}</b></div><div class="stat-box"><span>Total change</span><b class="${latest.weight&&first.weight&&latest.weight<=first.weight?'accent':''}">${latest.weight&&first.weight?`${fmt(latest.weight-first.weight,1)} kg`:'—'}</b></div><div class="stat-box"><span>Current waist</span><b>${latest.waist?`${fmt(latest.waist,1)} cm`:'Not logged'}</b></div><div class="stat-box"><span>Goal weight</span><b>${fmt(state.profile.goalWeight,1)} kg</b></div></div><div class="section-title"><h2>Trend</h2><select class="select" id="chartMetric" aria-label="Chart metric" style="width:auto"><option value="weight">Weight</option><option value="waist">Waist</option><option value="bodyFat">Body fat</option></select></div><div class="card chart-card"><div class="chart-wrap"><canvas id="progressChart"></canvas></div></div><div class="section-title"><h2>Last 7 days</h2><small>${week.loggedDays} of 7 days contain data</small></div><div class="grid grid-2 grid-lg-4">${metricCard('Avg calories',week.avgCalories,calcTargets().calories,'kcal')}${metricCard('Avg protein',week.avgProtein,calcTargets().protein,'g')}${metricCard('Avg steps',week.avgSteps,state.profile.stepGoal,'steps')}${metricCard('Workouts',week.workouts,state.profile.workoutDays,'done')}</div><div class="audit-note" style="margin-top:10px">Calories/protein average uses ${week.mealDays} logged food day${week.mealDays===1?'':'s'}. Step average uses ${week.stepDays} logged step day${week.stepDays===1?'':'s'}, not missing days.</div><div class="section-title"><h2>Measurement history</h2></div><div class="card card-pad">${ms.length?ms.slice().reverse().map((m,i)=>`<div class="check-row"><div><div class="strong">${m.date}</div><div class="tiny muted">${m.weight?`${m.weight} kg`:''}${m.waist?` · waist ${m.waist} cm`:''}${m.bodyFat?` · body fat ${m.bodyFat}%`:''}</div></div><button class="btn small danger-btn" data-delete-measure-v4="${ms.length-1-i}">Delete</button></div>`).join(''):'<div class="empty">No measurements yet.</div>'}</div>`}

e)>.9?'<div class="notice" style="margin-top:12px">A rapid target can increase hunger, fatigue and muscle loss. Review with a clinician or dietitian.</div>':''}<div class="notice" style="margin-top:12px">Starting estimate: BMR ${fmt(t.bmr)} kcal, maintenance ${fmt(t.tdee)} kcal, target ${fmt(t.calories)} kcal. Real needs vary; adjust from 2–3 weeks of weight trend and adherence.</div></div></details><details class="card settings-section"><summary>Nutrition preferences</summary><div class="settings-section-body"><div class="form-grid"><div class="field"><label for="p-diet">Diet preference</label><select class="select" id="p-diet"><option value="mixed" ${p.diet==='mixed'?'selected':''}>Vegetarian + egg + non-veg</option><option value="eggetarian" ${p.diet==='eggetarian'?'selected':''}>Vegetarian + egg</option><option value="vegetarian" ${p.diet==='vegetarian'?'selected':''}>Vegetarian</option></select></div>${field('Protein target (g/kg)','proteinPerKg','number','step="0.1" min="1" max="2.4"')}${field('Fiber goal (g)','fiberGoal')}${field('Excluded foods, comma separated','excludedFoods','text','placeholder="beef, mushrooms"')}${field('Allergies / medical exclusions','allergies','text','placeholder="For your reference"')}${field('Maximum recipe time (minutes)','maxPrepTime')}</div></div></details><details class="card settings-section"><summary>Activity and recovery goals</summary><div class="settings-section-body"><div class="form-grid">${field('Workout days/week','workoutDays','number','min="1" max="7"')}${field('Daily steps','stepGoal')}${field('Water goal (ml)','waterGoal','number','step="250"')}${field('Sleep goal (hours)','sleepGoal','number','step="0.5"')}</div></div></details><details class="card settings-section"><summary>Manual calorie and macro targets</summary><div class="settings-section-body"><div class="toggle"><div><b>Adaptive targets</b><div class="tiny muted">Recalculate from profile and goal.</div></div><button class="switch ${p.adaptive?'on':''}" data-toggle-adaptive="1"><i></i></button></div><div id="manualTargets" class="form-grid ${p.adaptive?'hidden':''}" style="margin-top:12px">${field('Calories','manualCalories')}${field('Protein (g)','manualProtein')}${field('Carbs (g)','manualCarbs')}${field('Fat (g)','manualFat')}</div></div></details><details class="card settings-section" open><summary>Appearance and data</summary><div class="settings-section-body"><div class="field"><label for="themeSelect">Theme</label><select class="select" id="themeSelect" aria-label="App theme"><option value="system" ${(state.settings?.theme||'system')==='system'?'selected':''}>System (follow OS)</option><option value="light" ${state.settings?.theme==='light'?'selected':''}>Light</option><option value="dark" ${state.settings?.theme==='dark'?'selected':''}>Dark</option></select></div><div class="field"><label for="accentPicker">Accent colour</label><input class="input" id="accentPicker" type="color" value="${p.accent}"></div><div class="divider"></div><div class="grid grid-2"><button class="btn outline" data-export-json="1">Export JSON backup</button><button class="btn outline" data-export-csv="1">Export diary CSV</button><button class="btn outline" data-import-json="1">Import JSON</button><button class="btn outline" data-import-foods="1">Import foods CSV</button></div><input type="file" id="jsonFile" accept="application/json" class="hidden"><input type="file" id="foodCsvFile" accept=".csv,text/csv" class="hidden"><button class="btn danger-btn wide" style="margin-top:12px" data-reset="1">Erase local data</button></div></details></div><button class="btn primary wide" style="margin-top:14px" data-save-profile-v4="1">Save all settings</button><div class="section-title"><h2>Data and evidence notes</h2></div><div class="stack"><div class="card source-card"><b>Nutrition values</b><p class="muted tiny">Reference foods use IFCT/USDA mappings where available. Composite dishes are recipe or label estimates and must be treated as approximate.</p></div><div class="card source-card"><b>Training</b><p class="muted tiny">Plans use progressive resistance training principles, but exercise selection and loads must be adapted to pain, equipment, technique and medical status.</p></div><div class="notice">Educational tracker only. It does not diagnose conditions or replace individual medical or dietetic advice.</div></div>`}

 if(b.dataset.saveServingItem){const [meal,idx]=b.dataset.saveServingItem.split('|'),item=dayData().meals[meal][Number(idx)],f=foodById(item.ref),p=b.dataset.prefix,q=Number(document.getElementById(p+'-qty')?.value)||1,key=document.getElementById(p+'-unit')?.value||'grams',x=ftMacroByServing(f,q,key);Object.assign(item,{quantity:q,servingKey:key,servingLabel:x.serving.label,grams:round(x.grams,1),unit:key==='grams'?'g':x.serving.label,...Object.fromEntries(['kcal','protein','carbs','fat','fiber'].map(k=>[k,round(x[k],1)]))});closeModal();render();toast('Diary item updated');return}
 if(b.dataset.removeItemV4){const [meal,idx]=b.dataset.removeItemV4.split('|'),arr=dayData().meals[meal],item=arr.splice(Number(idx),1)[0];render();ftShowUndo(`${item.name} removed`,()=>{arr.splice(Number(idx),0,item);render()});return}
 if('undoLast' in b.dataset){if(ftUndo)ftUndo();ftUndo=null;clearTimeout(ftUndoTimer);document.getElementById('ftUndoBar')?.remove();return}
 if(b.dataset.copyMeal){const meal=b.dataset.copyMeal,dt=new Date(state.selectedDate+'T12:00:00');dt.setDate(dt.getDate()-1);const prev=state.diary[localDate(dt)]?.meals?.[meal]||[];if(!prev.length){toast('No previous meal to copy');return}dayData().meals[meal].push(...deepClone(prev));render();toast(`Copied previous ${meal.toLowerCase()}`);return}
 if('saveCustomFoodV4' in b.dataset){const name=document.getElementById('cf-name').value.trim(),serving=Math.max(.1,Number(document.getElementById('cf-serving').value)||100),label=document.getElementById('cf-unit-label').value.trim()||'1 serving';if(!name){alert('Enter a food name.');return}const f={id:'custom-'+Date.now(),name,category:document.getElementById('cf-category').value||'Custom',diet:document.getElementById('cf-diet').value,servingG:serving,kcal:Number(document.getElementById('cf-kcal').value)||0,protein:Number(document.getElementById('cf-protein').value)||0,carbs:Number(document.getElementById('cf-carbs').value)||0,fat:Number(document.getElementById('cf-fat').value)||0,fiber:Number(document.getElementById('cf-fiber').value)||0,source:document.getElementById('cf-source').value||'User supplied',basis:'per 100 g',custom:true,aliases:document.getElementById('cf-aliases').value.split(',').map(x=>x.trim()).filter(Boolean),quality:'User supplied',servings:[{key:'serving',label,grams:serving}]};state.customFoods.push(f);closeModal();render();toast('Custom food saved');return}

(()=>{
'use strict';

const ftV5DayDataBase=dayData;

 'marie-biscuit':[['piece','1 biscuit',7]],'digestive-biscuit':[['piece','1 biscuit',15]],'protein-bar':[['piece','1 bar',60]],
 'paneer-tikka':[['piece','1 tikka piece',30],['serving','1 plate',150]],'chicken-tikka':[['piece','1 tikka piece',30],['serving','1 plate',150]],
 'chicken-kebab':[['piece','1 kebab',45],['serving','1 plate',150]],'fish-tikka':[['piece','1 tikka piece',35],['serving','1 plate',160]],
 'gulab-jamun':[['piece','1 piece',50]],'rasgulla':[['piece','1 piece',50]],'jalebi':[['piece','1 small jalebi',25]],'milk-barfi':[['piece','1 piece',40]],
 'pav-bhaji':[['plate','1 plate',350]],'bhel-puri':[['bowl','1 bowl',180]],'sweet-corn-chaat':[['cup','1 cup',160]],
 'tea-milk-sugar':[['cup','1 cup',180]],'tea-milk-no-sugar':[['cup','1 cup',180]],'coffee-milk-sugar':[['cup','1 cup',200]],
 'sweet-lassi':[['glass','1 glass',300]],'salted-lassi':[['glass','1 glass',300]],'orange-juice':[['glass','1 glass',250]],
 'coconut-water':[['glass','1 glass',250]],'protein-powder':[['scoop','1 scoop',30]],'whey-protein':[['scoop','1 scoop',30]]
};
Object.entries(FT_V5_SERVINGS).forEach(([id,list])=>{const f=allFoods().find(x=>x.id===id);if(f&&!Array.isArray(f.servings))f.servings=list.map(x=>({key:x[0],label:x[1],grams:x[2]}));});

function ftV5Normalize(s){
 return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\b(pulav|pulaav|pulau)\b/g,'pulao').replace(/\b(omlet|omelet)\b/g,'omelette').replace(/\bidly\b/g,'idli').replace(/\bpakoda\b/g,'pakora').replace(/\byoghurt\b/g,'yogurt').replace(/\bdahi\b/g,'curd').replace(/\bgolgappa\b/g,'pani puri').replace(/\bphulka\b/g,'roti').replace(/\s+/g,' ').trim();
}
function ftV5Distance(a,b){a=ftV5Normalize(a);b=ftV5Normalize(b);const m=a.length,n=b.length;if(!m)return n;if(!n)return m;const d=Array.from({length:m+1},()=>Array(n+1).fill(0));for(let i=0;i<=m;i++)d[i][0]=i;for(let j=0;j<=n;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return d[m][n];}
function ftV5FoodText(f){return ftV5Normalize([f.name,f.category,...(f.aliases||[])].join(' '));}
function ftV5SearchScore(f,q){
 const nq=ftV5Normalize(q),text=ftV5FoodText(f),name=ftV5Normalize(f.name);if(!nq)return 50;

}
function ftV5FoodAllowed(f){const ex=String(state.profile.excludedFoods||'').toLowerCase().split(',').map(x=>x.trim()).filter(Boolean);return !ex.some(x=>ftV5FoodText(f).includes(ftV5Normalize(x)));}

function ftV5DecorateFoodCards(){

}
const ftV5OldFilterFoods=filterFoods;

 let arr=allFoods().filter(f=>(cat==='All'||f.category===cat)&&(foodDiet==='all'||f.diet===foodDiet)&&ftV5FoodAllowed(f));

 const el=document.getElementById('foodList');if(el){el.innerHTML=arr.length?foodCards(arr):`<div class="card card-pad"><div class="empty">No matching food. Try another spelling or create a custom food.</div><button class="btn primary wide" data-custom-food-query="${escapeHtml(q)}">Create “${escapeHtml(q||'custom food')}”</button></div>`;el.insertAdjacentHTML('beforebegin',`<div class="search-result-count" id="v5SearchCount">${arr.length} result${arr.length===1?'':'s'}${q?` for “${escapeHtml(q)}”`:''}</div>`);document.querySelectorAll('#v5SearchCount').forEach((n,i)=>{if(i) n.remove()});requestAnimationFrame(ftV5DecorateFoodCards);}

function ftV5QuickFoodCard(f){return `<div class="card quick-food"><h3>${escapeHtml(f.name)}</h3><p>${escapeHtml(f.category)} · ${escapeHtml(f.source||'Reference/estimate')}</p><div class="quick-food-actions"><button class="btn small primary" data-direct-add="${f.id}">Add</button><button class="favorite-btn ${state.favourites.includes(f.id)?'on':''}" data-v5-favorite="${f.id}" aria-label="Toggle favourite">${state.favourites.includes(f.id)?'★':'☆'}</button></div></div>`;}

renderDiary=function(){const d=dayData(),t=calcTargets(),x=totalsForDay();return `${pageHead('Food diary','Meals and nutrition for the selected date',`<div class="diary-tools"><button class="btn outline small" data-v5-copy-yesterday="1">Copy yesterday</button><button class="btn primary small" data-choose-meal="1">Add item</button></div>`)}<div class="summary-strip">${[['Calories',x.kcal,t.calories,'kcal'],['Protein',x.protein,t.protein,'g'],['Carbs',x.carbs,t.carbs,'g'],['Fat',x.fat,t.fat,'g'],['Fiber',x.fiber,t.fiber,'g']].map(a=>`<div class="summary-item"><span>${a[0]}</span><b>${fmt(a[1],1)}</b><small class="muted">/ ${fmt(a[2])}${a[3]}</small></div>`).join('')}</div><div class="section-title"><h2>Favourites and recent foods</h2><button class="btn small outline" data-nav="foods">Browse foods</button></div>${ftV5QuickShelf()}<div class="section-title"><h2>Suggested next meal</h2><button class="btn small outline" data-apply-today-plan="1">Fill empty meals</button></div>${renderSuggestions()}<div class="stack" style="margin-top:16px">${MEALS.map(m=>renderMeal(m,d.meals[m])).join('')}</div><div class="section-title"><h2>Activity and recovery</h2></div><div class="card activity-link-card"><div><b>Steps and sleep are tracked by date</b><p class="tiny muted">Log the total from your device and sleep from bedtime to wake time.</p></div><button class="btn primary small" data-nav="activity">Open activity</button></div>`;};

function ftV5Monday(){const d=new Date(state.selectedDate+'T12:00:00'),diff=d.getDay()===0?-6:1-d.getDay();d.setDate(d.getDate()+diff);return d;}
function ftV5PlanDate(i){const d=ftV5Monday();d.setDate(d.getDate()+i);return localDate(d);}
function ftV5ChooseRecipe(meal,index,targetK,targetP){let pool=allRecipes().filter(r=>ftV5RecipeAllowed(r)&&r.meal===meal);if(!pool.length)pool=allRecipes().filter(ftV5RecipeAllowed);return pool.map((r,ri)=>{const serving=clamp(targetK/Math.max(1,r.macros.kcal),.5,1.75),k=r.macros.kcal*serving,p=r.macros.protein*serving;return {r,serving,score:Math.abs(k-targetK)+Math.abs(p-targetP)*8+((ri+index)%Math.max(1,pool.length))*.01};}).sort((a,b)=>a.score-b.score)[0]||null;}
function ftV5WeeklyPlan(){const t=calcTargets(),days=[];for(let i=0;i<7;i++){const meals={};let total={kcal:0,protein:0,carbs:0,fat:0,fiber:0};FT_CORE_MEALS.forEach((m,j)=>{const share=FT_V5_MEAL_SHARE[m]||.25,choice=ftV5ChooseRecipe(m,i+j,t.calories*share,t.protein*share);if(!choice)return;meals[m]=choice;Object.keys(total).forEach(k=>total[k]+=Number(choice.r.macros[k]||0)*choice.serving);});Object.keys(total).forEach(k=>total[k]=round(total[k],1));days.push({date:ftV5PlanDate(i),meals,total});}return days;}
function ftV5SuggestionData(){const meal=['Breakfast','Lunch','Dinner','Snacks'].find(m=>!dayData().meals[m]?.length)||'Snacks',t=calcTargets(),x=totalsForDay(),share=FT_V5_MEAL_SHARE[meal]||.25,targetK=Math.min(Math.max(150,t.calories-x.kcal),t.calories*share*1.3),targetP=Math.min(Math.max(10,t.protein-x.protein),t.protein*share*1.4);let pool=allRecipes().filter(r=>ftV5RecipeAllowed(r)&&r.meal===meal);return pool.map(r=>{const serving=clamp(targetK/Math.max(1,r.macros.kcal),.5,1.5),k=r.macros.kcal*serving,p=r.macros.protein*serving;return {meal,r,serving,score:Math.abs(k-targetK)+Math.abs(p-targetP)*7};}).sort((a,b)=>a.score-b.score).slice(0,3);}
renderSuggestions=function(){const s=ftV5SuggestionData();return `<div class="suggestion-list">${s.length?s.map(({meal,r,serving})=>`<div class="card suggestion-card"><div class="suggestion-top"><div><h3>${escapeHtml(r.name)}</h3><p>${meal} · ${fmt(r.macros.kcal*serving)} kcal · ${fmt(r.macros.protein*serving,1)} g protein · ${fmt(serving,2)} serving</p></div><span class="pill">${r.diet==='nonveg'?'Non-veg':r.diet==='egg'?'Egg':'Veg'}</span></div><div class="recipe-actions"><button class="btn small outline" data-view-recipe="${r.id}">View</button><button class="btn small primary" data-v5-add-suggestion="${r.id}|${meal}|${serving}">Add to ${meal}</button></div></div>`).join(''):'<div class="audit-note">No suitable recipe matches the current diet, exclusions and preparation-time settings.</div>'}</div>`;};
renderPlans=function(){const t=calcTargets(),plan=ftV5WeeklyPlan(),days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];return `${pageHead('Adaptive plans',`Meals and portions adapt to your ${goalLabel().toLowerCase()} target`,`<button class="btn outline small" data-nav="settings">Change goal</button>`)}<div class="grid grid-2 grid-lg-4">${metricCard('Target calories',t.calories,t.tdee,'kcal')}${metricCard('Protein',t.protein,t.protein,'g')}${metricCard('Expected rate',state.profile.goal==='fat_loss'?state.profile.rate:0,Math.max(state.profile.rate,.1),'kg/wk')}${metricCard('Training',state.profile.workoutDays,4,'days')}</div><div class="section-title"><h2>Weekly meal plan</h2><small>Review the date and portions before applying</small></div><div class="grid grid-lg-2">${plan.map((p,i)=>{const dk=round(p.total.kcal-t.calories),dp=round(p.total.protein-t.protein);return `<div class="card plan-day"><div class="food-card-top"><div><h3>${days[i]}</h3><div class="plan-date">${new Date(p.date+'T12:00:00').toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'})}</div></div><button class="btn small primary" data-v5-preview-plan="${i}">Review and add</button></div><div class="plan-total"><span class="pill good">${fmt(p.total.kcal)} kcal</span><span class="pill">P ${fmt(p.total.protein)}g</span><span class="pill">C ${fmt(p.total.carbs)}g</span><span class="pill">F ${fmt(p.total.fat)}g</span></div><div class="tiny ${Math.abs(dk)<=100?'accent':'muted'}">Difference: ${dk>=0?'+':''}${dk} kcal · ${dp>=0?'+':''}${dp} g protein</div>${FT_CORE_MEALS.map(m=>{const c=p.meals[m];return `<div class="plan-target-row"><span>${m}</span><div><b>${escapeHtml(c?.r?.name||'No match')}</b>${c?`<small>${fmt(c.serving,2)} serving · ${fmt(c.r.macros.kcal*c.serving)} kcal · P ${fmt(c.r.macros.protein*c.serving,1)}g</small>`:''}</div>${c?`<button class="btn small outline" data-view-recipe="${c.r.id}">View</button>`:'<span></span>'}</div>`;}).join('')}</div>`;}).join('')}</div><div class="section-title"><h2>Weekly workout structure</h2></div><div class="card card-pad">${[...state.workoutPlan].sort((a,b)=>(a.day||7)-(b.day||7)).map(p=>`<div class="check-row"><div><div class="strong">${['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][p.day]} · ${p.name}</div><div class="tiny muted">${p.exercises.length?p.exercises.map(id=>exById(id).name).slice(0,3).join(', '):'Recovery'}</div></div><span class="pill">${p.type}</span></div>`).join('')}</div>`;};
function ftV5ApplyPlan(index){const p=ftV5WeeklyPlan()[index],d=dayData(p.date);let added=0;FT_CORE_MEALS.forEach(m=>{const c=p.meals[m];if(!c||d.meals[m].length)return;d.meals[m].push({kind:'recipe',ref:c.r.id,name:c.r.name,serving:round(c.serving,2),unit:'serving',...Object.fromEntries(Object.entries(c.r.macros).map(([k,v])=>[k,round(v*c.serving,1)]))});added++;});state.selectedDate=p.date;closeModal();render();toast(added?`Added ${added} meals to ${p.date}`:'No empty meal sections to fill');}
function ftV5ApplySelectedDatePlan(){const plan=ftV5WeeklyPlan(),idx=plan.findIndex(p=>p.date===state.selectedDate);if(idx>=0)return ftV5ApplyPlan(idx);const d=new Date(state.selectedDate+'T12:00:00'),i=(d.getDay()+6)%7;return ftV5ApplyPlan(i);}

/* Step-session clarity and sleep date wording. */
const ftV5ActivityBase=window.renderActivityV4;
window.renderActivityV4=function(){let html=ftV5ActivityBase();html=html.replace('Add a walk not included above','Add a walk or activity session').replace('<div class="quick-step-grid">','<div class="activity-session-box"><div class="unit-note">Use quick add only when these steps are not already included in the saved phone/watch total.</div><div class="quick-step-grid" style="margin-top:10px">').replace('</div></div></div>${ftSleepCard(d)}','</div><div class="activity-session-actions"><button class="btn outline" data-v5-custom-walk="1">Custom walk/session</button></div></div></div>${ftSleepCard(d)}').replace('<h2>Sleep interval</h2>','<h2>Sleep ending on selected date</h2>');return html;};

/* Exercise modes, per-session notes and discomfort. */
function ftV5DefaultMode(e){return ['plank','dead-bug'].includes(e.id)?'bodyweight':'external';}
function ftV5ModeLabel(mode){return {external:'External load',bodyweight:'Bodyweight only',added:'Bodyweight + added load',assisted:'Assisted machine'}[mode]||'External load';}
function ftV5LoadLabel(mode){return mode==='added'?'Added kg':mode==='assisted'?'Assistance kg':'Load kg';}
function ftV5LoadRequired(e,mode){return !['bodyweight'].includes(mode)&&!['plank','dead-bug'].includes(e.id);}
function ftV5PreviousLog(id){const dates=Object.keys(state.diary).filter(x=>x<state.selectedDate).sort().reverse();for(const date of dates){const log=state.diary[date]?.workout?.logs?.[id];if(log?.sets?.some(s=>s.result||s.weight))return {date,log};}return null;}
renderExercise=function(e,d){const log=ensureSetLog(e,d),done=exerciseDone(e,log);log.mode=log.mode||ftV5DefaultMode(e);if(e.group==='Cardio')return `<div class="exercise-block"><div class="exercise-header"><button class="exercise-check ${done?'done':''}" data-ex-check="${e.id}">✓</button><div><h3>${e.name}</h3><p>${e.reps} · ${e.cue}</p></div></div><div class="cardio-log"><div class="field"><label>Duration (min)</label><input class="set-input" type="number" min="0" step="1" data-cardio-duration="${e.id}" value="${log.cardio.duration||''}"></div><div class="field"><label>Distance (km, optional)</label><input class="set-input" type="number" min="0" step="0.1" data-cardio-distance="${e.id}" value="${log.cardio.distance||''}"></div><div class="field"><label>Effort RPE 1–10</label><input class="set-input" type="number" min="1" max="10" step="1" data-cardio-rpe="${e.id}" value="${log.cardio.rpe||''}"></div><button class="btn ${done?'outline':'primary'}" data-cardio-done="${e.id}">${done?'Completed':'Mark complete'}</button></div></div>`;
 const timed=/sec|min/i.test(e.reps),mode=log.mode,loadRequired=ftV5LoadRequired(e,mode),resultLabel=timed?'Time':'Reps',prev=ftV5PreviousLog(e.id);log.sets.forEach(s=>{if(s.rir===undefined)s.rir='';});return `<div class="exercise-block"><div class="exercise-header"><button class="exercise-check ${done?'done':''}" data-ex-check="${e.id}">✓</button><div><h3>${e.name}</h3><p>Target: ${e.sets} sets · ${e.reps}</p><p>${e.cue}</p>${prev?`<div class="previous-set">Previous ${prev.date} · ${ftV5ModeLabel(prev.log.mode||ftV5DefaultMode(e))}: ${prev.log.sets.map(s=>`${s.weight?`${s.weight} kg × `:''}${s.result||'—'}`).join(' · ')}</div>`:''}</div></div><div class="exercise-mode"><div class="field"><label>How are you performing this exercise?</label><select class="select" data-v5-exercise-mode="${e.id}">${[['external','External/machine load'],['bodyweight','Bodyweight only'],['added','Bodyweight + added load'],['assisted','Assisted machine']].map(([v,l])=>`<option value="${v}" ${mode===v?'selected':''}>${l}</option>`).join('')}</select></div><span class="pill">${ftV5ModeLabel(mode)}</span></div><div class="set-table v4">${loadRequired?`<div class="set-row head"><span>Set</span><span>${ftV5LoadLabel(mode)}</span><span>${resultLabel}</span><span>RIR</span><span>Done</span></div>`:`<div class="set-row head no-load"><span>Set</span><span>${resultLabel}</span><span>RIR</span><span>Done</span></div>`}${log.sets.map((s,i)=>loadRequired?`<div class="set-row"><span class="set-label">${i+1}</span><input class="set-input" type="number" inputmode="decimal" min="0" step="0.5" data-set-weight="${e.id}|${i}" value="${escapeHtml(s.weight||'')}" placeholder="kg"><input class="set-input" inputmode="numeric" data-set-result="${e.id}|${i}" value="${escapeHtml(s.result||'')}" placeholder="${timed?'sec':'reps'}"><input class="set-input" type="number" min="0" max="5" data-set-rir="${e.id}|${i}" value="${escapeHtml(s.rir||'')}" placeholder="RIR"><button class="set-check ${s.done?'done':''}" data-v5-set-done="${e.id}|${i}">✓</button></div>`:`<div class="set-row no-load"><span class="set-label">${i+1}</span><input class="set-input" inputmode="decimal" data-set-result="${e.id}|${i}" value="${escapeHtml(s.result||'')}" placeholder="${timed?'sec':'reps'}"><input class="set-input" type="number" min="0" max="5" data-set-rir="${e.id}|${i}" value="${escapeHtml(s.rir||'')}" placeholder="RIR"><button class="set-check ${s.done?'done':''}" data-v5-set-done="${e.id}|${i}">✓</button></div>`).join('')}</div><div class="set-actions"><button class="btn small outline" data-add-set="${e.id}">Add set</button>${log.sets.length>1?`<button class="btn small outline" data-remove-set="${e.id}">Remove last</button>`:''}<button class="btn small outline" data-rest-timer="${String(e.rest||'').includes('min')?(parseInt(e.rest)||1)*60:(parseInt(e.rest)||90)}">Rest ${escapeHtml(e.rest)}</button></div></div>`;};
renderWorkout=function(){const p=workoutForDate(),d=dayData(),days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];syncWorkoutCompletion();const completed=p.exercises.filter(id=>exerciseDone(exById(id),ensureSetLog(exById(id),d))).length;return `${pageHead('Workout','Log every set with the load mode that matches the exercise',`<button class="btn outline small" data-edit-workout="1">Edit day</button>`)}<div class="tabs">${days.map((x,i)=>{const plan=state.workoutPlan.find(p=>p.day===i);return `<button class="tab ${p.day===i?'active':''}" data-workout-day-v4="${i}">${x} · ${plan?.name||'Rest'}</button>`;}).join('')}</div><div class="card exercise-card" style="margin-top:12px"><div class="food-card-top"><div><h3>${p.name}</h3><p>${p.type} · ${p.exercises.length} activities</p><div class="workout-progress-note">${completed}/${p.exercises.length} activities completed</div></div><span class="pill good">Progressive plan</span></div><div style="margin-top:10px">${p.exercises.map(id=>renderExercise(exById(id),d)).join('')||'<div class="empty">Rest, gentle walking and mobility as comfortable.</div>'}</div>${p.exercises.length?`<button class="btn ${d.workout.completed?'outline':'primary'} wide" style="margin-top:14px" data-v5-finish-workout="1">${d.workout.completed?'Workout complete':'Complete all valid sets'}</button>`:''}</div><div class="section-title"><h2>Session check-in</h2></div><div class="card card-pad session-checkin"><div class="form-grid"><div class="field"><label>Energy</label><select class="select" id="v5WorkoutEnergy"><option value="">Select</option>${['Low','Normal','High'].map(x=>`<option ${d.workout.energy===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Pain or discomfort (0–10)</label><input class="input" id="v5WorkoutPain" type="number" min="0" max="10" value="${d.workout.discomfort||0}"></div></div><div class="field"><label>Workout notes</label><textarea class="textarea" id="v5WorkoutNote" placeholder="Technique, pain, substitutions, personal bests...">${escapeHtml(d.workout.sessionNote||'')}</textarea></div><div class="notice">Stop or modify an exercise if pain is sharp, worsening or changes your movement. Load suggestions are not medical advice.</div></div>`;};

/* Measurements record how body-fat estimates were obtained. */
measurementModal=function(){const last=state.measurements.at(-1)||{};openModal('Add body measurement',`<div class="form-grid"><div class="field"><label>Date</label><input class="input" id="m-date" type="date" value="${state.selectedDate}"></div><div class="field"><label>Weight (kg)</label><input class="input" id="m-weight" type="number" step="0.1" value="${last.weight||state.profile.weight||''}"></div><div class="field"><label>Waist at navel (cm)</label><input class="input" id="m-waist" type="number" step="0.1" value="${last.waist||''}"></div><div class="field"><label>Body fat estimate (%)</label><input class="input" id="m-bodyFat" type="number" step="0.1" value="${last.bodyFat||''}"></div><div class="field"><label>Body-fat method</label><select class="select" id="m-method"><option value="">Not recorded</option>${['Smart scale / BIA','Skinfold calipers','Tape-measure estimate','DEXA scan','Other'].map(x=>`<option ${last.method===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Note</label><input class="input" id="m-note" value="${escapeHtml(last.note||'')}" placeholder="Morning, fasted, same scale"></div></div><button class="btn primary wide" style="margin-top:14px" data-v5-save-measure="1">Save measurement</button>`);};
const ftV5ProgressBase=renderProgress;
renderProgress=function(){let html=ftV5ProgressBase();html=html.replace(/<div class="tiny muted">([^<]*body fat[^<]*)<\/div>/g,(m,t)=>m);return html;};

/* Direct bottom navigation: all pages, horizontally scrollable on mobile. */
renderNav=function(){const bottom=MAIN_NAV;document.getElementById('bottomNav').innerHTML=bottom.map(n=>`<button class="nav-btn ${state.activePage===n.id?'active':''}" data-nav="${n.id}" aria-label="Open ${n.label}">${icon(n.id)}<span>${n.label==='Dashboard'?'Home':n.label}</span></button>`).join('');document.getElementById('sideNav').innerHTML=MAIN_NAV.map(n=>`<button class="side-btn ${state.activePage===n.id?'active':''}" data-nav="${n.id}">${n.label}</button>`).join('');requestAnimationFrame(()=>document.querySelector('#bottomNav .nav-btn.active')?.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'}));};

const ftV5OldClick=handleClick;
handleClick=function(e){
 const b=e.target.closest?.('button,[data-nav]');if(!b)return;
 if(b.dataset.v5Favorite){ftV5ToggleFavourite(b.dataset.v5Favorite);return;}
 if('v5CopyYesterday' in b.dataset){const dt=new Date(state.selectedDate+'T12:00:00');dt.setDate(dt.getDate()-1);const prev=state.diary[localDate(dt)];if(!prev){toast('No data on the previous day');return;}let n=0;MEALS.forEach(m=>{if(!dayData().meals[m].length&&prev.meals?.[m]?.length){dayData().meals[m]=deepClone(prev.meals[m]);n++;}});render();toast(n?`Copied ${n} meal sections`:'Current meal sections are not empty');return;}
 if(b.dataset.v5AddSuggestion){const [id,meal,servingRaw]=b.dataset.v5AddSuggestion.split('|'),r=allRecipes().find(x=>x.id===id),serving=Number(servingRaw)||1;if(!r)return;dayData().meals[meal].push({kind:'recipe',ref:r.id,name:r.name,serving:round(serving,2),unit:'serving',...Object.fromEntries(Object.entries(r.macros).map(([k,v])=>[k,round(v*serving,1)]))});state.recentRecipes=[id,...state.recentRecipes.filter(x=>x!==id)].slice(0,10);render();toast(`Added to ${meal}`);return;}
 if('applyTodayPlan' in b.dataset){ftV5ApplySelectedDatePlan();return;}
 if(b.dataset.v5PreviewPlan!==undefined){const i=Number(b.dataset.v5PreviewPlan),p=ftV5WeeklyPlan()[i];openModal(`Plan for ${new Date(p.date+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'short'})}`,`<div class="audit-note">The selected date will change to ${p.date}. Only empty meal sections will be filled; existing entries stay unchanged.</div><div class="plan-total"><span class="pill good">${fmt(p.total.kcal)} kcal</span><span class="pill">P ${fmt(p.total.protein)} g</span></div>${FT_CORE_MEALS.map(m=>{const c=p.meals[m];return `<div class="check-row"><div><b>${m}</b><div class="tiny muted">${escapeHtml(c?.r?.name||'No match')} · ${c?fmt(c.serving,2):0} serving</div></div></div>`;}).join('')}<button class="btn primary wide" style="margin-top:14px" data-v5-confirm-plan="${i}">Add to ${p.date}</button>`);return;}
 if(b.dataset.v5ConfirmPlan!==undefined){ftV5ApplyPlan(Number(b.dataset.v5ConfirmPlan));return;}
 if('v5CustomWalk' in b.dataset){openModal('Add walk or session',`<div class="form-grid"><div class="field"><label>Steps</label><input class="input" id="v5WalkSteps" type="number" min="1" value="1000"></div><div class="field"><label>Source</label><select class="select" id="v5WalkSource"><option>Outdoor walk</option><option>Treadmill</option><option>Manual estimate</option><option>Other</option></select></div></div><div class="field" style="margin-top:12px"><label>Are these steps already included in the saved daily total?</label><select class="select" id="v5WalkIncluded"><option value="yes">Yes — log the session only</option><option value="no">No — add them to the daily total</option></select></div><button class="btn primary wide" style="margin-top:14px" data-v5-save-walk="1">Save session</button>`);return;}
 if('v5SaveWalk' in b.dataset){const d=dayData(),steps=Math.max(0,Number(document.getElementById('v5WalkSteps').value)||0),source=document.getElementById('v5WalkSource').value,included=document.getElementById('v5WalkIncluded').value==='yes';if(!steps){alert('Enter session steps.');return;}d.stepEntries.push({id:'walk-'+Date.now(),steps,source,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),includedInTotal:included});if(!included){d.steps=Number(d.steps||0)+steps;d.stepLogged=true;d.stepUpdatedAt=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}closeModal();render();toast(included?'Session logged without changing total':'Session added to daily total');return;}
 if(b.dataset.v5SetDone){const [id,idx]=b.dataset.v5SetDone.split('|'),ex=exById(id),log=ensureSetLog(ex),s=log.sets[Number(idx)],mode=log.mode||ftV5DefaultMode(ex),need=ftV5LoadRequired(ex,mode);if(!s.result||(need&&s.weight==='')){toast(`Enter ${need?'load and ':''}${/sec|min/i.test(ex.reps)?'time':'reps'} first`);return;}s.done=!s.done;syncWorkoutCompletion();render();return;}
 if('v5FinishWorkout' in b.dataset){const p=workoutForDate();let done=0,missing=0;p.exercises.forEach(id=>{const ex=exById(id),log=ensureSetLog(ex);if(ex.group==='Cardio'){if(log.cardio.duration){log.cardio.done=true;done++;}else missing++;return;}const need=ftV5LoadRequired(ex,log.mode||ftV5DefaultMode(ex));log.sets.forEach(s=>{if(s.result&&(!need||s.weight!=='')){s.done=true;done++;}else missing++;});});syncWorkoutCompletion();render();toast(missing?`${done} valid sets completed; ${missing} still missing`:'Workout completed');return;}
 if('v5SaveMeasure' in b.dataset){const m={date:document.getElementById('m-date').value,weight:Number(document.getElementById('m-weight').value)||0,waist:Number(document.getElementById('m-waist').value)||0,bodyFat:Number(document.getElementById('m-bodyFat').value)||0,method:document.getElementById('m-method').value,note:document.getElementById('m-note').value.trim()};if(!m.date||!m.weight){alert('Date and weight are required.');return;}state.measurements=state.measurements.filter(x=>x.date!==m.date);state.measurements.push(m);state.profile.weight=m.weight;closeModal();render();toast('Measurement saved');return;}
 const recentId=b.dataset.pickerServing?.split('|')[0]||b.dataset.confirmServing||b.dataset.directAdd||b.dataset.calcServingAdd;if(recentId)ftV5RecordRecent(recentId);
 return ftV5OldClick(e);
};

const ftV5OldInput=handleInput;
handleInput=function(e){
 if(e.target.dataset.v5ExerciseMode){const ex=exById(e.target.dataset.v5ExerciseMode),log=ensureSetLog(ex);log.mode=e.target.value;saveState();render();return;}
 if(e.target.id==='v5WorkoutEnergy'){dayData().workout.energy=e.target.value;saveState();return;}
 if(e.target.id==='v5WorkoutPain'){dayData().workout.discomfort=clamp(Number(e.target.value)||0,0,10);saveState();return;}
 if(e.target.id==='v5WorkoutNote'){dayData().workout.sessionNote=e.target.value;saveState();return;}
 ftV5OldInput(e);
};

const ftV5OldRender=render;
render=function(){ftV5OldRender();requestAnimationFrame(()=>{ftV5DecorateFoodCards();const nav=document.getElementById('bottomNav');if(nav)nav.setAttribute('aria-label','Scrollable main navigation');const progressRows=document.querySelectorAll('[data-delete-measure-v4]');progressRows.forEach(btn=>{const row=btn.closest('.check-row'),date=row?.querySelector('.strong')?.textContent,m=state.measurements.find(x=>x.date===date);if(m&&(m.method||m.note)&&!row.querySelector('.measure-method'))row.querySelector('div')?.insertAdjacentHTML('beforeend',`<div class="measure-method">${escapeHtml(m.method||'Method not recorded')}${m.note?` · ${escapeHtml(m.note)}`:''}</div>`);});});};

render();
})();
</script>

<style id="fittrack-v51-styles">

</style>
<script id="fittrack-v51-patch">
(()=>{
'use strict';
const ftV51Render=render;
render=function(){
 ftV51Render();
 requestAnimationFrame(()=>{

ta-v7-save="${escapeHtml(meal)}">Save and add to ${escapeHtml(meal)}</button>`);

 state.customFoods.push(f);dayData().meals[meal].push({kind:'food',ref:id,name,quantity:1,servingKey:'serving',display:label,grams:g,...Object.fromEntries(Object.entries(vals).map(([x,v])=>[x,round(v,1)]))});state.recentFoods=[id,...(state.recentFoods||[]).filter(x=>x!==id)].slice(0,12);saveState();closeModal();render();toast(`${name} added to ${meal}`);
}

<script id="fittrack-editable-logs-patch">
(()=>{
'use strict';
const EDIT_ID_PREFIX='ftlog';
function makeId(kind){return `${EDIT_ID_PREFIX}-${kind}-${Date.now().toString(36)}-${Math.random().toString(16).slice(2)}`}
function stableId(kind,...parts){return `${EDIT_ID_PREFIX}-${kind}-${parts.map(p=>String(p??'').replace(/[^a-zA-Z0-9_-]+/g,'_')).join('-')}`}
function esc(v){return escapeHtml(v??'')}
function num(id){const v=Number(document.getElementById(id)?.value);return Number.isFinite(v)?v:NaN}
function text(id){return document.getElementById(id)?.value?.trim()||''}
function showError(msg){const el=document.getElementById('editValidationError');if(el){el.textContent=msg;el.classList.add('show');el.focus?.()}else alert(msg)}
function validPositive(v){return Number.isFinite(v)&&v>0}
function validNonNegative(v){return Number.isFinite(v)&&v>=0}
function setMacrosFromFood(item,f,qty,key){
 const s=editableServingByKey(f,key),grams=qty*Number(s.grams||0),mac=macroForFood(f,grams);
 Object.assign(item,{quantity:qty,servingKey:key,servingLabel:editableQtyLabel(qty,s),grams:round(grams,1),unit:key==='grams'?'g':s.label});
 ['kcal','protein','carbs','fat','fiber'].forEach(k=>item[k]=round(mac[k],1));
}
function setMacrosFromRecipe(item,r,servings){
 Object.assign(item,{serving:round(servings,2),unit:'serving'});
 ['kcal','protein','carbs','fat','fiber'].forEach(k=>item[k]=round(Number(r.macros?.[k]||0)*servings,1));
}
function editableServingOptions(f){
 if(window.ftServingOptions)return window.ftServingOptions(f);
 const custom=Array.isArray(f?.servings)?f.servings.map((s,i)=>({key:s.key||`custom-${i}`,label:s.label||s.name||'serving',grams:Number(s.grams)||Number(f.servingG)||100})):[];
 const fallback=[{key:'serving',label:`1 serving (${fmt(Number(f?.servingG)||100)} g)`,grams:Number(f?.servingG)||100}];
 const arr=custom.length?custom:fallback;
 if(!arr.some(s=>s.key==='grams'))arr.push({key:'grams',label:'grams',grams:1});
 return arr;
}
function editableServingByKey(f,key){return editableServingOptions(f).find(s=>s.key===key)||editableServingOptions(f)[0]}
function servingSelectHtml(f,id,selected){return `<select class="select" id="${id}">${editableServingOptions(f).map(s=>`<option value="${esc(s.key)}" ${s.key===selected?'selected':''}>${esc(s.label)}</option>`).join('')}</select>`}
function editableQtyLabel(q,s){return window.ftQtyLabel?window.ftQtyLabel(q,s):(s.key==='grams'?`${fmt(q,1)} g`:`${fmt(q,1)} ${s.label}`)}
function editFoodPreviewHtml(f,qty,key){const s=editableServingByKey(f,key),grams=qty*Number(s.grams||0),mac=macroForFood(f,grams);return `<div class="serving-primary">${esc(editableQtyLabel(qty,s))} Â· ${fmt(mac.kcal)} kcal Â· P ${fmt(mac.protein,1)} g</div><div class="serving-secondary">Approx. ${fmt(grams)} g Â· C ${fmt(mac.carbs,1)} g Â· F ${fmt(mac.fat,1)} g Â· Fiber ${fmt(mac.fiber,1)} g</div>`}
function updateEditFoodPreview(){const id=text('editFoodId'),date=text('editFoodDate'),meal=text('editFoodOriginalMeal'),item=findMealEntry(date,meal,id).item;if(!item||item.kind!=='food')return;const f=foodById(item.ref);if(!f)return;const qty=num('editFoodQty'),key=document.getElementById('editFoodUnit')?.value||'grams',el=document.getElementById('editFoodPreview');if(el&&validPositive(qty))el.innerHTML=editFoodPreviewHtml(f,qty,key)}
function recalcWater(d){d.water=round((d.waterEntries||[]).reduce((s,x)=>s+Number(x.amount||0),0))}
function normalizeItem(item,date,meal,idx){
 if(!item||typeof item!=='object')return;
 if(!item.id)item.id=stableId('meal',date,meal,idx,item.kind||'item',item.ref||item.name||'entry');
 if(item.kind==='food'){
  const f=foodById(item.ref);
  if(f){
   const key=item.servingKey||(item.unit==='g'?'grams':'grams');
   const qty=Number(item.quantity)||(key==='grams'?Number(item.grams)||Number(f.servingG)||100:1);
   if(!item.quantity)item.quantity=qty;
   if(!item.servingKey)item.servingKey=key;
   if(!item.servingLabel)item.servingLabel=key==='grams'?'grams':editableServingByKey(f,key).label;
  }
 }
}
function normalizeStateForEditing(){
 state.diary=state.diary||{};
 Object.entries(state.diary).forEach(([date,d])=>{
  d.meals=d.meals||Object.fromEntries(MEALS.map(m=>[m,[]]));MEALS.forEach(m=>{d.meals[m]=Array.isArray(d.meals[m])?d.meals[m]:[];d.meals[m].forEach((item,idx)=>normalizeItem(item,date,m,idx));});
  d.waterEntries=Array.isArray(d.waterEntries)?d.waterEntries:[];
  if(Number(d.water)>0&&!d.waterEntries.length)d.waterEntries.push({id:stableId('water',date,'legacy'),amount:Number(d.water),label:'Legacy total',time:'Legacy total'});
  d.waterEntries.forEach((x,i)=>{if(!x.id)x.id=stableId('water',date,i,x.amount||0,x.time||'')});recalcWater(d);
  d.stepEntries=Array.isArray(d.stepEntries)?d.stepEntries:[];d.stepEntries.forEach((x,i)=>{if(!x.id)x.id=stableId('steps',date,i,x.steps||0,x.time||'')});
  d.workout=d.workout||{logs:{},completed:false};d.workout.logs=d.workout.logs||{};
  Object.entries(d.workout.logs).forEach(([exerciseId,log])=>{if(log&&typeof log==='object'){if(!log.id)log.id=stableId('workout',date,exerciseId);if(Array.isArray(log.sets))log.sets.forEach((s,i)=>{if(!s.id)s.id=stableId('set',date,exerciseId,i)});}});
 });
 state.measurements=Array.isArray(state.measurements)?state.measurements:[];state.measurements.forEach((m,i)=>{if(!m.id)m.id=stableId('measure',m.date||'date',i)});
 state.customFoods=Array.isArray(state.customFoods)?state.customFoods:[];state.customFoods.forEach((f,i)=>{if(!f.id)f.id=stableId('custom-food',i,f.name||'food')});
 state.customRecipes=Array.isArray(state.customRecipes)?state.customRecipes:[];state.customRecipes.forEach((r,i)=>{if(!r.id)r.id=stableId('custom-recipe',i,r.name||'recipe')});
}
function findMealEntry(date,meal,id){const arr=state.diary?.[date]?.meals?.[meal]||[];return {arr,index:arr.findIndex(x=>x.id===id),item:arr.find(x=>x.id===id)}}
function allMealLocations(date,id){const d=state.diary?.[date];if(!d)return[];return MEALS.flatMap(m=>(d.meals[m]||[]).map((item,index)=>({meal:m,item,index}))).filter(x=>x.item.id===id)}
function validationHtml(){return `<div id="editValidationError" class="validation-error" role="alert" tabindex="-1"></div>`}
function deleteConfirmHtml(kind,id){return `<div class="edit-delete-confirm" id="${id}"><div class="strong">Confirm delete</div><div class="tiny muted">This cannot be undone after you confirm.</div><button class="btn danger-btn wide" style="margin-top:10px" data-confirm-delete-log="${kind}">Delete permanently</button></div>`}
function openFoodEditor(date,meal,id){
 const found=findMealEntry(date,meal,id),item=found.item;if(!item)return;
 const mealOptions=MEALS.map(m=>`<option ${m===meal?'selected':''}>${m}</option>`).join('');
 let body=`<input type="hidden" id="editFoodDate" value="${esc(date)}"><input type="hidden" id="editFoodOriginalMeal" value="${esc(meal)}"><input type="hidden" id="editFoodId" value="${esc(id)}"><div class="field"><label>Item</label><input class="input" id="editFoodName" value="${esc(item.name)}" ${item.ref?'disabled':''}></div>`;
 if(item.kind==='food'){
  const f=foodById(item.ref)||{id:item.ref,name:item.name,servingG:item.grams||100,kcal:0,protein:0,carbs:0,fat:0,fiber:0,servings:[{key:item.servingKey||'grams',label:item.servingLabel||item.unit||'grams',grams:item.servingKey==='grams'?1:(item.grams||100)}]};
  const key=item.servingKey||'grams',qty=Number(item.quantity)||(key==='grams'?Number(item.grams)||1:1);
  body+=`<div class="form-grid" style="margin-top:12px"><div class="field"><label>Quantity</label><input class="input" id="editFoodQty" type="number" min="0.1" step="0.1" value="${esc(qty)}"></div><div class="field"><label>Serving size / unit</label>${servingSelectHtml(f,'editFoodUnit',key)}</div><div class="field"><label>Meal section</label><select class="select" id="editFoodMeal">${mealOptions}</select></div></div><div class="serving-preview" id="editFoodPreview">${editFoodPreviewHtml(f,qty,key)}</div>`;
 }else{
  body+=`<div class="form-grid" style="margin-top:12px"><div class="field"><label>Servings</label><input class="input" id="editFoodServings" type="number" min="0.25" step="0.25" value="${esc(item.serving||1)}"></div><div class="field"><label>Meal section</label><select class="select" id="editFoodMeal">${mealOptions}</select></div></div>`;
 }
 body+=`${validationHtml()}${deleteConfirmHtml('food','deleteFoodConfirm')}<div class="edit-modal-actions"><button class="btn primary" data-save-edit-food="1">Save Changes</button><button class="btn danger-btn" data-show-delete-confirm="deleteFoodConfirm">Delete</button><button class="btn outline" data-close-modal="1">Cancel</button></div>`;
 openModal('Edit diary entry',body);
}
function saveFoodEditor(){
 const date=text('editFoodDate'),originalMeal=text('editFoodOriginalMeal'),id=text('editFoodId'),targetMeal=document.getElementById('editFoodMeal')?.value;
 const found=findMealEntry(date,originalMeal,id),item=found.item;if(!item||found.index<0)return showError('This entry could not be found.');
 if(!MEALS.includes(targetMeal))return showError('Choose a valid meal section.');
 if(item.kind==='food'){
  const qty=num('editFoodQty');if(!validPositive(qty))return showError('Quantity must be greater than zero.');
  const f=foodById(item.ref);if(!f)return showError('The saved food reference is missing.');

 }else{
  const servings=num('editFoodServings');if(!validPositive(servings))return showError('Servings must be greater than zero.');
  const r=allRecipes().find(x=>x.id===item.ref);if(!r)return showError('The saved recipe reference is missing.');
  setMacrosFromRecipe(item,r,servings);
 }
 if(targetMeal!==originalMeal){found.arr.splice(found.index,1);state.diary[date].meals[targetMeal].push(item);}
 closeModal();render();toast('Entry updated');
}

function openWaterEditor(date,id){

function saveWaterEditor(){const d=dayData(text('editWaterDate')),item=d.waterEntries.find(x=>x.id===text('editWaterId')),amount=num('editWaterAmount');if(!item)return showError('This water entry could not be found.');if(!validPositive(amount))return showError('Water amount must be greater than zero.');item.amount=round(amount);item.label=text('editWaterLabel')||'Water';item.time=text('editWaterTime');recalcWater(d);closeModal();render();toast('Water updated')}

function openStepEditor(date,id){

}
function applyStepDelta(d,oldSteps,oldIncluded,newSteps,newIncluded){if(!oldIncluded)d.steps=Math.max(0,Number(d.steps||0)-Number(oldSteps||0));if(!newIncluded)d.steps=Number(d.steps||0)+Number(newSteps||0);d.stepLogged=Number(d.steps||0)>0||d.stepLogged}
function saveStepEditor(){const d=dayData(text('editStepDate')),item=d.stepEntries.find(x=>x.id===text('editStepId')),steps=num('editStepAmount');if(!item)return showError('This session could not be found.');if(!validPositive(steps))return showError('Steps must be greater than zero.');const oldSteps=Number(document.getElementById('editStepOriginalSteps')?.value)||0,oldIncluded=document.getElementById('editStepOriginalIncluded')?.value==='yes',included=document.getElementById('editStepIncluded')?.value==='yes';applyStepDelta(d,oldSteps,oldIncluded,steps,included);Object.assign(item,{steps:round(steps),source:text('editStepSource')||'Manual',time:text('editStepTime'),includedInTotal:included});closeModal();render();toast('Session updated')}
function deleteStepEditor(){const d=dayData(text('editStepDate')),item=d.stepEntries.find(x=>x.id===text('editStepId'));if(item&&!item.includedInTotal)d.steps=Math.max(0,Number(d.steps||0)-Number(item.steps||0));d.stepEntries=d.stepEntries.filter(x=>x.id!==text('editStepId'));d.stepLogged=Number(d.steps||0)>0;closeModal();render();toast('Session deleted')}

function openSleepEditor(date){const d=dayData(date);const isEdit=Boolean(d.sleepLogged);openModal(isEdit?'Edit sleep':'Log sleep',`<input type="hidden" id="editSleepDate" value="${esc(date)}"><div class="form-grid"><div class="field"><label>Bedtime</label><input class="input" id="editSleepStart" type="time" value="${esc(d.sleepStart||'')}"></div><div class="field"><label>Wake time</label><input class="input" id="editSleepEnd" type="time" value="${esc(d.sleepEnd||'')}"></div><div class="field"><label>Awake minutes</label><input class="input" id="editSleepAwake" type="number" min="0" max="600" value="${esc(d.awakeMinutes||0)}"></div><div class="field"><label>Duration fallback (hours)</label><input class="input" id="editSleepHours" type="number" min="0.1" max="24" step="0.1" value="${esc(d.sleep||'')}"></div><div class="field"><label>Quality</label><input class="input" id="editSleepQuality" value="${esc(d.sleepQuality||'')}"></div></div>${validationHtml()}${isEdit?deleteConfirmHtml('sleep','deleteSleepConfirm'):''}<div class="edit-modal-actions"><button class="btn primary" data-save-edit-sleep="1">${isEdit?'Save Changes':'Save sleep'}</button>${isEdit?'<button class="btn danger-btn" data-show-delete-confirm="deleteSleepConfirm">Delete</button>':''}<button class="btn outline" data-close-modal="1">Cancel</button></div>`)}
function sleepDuration(start,end,awake){if(!start||!end)return NaN;const [sh,sm]=start.split(':').map(Number),[eh,em]=end.split(':').map(Number);let mins=(eh*60+em)-(sh*60+sm);if(mins<=0)mins+=1440;mins-=Number(awake)||0;return mins/60}
function saveSleepEditor(){const d=dayData(text('editSleepDate')),start=text('editSleepStart'),end=text('editSleepEnd'),awake=num('editSleepAwake'),fallback=num('editSleepHours');if(!validNonNegative(awake))return showError('Awake minutes cannot be negative.');let hours=sleepDuration(start,end,awake);if(!Number.isFinite(hours))hours=fallback;if(!validPositive(hours)||hours>24)return showError('Enter valid sleep times or a duration between 0 and 24 hours.');Object.assign(d,{sleepStart:start,sleepEnd:end,awakeMinutes:round(awake),sleep:round(hours,2),sleepQuality:text('editSleepQuality'),sleepLogged:true,sleepUpdatedAt:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});closeModal();render();toast('Sleep updated')}
function deleteSleepEditor(){const d=dayData(text('editSleepDate'));Object.assign(d,{sleep:0,sleepStart:'',sleepEnd:'',awakeMinutes:0,sleepQuality:'',sleepLogged:false,sleepUpdatedAt:''});closeModal();render();toast('Sleep deleted')}

function openWorkoutEditor(date,exerciseId){

const baseHandleClick=handleClick;
handleClick=function(e){
 const b=e.target.closest?.('button,[data-nav]');if(!b)return baseHandleClick(e);
 if(b.dataset.showDeleteConfirm){document.getElementById(b.dataset.showDeleteConfirm)?.classList.add('show');return}
 if(b.dataset.editFoodLog){const [date,meal,id]=b.dataset.editFoodLog.split('|'),item=state.diary?.[date]?.meals?.[meal]?.find(x=>x.id===id);if(item?.kind==='supplement'&&window.ftC4OpenSupplementEditor){window.ftC4OpenSupplementEditor(date,meal,id);return}openFoodEditor(date,meal,id);return}
 if('saveEditFood' in b.dataset){saveFoodEditor();return}
 if(b.dataset.editWaterLog){const [date,id]=b.dataset.editWaterLog.split('|');openWaterEditor(date,id);return}
 if('saveEditWater' in b.dataset){saveWaterEditor();return}
 if(b.dataset.editStepLog){const [date,id]=b.dataset.editStepLog.split('|');openStepEditor(date,id);return}
 if('saveEditSteps' in b.dataset){saveStepEditor();return}
 if(b.dataset.editMeasurementLog){openMeasurementEditor(b.dataset.editMeasurementLog);return}
 if('saveEditMeasurement' in b.dataset){saveMeasurementEditor();return}
 if(b.dataset.editDailySteps){openDailyStepsEditor(b.dataset.editDailySteps);return}
 if('saveEditDailySteps' in b.dataset){saveDailyStepsEditor();return}
 if(b.dataset.editSleepLog){openSleepEditor(b.dataset.editSleepLog);return}
 if('saveEditSleep' in b.dataset){saveSleepEditor();return}

if(!state.settings)state.settings={};
if(!state.settings.theme){state.settings.theme='system';saveState();}
ftApplyTheme(state.settings.theme);

/* OS preference listener */
var _ftOsMq=window.matchMedia('(prefers-color-scheme:dark)');
function _ftOsChange(){if(state.settings&&state.settings.theme==='system')ftApplyTheme('system');}
if(_ftOsMq.addEventListener)_ftOsMq.addEventListener('change',_ftOsChange);
else if(_ftOsMq.addListener)_ftOsMq.addListener(_ftOsChange);

/* theme-select real-time change */
document.addEventListener('change',function(e){
  if(e.target&&e.target.id==='themeSelect'){
    if(!state.settings)state.settings={};
    state.settings.theme=e.target.value;
    saveState();
    ftApplyTheme(state.settings.theme);
  }
});

/* ─── simplified quick actions on dashboard ─── */
var _ftV6OldRenderDashboard=renderDashboard;
renderDashboard=function(){
  var html=_ftV6OldRenderDashboard();
  var d=dayData();
  var rw=Math.max(0,state.profile.waterGoal-d.water);
  var primaryBtns=[
    '<button class="quick-btn" data-choose-meal="1" aria-label="Log food">Log food<small>Breakfast, lunch, dinner and more</small></button>',
    '<button class="quick-btn" data-nav="water" aria-label="Log water">Log water<small>'+fmt(rw)+' ml remaining</small></button>',
    '<button class="quick-btn" data-nav="workout" aria-label="Log workout">Log workout<small>Track every set</small></button>',
    '<button class="quick-btn" data-measure="1" aria-label="Body stats">Body stats<small>Weight and waist</small></button>'
  ].join('');
  var moreBtn='<button class="quick-btn more-actions-btn" data-more-actions="1" aria-haspopup="dialog" aria-expanded="false" aria-label="More actions">More<small>Steps &amp; sleep</small></button>';
  var newGrid='<div class="quick-grid activity-actions" id="quickActionsGrid">'+primaryBtns+moreBtn+'</div>';
  return html.replace(/<div class="quick-grid activity-actions">[\s\S]*?<\/div>/,newGrid);
};

/* ─── closeModal override: restore aria-expanded + focus ─── */
var _ftV6OldCloseModal=closeModal;
closeModal=function(){
  var moreBtn=document.querySelector('[data-more-actions]');
  var activeInModal=document.activeElement&&document.activeElement.closest&&document.activeElement.closest('#modalRoot');
  _ftV6OldCloseModal();
  if(moreBtn){
    moreBtn.setAttribute('aria-expanded','false');
    if(activeInModal)moreBtn.focus();
  }
};

/* ─── click handler: more-actions trigger ─── */
var _ftV6OldClick=handleClick;
handleClick=function(e){
  var b=e.target&&e.target.closest?e.target.closest('[data-more-actions]'):null;
  if(b){
    b.setAttribute('aria-expanded','true');
    openModal('More actions',
      '<div class="more-grid" id="moreActionsGrid">'
      +'<button class="more-btn" data-log-steps="1">Log steps<small>Set today\'s step total</small></button>'
      +'<button class="more-btn" data-log-sleep="1">Log sleep<small>Bedtime and wake time</small></button>'
      +'</div>'
    );
    var logSleepBtn=document.querySelector('[data-log-sleep="1"]');
    if(logSleepBtn){logSleepBtn.addEventListener('click',function(){
      if(window.ftOpenSleepEditor)window.ftOpenSleepEditor(state.selectedDate);
      requestAnimationFrame(function(){var f=document.querySelector('#modalRoot input:not([type=hidden]),#modalRoot select,#modalRoot textarea');if(f)f.focus();});
    });}
    requestAnimationFrame(function(){
      var first=document.querySelector('#moreActionsGrid .more-btn');
      if(first)first.focus();
    });
    return;
  }
  return _ftV6OldClick(e);
};

render();
})();
</script>
