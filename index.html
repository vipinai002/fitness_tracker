      arr.sort((a,b)=>ftFoodRank(a,q)-ftFoodRank(b,q)||a.name.localeCompare(b.name));
      arr=arr.slice(0,100);
      el.innerHTML=arr.length?arr.map(f=>`<div class="card food-card"><div class="food-card-top"><div><h3>${escapeHtml(f.name)}</h3><p>Per 100 g: ${fmt(f.kcal)} kcal · P ${fmt(f.protein,1)}g · ${escapeHtml(f.category)}</p></div><input class="mini-input" id="pick-${f.id}" type="number" value="${f.servingG}" min="0.1" step="0.1"></div><button class="btn primary wide small" style="margin-top:10px" data-picker-add="${f.id}|${meal}">Add amount</button></div>`).join(''):ftNoFoodResults(q,true);
    }else{
      const arr=allRecipes().filter(r=>ftNormalize(r.name).includes(ftNormalize(q))&&dietAllowed(r.diet));
      el.innerHTML=arr.length?arr.map(r=>`<div class="card food-card"><h3>${escapeHtml(r.name)}</h3><p>${r.macros.kcal} kcal · P ${r.macros.protein}g · ${r.meal}</p><button class="btn primary wide small" style="margin-top:10px" data-picker-recipe="${r.id}|${meal}">Add serving</button></div>`).join(''):'<div class="empty card">No matching recipes.</div>';
    }
  };

  function ftDateLabel(date){return new Date(date+'T12:00:00').toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'})}
  function ftRecentDates(count=7){
    const result=[],base=new Date(state.selectedDate+'T12:00:00');
    for(let i=0;i<count;i++){const d=new Date(base);d.setDate(base.getDate()-i);result.push(localDate(d))}
    return result;
  }
  function ftActivityHistory(){
    const dates=ftRecentDates(7),max=Math.max(state.profile.stepGoal,...dates.map(date=>Number(dayData(date).steps)||0),1);
    return `<div class="history-list">${dates.map(date=>{const d=dayData(date),percent=Math.min(100,Math.round((Number(d.steps)||0)/max*100));return `<button class="history-row ${date===state.selectedDate?'active':''}" data-activity-date="${date}"><span>${ftDateLabel(date)}</span><span class="history-bar"><i style="width:${percent}%"></i></span><b>${d.stepLogged?fmt(d.steps):'—'}</b></button>`}).join('')}</div>`;
  }
  function ftStepLog(d){
    if(!d.stepEntries.length)return '<div class="empty">No walk/session additions logged. Your saved daily total can still come from a phone or watch.</div>';
    return `<div class="activity-log">${[...d.stepEntries].reverse().map(entry=>`<div class="activity-log-row"><div><b>+${fmt(entry.steps)} steps</b><div class="tiny muted">${escapeHtml(entry.source||d.stepSource||'Manual')} · ${escapeHtml(entry.time||'')}</div></div><button class="btn small danger-btn" data-remove-step-entry="${entry.id}">Remove</button></div>`).join('')}</div>`;
  }
  function renderActivity(){
    const d=dayData(),logged=d.stepLogged,updated=d.stepUpdatedAt?`Updated ${escapeHtml(d.stepUpdatedAt)}`:logged?'Saved for this date':'Not entered yet';
    return `${pageHead('Daily activity',`Steps and sleep for ${ftDateLabel(state.selectedDate)}`,`<button class="btn outline small" data-log-steps="1">Quick log</button>`)}<div class="activity-explainer"><b>How this works:</b> every entry belongs to the date selected at the top of the app. Use <b>Set daily total</b> when copying the total from your phone or watch. Use <b>Add walk/session</b> only when adding extra steps to the current total. These values automatically update the dashboard and daily checklist.</div><div class="activity-layout" style="margin-top:14px"><div class="stack"><div class="card activity-hero"><div class="activity-status"><span class="pill ${logged?'good':''}">${logged?'Steps logged':'Steps missing'}</span><span class="pill">Goal ${fmt(state.profile.stepGoal)}</span></div><div><div class="activity-total">${logged?fmt(d.steps):'—'} <small>steps</small></div><div class="step-source-line">${logged?escapeHtml(d.stepSource||'Manual'):'No source selected'} · ${updated}</div></div><div class="progress"><i style="width:${pct(d.steps,state.profile.stepGoal)}%"></i></div><div class="activity-form"><div class="field"><label>Daily step total</label><input class="input" id="activityStepsTotal" type="number" min="0" step="1" value="${logged?d.steps:''}" placeholder="Example: 8432"><div class="field-help">Enter the full total shown by your phone, watch or pedometer.</div></div><div class="field"><label>Source</label><select class="select" id="activityStepSource">${['Manual','iPhone / Apple Health','Android / Google Fit','Smartwatch','Treadmill','Other'].map(x=>`<option ${x===d.stepSource?'selected':''}>${x}</option>`).join('')}</select></div><div class="activity-form-actions full"><button class="btn primary" data-save-steps-total="1">Set daily total</button><button class="btn danger-btn" data-clear-steps="1">Clear steps</button></div></div><div><div class="strong" style="margin-bottom:9px">Add a walk/session</div><div class="quick-step-grid">${[500,1000,2000].map(v=>`<button class="btn outline" data-add-steps="${v}">+${fmt(v)} steps</button>`).join('')}</div><div class="field-help" style="margin-top:9px">These buttons add to the saved total and create a removable session entry.</div></div></div><div class="card card-pad"><div class="section-title" style="margin-top:0"><h2>Sleep</h2><span class="pill ${d.sleepLogged?'good':''}">${d.sleepLogged?'Logged':'Missing'}</span></div><div class="field"><label>Hours slept</label><input class="input" id="activitySleep" type="number" min="0" max="24" step="0.1" value="${d.sleepLogged?d.sleep:''}" placeholder="Example: 7.5"></div><div class="activity-form-actions" style="margin-top:12px"><button class="btn primary" data-save-sleep="1">Save sleep</button><button class="btn danger-btn" data-clear-sleep="1">Clear sleep</button></div><div class="progress" style="margin-top:14px"><i style="width:${pct(d.sleep,state.profile.sleepGoal)}%"></i></div><div class="tiny muted" style="margin-top:7px">Goal: ${fmt(state.profile.sleepGoal,1)} hours</div></div><div class="card card-pad"><div class="section-title" style="margin-top:0"><h2>Activity note</h2></div><textarea class="textarea" id="activityNote" placeholder="Walk route, soreness, energy, recovery...">${escapeHtml(d.activityNote||'')}</textarea></div></div><div class="stack"><div class="card card-pad"><div class="section-title" style="margin-top:0"><h2>Last 7 days</h2><small>Tap a day to edit</small></div>${ftActivityHistory()}</div><div class="card card-pad"><div class="section-title" style="margin-top:0"><h2>Walk/session log</h2><small>${d.stepEntries.length} entries</small></div>${ftStepLog(d)}</div></div></div>`;
  }

  const ftV3OldChecklist=checklistItems;
  checklistItems=function(){
    const base=ftV3OldChecklist().filter(x=>!['Steps target','Sleep logged'].includes(x.label));
    const d=dayData();
    const stepLogged={label:'Daily steps logged',done:d.stepLogged,detail:d.stepLogged?`${fmt(d.steps)} steps saved for this date`:'No daily step total entered',nav:'activity'};
    const stepTarget={label:'Steps target',done:d.stepLogged&&d.steps>=state.profile.stepGoal,detail:d.stepLogged?`${fmt(d.steps)} / ${fmt(state.profile.stepGoal)}`:'Log steps first',nav:'activity'};
    const sleep={label:'Sleep logged',done:d.sleepLogged,detail:d.sleepLogged?`${fmt(d.sleep,1)} / ${fmt(state.profile.sleepGoal,1)} h`:'No sleep duration entered',nav:'activity'};
    const waterIndex=Math.max(0,base.findIndex(x=>x.label==='Water target'));
    base.splice(waterIndex,0,stepLogged,stepTarget,sleep);
    return base;
  };

  function ftMetricButton(label,value,target,unit,logged=true){return `<button class="card metric-card metric-button" data-nav="activity"><div class="metric-label">${label}</div><div class="metric-value">${logged?fmt(value,1):'Not logged'} ${logged?`<span>/ ${fmt(target,1)} ${unit}</span>`:''}</div><div class="progress"><i style="width:${logged?pct(value,target):0}%"></i></div></button>`}
  renderDashboard=function(){
    const d=dayData(),t=calcTargets(),x=totalsForDay(),checks=checklistItems(),missing=checks.filter(c=>!c.done);
    return `${pageHead(`Today, ${state.profile.name}`,`${new Date(state.selectedDate+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'})}`,`<button class="btn outline small" data-nav="settings">Edit goals</button>`)}<div class="grid grid-lg-2"><div class="card hero-card"><div class="ring" style="--p:${pct(x.kcal,t.calories)}"><div class="ring-content"><b>${fmt(x.kcal)}</b><span>of ${fmt(t.calories)} kcal</span></div></div><div><div class="strong">Daily nutrition</div>${['protein','carbs','fat'].map(k=>`<div class="macro-row"><label>${k[0].toUpperCase()+k.slice(1)}</label><div class="progress"><i style="width:${pct(x[k],t[k])}%"></i></div><b>${fmt(x[k])}/${fmt(t[k])}g</b></div>`).join('')}<div class="tiny muted">Fiber ${fmt(x.fiber,1)} / ${fmt(t.fiber)} g</div></div></div><div class="grid grid-2">${ftMetricButton('Steps',d.steps,state.profile.stepGoal,'steps',d.stepLogged)}${metricCard('Water',d.water/1000,state.profile.waterGoal/1000,'L')}${metricCard('Weight',latestWeight(),state.profile.goalWeight,'kg')}${ftMetricButton('Sleep',d.sleep,state.profile.sleepGoal,'h',d.sleepLogged)}</div></div><div class="section-title"><h2>Quick actions</h2></div><div class="quick-grid activity-actions"><button class="quick-btn" data-choose-meal="1">Log food<small>Breakfast, lunch, dinner and more</small></button><button class="quick-btn" data-log-steps="1">Log steps<small>Set phone/watch total or add a walk</small></button><button class="quick-btn" data-nav="workout">Log workout<small>Track every set</small></button><button class="quick-btn" data-water="250">Add water<small>+250 ml</small></button><button class="quick-btn" data-nav="activity">Log sleep<small>Daily recovery record</small></button><button class="quick-btn" data-measure="1">Body stats<small>Weight and waist</small></button></div><div class="grid grid-lg-2"><div><div class="section-title"><h2>Daily checklist</h2><small>${checks.length-missing.length}/${checks.length}</small></div><div class="card card-pad check-list">${missing.length?`<div class="missing-banner"><b>${missing.length} item${missing.length===1?'':'s'} still missing</b><span>${missing.slice(0,3).map(x=>x.label).join(', ')}</span></div>`:''}${checks.map(c=>`<div class="check-row auto-check ${c.done?'done':'missing'}"><span class="status-dot">${c.done?'✓':'!'}</span><div class="auto-check-main"><b>${c.label}</b><span>${c.detail}</span></div>${c.done?'':c.action==='chooseMeal'?`<button class="btn small outline" data-choose-meal="1">Add</button>`:`<button class="btn small outline" data-nav="${c.nav}">Open</button>`}</div>`).join('')}</div></div><div><div class="section-title"><h2>What to eat next</h2><button class="btn small outline" data-apply-today-plan="1">Fill empty meals</button></div>${renderSuggestions()}</div></div><div class="section-title"><h2>Today’s plan</h2><button class="btn small outline" data-nav="plans">Full plan</button></div><div class="card card-pad">${todayPlanPreview()}</div><div class="section-title"><h2>Daily notes</h2></div><div class="card card-pad"><textarea class="textarea" id="dailyNotes" placeholder="Energy, hunger, pain, wins, observations...">${escapeHtml(d.notes||'')}</textarea></div>`;
  };

  renderDiary=function(){
    const d=dayData(),t=calcTargets(),x=totalsForDay();
    return `${pageHead('Food diary','Meals and nutrition for the selected date',`<button class="btn primary small" data-choose-meal="1">Add item</button>`)}<div class="summary-strip">${[['Calories',x.kcal,t.calories,'kcal'],['Protein',x.protein,t.protein,'g'],['Carbs',x.carbs,t.carbs,'g'],['Fat',x.fat,t.fat,'g'],['Fiber',x.fiber,t.fiber,'g']].map(a=>`<div class="summary-item"><span>${a[0]}</span><b>${fmt(a[1],1)}</b><small class="muted">/ ${fmt(a[2])}${a[3]}</small></div>`).join('')}</div><div class="section-title"><h2>Suggested next meal</h2><button class="btn small outline" data-apply-today-plan="1">Fill empty meals</button></div>${renderSuggestions()}<div class="stack" style="margin-top:16px">${MEALS.map(m=>renderMeal(m,d.meals[m])).join('')}</div><div class="section-title"><h2>Activity and recovery</h2></div><div class="card activity-link-card"><div><b>Steps and sleep are logged separately</b><p class="tiny muted">This keeps the food diary focused. Activity entries still update the same date, dashboard and checklist.</p></div><button class="btn primary small" data-nav="activity">Open activity</button></div>`;
  };

  moreModal=function(){
    const descriptions={activity:'Daily steps, walks and sleep',recipes:'Meals with ingredients and macros',plans:'Weekly adaptive meal and training plans',progress:'Weight, waist and reports',water:'Daily hydration tracking',settings:'Goals, theme, import and export'};
    openModal('All features',`<div class="more-grid">${MAIN_NAV.filter(x=>!['dashboard','diary','workout','foods'].includes(x.id)).map(n=>`<button class="more-btn" data-nav="${n.id}">${n.label}<small>${descriptions[n.id]||''}</small></button>`).join('')}</div>`);
  };

  const ftV3OldRender=render;
  render=function(){
    document.documentElement.style.setProperty('--accent',state.profile.accent||'#78e23f');
    document.getElementById('globalDate').value=state.selectedDate;
    document.getElementById('headerSubtitle').textContent=`${goalLabel()} · ${state.profile.diet}`;
    const t=calcTargets();document.getElementById('sideTarget').textContent=`${fmt(t.calories)} kcal`;document.getElementById('sideGoal').textContent=goalLabel();renderNav();
    const main=document.getElementById('main');
    const fn={dashboard:renderDashboard,diary:renderDiary,workout:renderWorkout,foods:renderFoods,recipes:renderRecipes,plans:renderPlans,activity:renderActivity,progress:renderProgress,water:renderWater,settings:renderSettings}[state.activePage]||renderDashboard;
    main.innerHTML=`<section class="page active">${fn()}</section>`;
    if(state.activePage==='progress')requestAnimationFrame(drawChart);saveState();
  };

  function ftNowLabel(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
  function ftOpenStepsModal(){
    const d=dayData();openModal('Log daily steps',`<div class="activity-explainer"><b>Selected date:</b> ${ftDateLabel(state.selectedDate)}. Set the full total from your phone/watch, or add a walk to the existing total.</div><div class="field" style="margin-top:14px"><label>Daily step total</label><input class="input" id="modalStepsTotal" type="number" min="0" step="1" value="${d.stepLogged?d.steps:''}" placeholder="Example: 8432"></div><div class="field" style="margin-top:12px"><label>Source</label><select class="select" id="modalStepSource">${['Manual','iPhone / Apple Health','Android / Google Fit','Smartwatch','Treadmill','Other'].map(x=>`<option ${x===d.stepSource?'selected':''}>${x}</option>`).join('')}</select></div><button class="btn primary wide" style="margin-top:14px" data-save-modal-steps="1">Save daily total</button><div class="divider"></div><div class="strong">Add a walk/session</div><div class="quick-step-grid" style="margin-top:10px">${[500,1000,2000].map(v=>`<button class="btn outline" data-add-steps="${v}">+${fmt(v)}</button>`).join('')}</div>`);
  }

  const ftV3OldClick=handleClick;
  handleClick=function(e){
    const b=e.target.closest?.('button,[data-nav]');if(!b)return;
    if('logSteps' in b.dataset){ftOpenStepsModal();return}
    if('saveStepsTotal' in b.dataset){const d=dayData(),v=Math.max(0,Number(document.getElementById('activityStepsTotal')?.value)||0);d.steps=v;d.stepLogged=true;d.stepSource=document.getElementById('activityStepSource')?.value||'Manual';d.stepUpdatedAt=ftNowLabel();render();toast('Daily step total saved');return}
    if('saveModalSteps' in b.dataset){const d=dayData(),v=Math.max(0,Number(document.getElementById('modalStepsTotal')?.value)||0);d.steps=v;d.stepLogged=true;d.stepSource=document.getElementById('modalStepSource')?.value||'Manual';d.stepUpdatedAt=ftNowLabel();closeModal();render();toast('Daily step total saved');return}
    if(b.dataset.addSteps){const d=dayData(),amount=Number(b.dataset.addSteps)||0;d.steps=(Number(d.steps)||0)+amount;d.stepLogged=true;d.stepUpdatedAt=ftNowLabel();d.stepEntries.push({id:'step-'+Date.now()+'-'+Math.random().toString(16).slice(2),steps:amount,source:d.stepSource||'Manual',time:ftNowLabel()});if(document.querySelector('[data-modal-backdrop]'))closeModal();render();toast(`Added ${fmt(amount)} steps`);return}
    if(b.dataset.removeStepEntry){const d=dayData(),entry=d.stepEntries.find(x=>x.id===b.dataset.removeStepEntry);if(entry)d.steps=Math.max(0,(Number(d.steps)||0)-Number(entry.steps||0));d.stepEntries=d.stepEntries.filter(x=>x.id!==b.dataset.removeStepEntry);d.stepLogged=d.steps>0;render();toast('Walk entry removed');return}
    if('clearSteps' in b.dataset){const d=dayData();d.steps=0;d.stepLogged=false;d.stepEntries=[];d.stepUpdatedAt='';render();toast('Steps cleared');return}
    if('saveSleep' in b.dataset){const d=dayData(),v=Math.max(0,Math.min(24,Number(document.getElementById('activitySleep')?.value)||0));d.sleep=v;d.sleepLogged=true;d.sleepUpdatedAt=ftNowLabel();render();toast('Sleep saved');return}
    if('clearSleep' in b.dataset){const d=dayData();d.sleep=0;d.sleepLogged=false;d.sleepUpdatedAt='';render();toast('Sleep cleared');return}
    if(b.dataset.activityDate){state.selectedDate=b.dataset.activityDate;render();window.scrollTo({top:0,behavior:'smooth'});return}
    if('clearFoodSearch' in b.dataset){const input=document.getElementById('foodSearch');if(input)input.value='';filterFoods();return}
    if('customFoodQuery' in b.dataset){const q=b.dataset.customFoodQuery||'';customFoodModal();setTimeout(()=>{const input=document.getElementById('cf-name');if(input)input.value=q},0);return}
    return ftV3OldClick(e);
  };

  const ftV3OldInput=handleInput;
  handleInput=function(e){
    ftV3OldInput(e);
    if(e.target.id==='activityNote'){dayData().activityNote=e.target.value;saveState()}
  };

  render();
})();
</script>

<script id="fittrack-v4-patch">
(()=>{
'use strict';
const FT_V4_VERSION='4.0';

/* ---------- data migration ---------- */
const ftV4OldDayData=dayData;
dayData=function(date=state.selectedDate){
  const d=ftV4OldDayData(date);
  d.stepEntries=Array.isArray(d.stepEntries)?d.stepEntries:[];
  d.waterEntries=Array.isArray(d.waterEntries)?d.waterEntries:[];
  if(!d.waterEntriesMigrated){if(Number(d.water)>0&&!d.waterEntries.length)d.waterEntries.push({id:'legacy-water-'+date,amount:Number(d.water),time:'Legacy total'});d.waterEntriesMigrated=true}
  d.sleepLogged=Boolean(d.sleepLogged||Number(d.sleep)>0);
  d.sleepStart=d.sleepStart||'';d.sleepEnd=d.sleepEnd||'';d.awakeMinutes=Number(d.awakeMinutes)||0;d.sleepQuality=d.sleepQuality||'';
  d.activityNote=d.activityNote||'';
  return d;
};
state.profile.excludedFoods=state.profile.excludedFoods||'';state.profile.allergies=state.profile.allergies||'';state.profile.maxPrepTime=Number(state.profile.maxPrepTime)||45;
if(!state.settings)state.settings={};if(!state.settings.initialMeasurementReviewed&&state.measurements?.length===1){const m=state.measurements[0];if(Number(m.waist)===102&&Number(m.bodyFat)===28){m.waist=0;m.bodyFat=0}state.settings.initialMeasurementReviewed=true;}

/* ---------- household serving system ---------- */

function ftServingOptions(f){
  const custom=Array.isArray(f.servings)?f.servings.map((s,i)=>({key:s.key||'custom-'+i,label:s.label||s.name||'serving',grams:Number(s.grams)||Number(f.servingG)||100})):[];
  const mapped=(FT_SERVING_MAP[f.id]||[]).map(x=>({key:x[0],label:x[1],grams:x[2]}));
  const base=custom.length?custom:mapped;
  if(!base.length)base.push({key:'serving',label:`1 serving (${fmt(f.servingG)} g)`,grams:Number(f.servingG)||100});
  base.push({key:'grams',label:'grams',grams:1});
  return base;
}
function ftServingByKey(f,key){return ftServingOptions(f).find(x=>x.key===key)||ftServingOptions(f)[0]}
function ftDefaultServing(f){return ftServingOptions(f)[0]}
function ftQtyLabel(q,s){if(s.key==='grams')return `${fmt(q,1)} g`;if(Math.abs(Number(q)-1)<.001)return s.label;return `${fmt(q,1)} × ${s.label.replace(/^1\s*/, '')}`}
function ftFoodSearchText(f){return [f.name,f.category,...(f.aliases||[])].join(' ').toLowerCase()}
function ftFoodAllowed(f){const ex=(state.profile.excludedFoods||'').toLowerCase().split(',').map(x=>x.trim()).filter(Boolean);return !ex.some(x=>ftFoodSearchText(f).includes(x))}
function ftMacroByServing(f,qty,key){const s=ftServingByKey(f,key),grams=Number(qty||0)*Number(s.grams||0);return {grams,serving:s,...macroForFood(f,grams)}}
function ftServingSelect(f,idPrefix,selectedKey){return `<select class="select" id="${idPrefix}-unit" data-serving-food="${f.id}" data-serving-prefix="${idPrefix}">${ftServingOptions(f).map(s=>`<option value="${s.key}" ${s.key===selectedKey?'selected':''}>${escapeHtml(s.label)}</option>`).join('')}</select>`}
function ftServingPreview(f,qty,key){const x=ftMacroByServing(f,qty,key);return `<div class="serving-primary">${ftQtyLabel(qty,x.serving)} · ${fmt(x.kcal)} kcal · P ${fmt(x.protein,1)} g</div><div class="serving-secondary">Approx. ${fmt(x.grams)} g · per 100 g: ${fmt(f.kcal)} kcal</div>`}
function ftUpdateServingPreview(prefix,fid){const f=foodById(fid),q=Number(document.getElementById(prefix+'-qty')?.value)||0,key=document.getElementById(prefix+'-unit')?.value||ftDefaultServing(f).key,el=document.getElementById(prefix+'-preview');if(el)el.innerHTML=ftServingPreview(f,q,key)}

filterFoods=function(){const q=(document.getElementById('foodSearch')?.value||'').trim().toLowerCase(),cat=document.getElementById('foodCategory')?.value||'All';const arr=allFoods().filter(f=>(!q||ftFoodSearchText(f).includes(q))&&(cat==='All'||f.category===cat)&&(foodDiet==='all'||f.diet===foodDiet)&&ftFoodAllowed(f));const el=document.getElementById('foodList');if(el)el.innerHTML=arr.length?foodCards(arr.slice(0,180)):`<div class="card empty"><b>No exact match found.</b><div class="search-help">Try another spelling, a shorter search, or create a custom food from a package label or recipe.</div><div class="no-results-actions"><button class="btn primary small" data-custom-food-query="${escapeHtml(q)}">Create custom food</button></div></div>`}
renderFoods=function(){const cats=['All',...new Set(allFoods().map(f=>f.category))];return `${pageHead('Food database',`${allFoods().length} foods with Indian aliases and household measures`,`<button class="btn primary small" data-custom-food="1">Add food</button>`)}<div class="searchbar"><div class="search-row"><input class="input" id="foodSearch" placeholder="Search pulao, pulav, roti, bread roll..."><select class="select" id="foodCategory" style="max-width:140px">${cats.map(c=>`<option>${c}</option>`).join('')}</select></div><div class="tabs" style="margin-top:8px"><button class="tab active" data-food-diet="all">All</button><button class="tab" data-food-diet="veg">Veg</button><button class="tab" data-food-diet="egg">Egg</button><button class="tab" data-food-diet="nonveg">Non-veg</button></div></div><div class="audit-note">Serving nutrition is shown first. Prepared dishes remain estimates because oil, ingredients and portion size vary. Use your package label or custom recipe for higher accuracy.</div><div class="food-list" id="foodList" style="margin-top:12px">${foodCards(allFoods().filter(ftFoodAllowed).slice(0,60))}</div>`}
renderPicker=function(meal){meal=meal||document.getElementById('pickerMeal')?.value||ftActivePickerMeal;ftActivePickerMeal=meal;const q=(document.getElementById('pickerSearch')?.value||'').trim().toLowerCase(),type=document.getElementById('pickerType')?.value||'foods',el=document.getElementById('pickerList');if(!el)return;if(type==='foods'){let arr=allFoods().filter(f=>(!q||ftFoodSearchText(f).includes(q))&&ftFoodAllowed(f));if(meal==='Supplements'&&!q)arr=arr.filter(f=>f.category==='Supplements');arr=arr.slice(0,80);el.innerHTML=arr.length?arr.map(f=>{const s=ftDefaultServing(f),prefix='pick-'+f.id;return `<div class="card food-card"><div class="food-card-top"><div><h3>${escapeHtml(f.name)}</h3><p>${escapeHtml(f.category)}</p></div><span class="pill">${escapeHtml(s.label)}</span></div><div class="serving-controls"><input class="input" id="${prefix}-qty" data-serving-qty="${f.id}" data-serving-prefix="${prefix}" type="number" min="0.1" step="0.1" value="1" inputmode="decimal">${ftServingSelect(f,prefix,s.key)}</div><div class="serving-preview" id="${prefix}-preview">${ftServingPreview(f,1,s.key)}</div><button class="btn primary wide small" style="margin-top:10px" data-picker-serving="${f.id}|${meal}">Add to ${meal}</button></div>`}).join(''):`<div class="empty card">No matching foods. Create a custom item from the Foods tab.</div>`}else{const arr=allRecipes().filter(r=>(!q||r.name.toLowerCase().includes(q))&&dietAllowed(r.diet)&&ftRecipeAllowed(r));el.innerHTML=arr.length?arr.map(r=>`<div class="card food-card"><h3>${escapeHtml(r.name)}</h3><p>${r.macros.kcal} kcal · P ${r.macros.protein}g · ${r.meal}</p><button class="btn primary wide small" style="margin-top:10px" data-picker-recipe="${r.id}|${meal}">Add serving</button></div>`).join(''):'<div class="empty card">No matching recipes.</div>'}}

/* ---------- activity and sleep ---------- */
function ftSleepDuration(start,end,awake=0){if(!start||!end)return 0;const [sh,sm]=start.split(':').map(Number),[eh,em]=end.split(':').map(Number);let mins=(eh*60+em)-(sh*60+sm);if(mins<=0)mins+=1440;return Math.max(0,(mins-Number(awake||0))/60)}
function ftSleepPreview(){const start=document.getElementById('sleepStart')?.value||'',end=document.getElementById('sleepEnd')?.value||'',awake=Number(document.getElementById('sleepAwake')?.value)||0,h=ftSleepDuration(start,end,awake),el=document.getElementById('sleepCalc');if(el)el.innerHTML=h?`<b>${fmt(h,2)} hours</b><span class="muted tiny">Calculated sleep after subtracting ${fmt(awake)} awake minutes.</span>`:'<span class="muted">Enter bedtime and wake time.</span>'}
function ftSleepCard(d){const legacy=d.sleepLogged&&!d.sleepStart;return `<div class="card card-pad"><div class="section-title" style="margin-top:0"><h2>Sleep interval</h2><span class="pill ${d.sleepLogged?'good':''}">${d.sleepLogged?'Recorded':'Missing'}</span></div>${legacy?`<div class="audit-note" style="margin-bottom:12px">Existing duration-only record: ${fmt(d.sleep,1)} h. Enter times below to replace it with a clearer record.</div>`:''}<div class="sleep-grid"><div class="field"><label>Bedtime</label><input class="input" id="sleepStart" type="time" value="${d.sleepStart||''}"></div><div class="field"><label>Wake time</label><input class="input" id="sleepEnd" type="time" value="${d.sleepEnd||''}"></div><div class="field"><label>Awake during night (min)</label><input class="input" id="sleepAwake" type="number" min="0" max="600" value="${d.awakeMinutes||0}"></div><div class="field"><label>Sleep quality</label><select class="select" id="sleepQuality"><option value="">Select</option>${['Poor','Fair','Good','Excellent'].map(x=>`<option ${d.sleepQuality===x?'selected':''}>${x}</option>`).join('')}</select></div></div><div class="sleep-result" id="sleepCalc">${d.sleepLogged?`<b>${fmt(d.sleep,2)} hours</b><span class="muted tiny">${d.sleepStart?`${d.sleepStart} to ${d.sleepEnd}`:'Duration-only record'}</span>`:'<span class="muted">Enter bedtime and wake time.</span>'}</div><div class="activity-form-actions" style="margin-top:12px"><button class="btn primary" data-save-sleep-times="1">Save sleep</button><button class="btn danger-btn" data-clear-sleep="1">Clear sleep</button></div></div>`}
function ftActivityHistoryV4(){return Array.from({length:7},(_,i)=>{const dt=new Date(state.selectedDate+'T12:00:00');dt.setDate(dt.getDate()-i);const key=localDate(dt),x=state.diary[key]||{},steps=Number(x.steps)||0,sleep=Number(x.sleep)||0;return `<button class="history-row ${key===state.selectedDate?'active':''}" data-activity-date="${key}"><span>${dt.toLocaleDateString(undefined,{weekday:'short',day:'numeric'})}</span><div><div class="history-bar"><i style="width:${pct(steps,state.profile.stepGoal)}%"></i></div><div class="tiny muted">${sleep?`${fmt(sleep,1)} h sleep`:'No sleep'}</div></div><b>${fmt(steps)}</b></button>`}).join('')}
function ftStepLogV4(d){return d.stepEntries.length?`<div class="activity-log">${d.stepEntries.map(x=>`<div class="activity-log-row"><div><b>+${fmt(x.steps)} steps</b><div class="tiny muted">${escapeHtml(x.source||'Manual')} · ${escapeHtml(x.time||'')}</div></div><button class="btn small danger-btn" data-remove-step-entry="${x.id}">Remove</button></div>`).join('')}</div>`:'<div class="empty">No separate walk sessions logged.</div>'}
window.renderActivityV4=function(){const d=dayData(),logged=d.stepLogged||Number(d.steps)>0,updated=d.stepUpdatedAt||'not updated';return `${pageHead('Activity and sleep',`Daily movement and recovery for ${new Date(state.selectedDate+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'short'})}`,`<button class="btn outline small" data-log-steps="1">Quick steps</button>`)}<div class="activity-explainer"><b>Selected-date tracker:</b> everything on this page is saved to the date shown at the top. Set the full step total from your phone/watch. Add a walk only when it is not already included in that total. Sleep is calculated automatically from bedtime and wake time.</div><div class="activity-layout" style="margin-top:14px"><div class="stack"><div class="card activity-hero"><div class="activity-status"><span class="pill ${logged?'good':''}">${logged?'Steps recorded':'Steps missing'}</span><span class="pill">Goal ${fmt(state.profile.stepGoal)}</span></div><div><div class="activity-total">${logged?fmt(d.steps):'—'} <small>steps</small></div><div class="step-source-line">${logged?escapeHtml(d.stepSource||'Manual'):'No source selected'} · ${updated}</div></div><div class="progress"><i style="width:${pct(d.steps,state.profile.stepGoal)}%"></i></div><div class="activity-form"><div class="field"><label>Daily step total</label><input class="input" id="activityStepsTotal" type="number" min="0" step="1" value="${logged?d.steps:''}" placeholder="Example: 8432"><div class="field-help">Enter the full total shown by your device.</div></div><div class="field"><label>Source</label><select class="select" id="activityStepSource">${['Manual','iPhone / Apple Health','Android / Google Fit','Smartwatch','Treadmill','Other'].map(x=>`<option ${x===d.stepSource?'selected':''}>${x}</option>`).join('')}</select></div><div class="activity-form-actions full"><button class="btn primary" data-save-steps-total="1">Set daily total</button><button class="btn danger-btn" data-clear-steps="1">Clear</button></div></div><div><div class="strong" style="margin-bottom:9px">Add a walk not included above</div><div class="quick-step-grid">${[500,1000,2000].map(v=>`<button class="btn outline" data-add-steps="${v}">+${fmt(v)} steps</button>`).join('')}</div></div></div>${ftSleepCard(d)}<div class="card card-pad"><div class="section-title" style="margin-top:0"><h2>Activity note</h2></div><textarea class="textarea" id="activityNote" placeholder="Walk route, soreness, energy, recovery...">${escapeHtml(d.activityNote||'')}</textarea></div></div><div class="stack"><div class="card card-pad"><div class="section-title" style="margin-top:0"><h2>Last 7 days</h2><small>Tap a day to edit</small></div>${ftActivityHistoryV4()}</div><div class="card card-pad"><div class="section-title" style="margin-top:0"><h2>Walk/session log</h2><small>${d.stepEntries.length} entries</small></div>${ftStepLogV4(d)}</div></div></div>`}

function ftMetricNav(label,value,target,unit,nav,logged=true){return `<button class="card metric-card metric-button clickable-card" data-nav="${nav}" aria-label="Open ${label}"><div class="metric-label">${label}</div><div class="metric-value">${logged?fmt(value,1):'—'} <span>/ ${fmt(target,1)} ${unit}</span></div><div class="progress"><i style="width:${logged?pct(value,target):0}%"></i></div></button>`}
checklistItems=function(){const d=dayData(),t=calcTargets(),x=totalsForDay(),p=workoutForDate();syncWorkoutCompletion();const mainLogged=['Breakfast','Lunch','Dinner'].filter(m=>d.meals[m]?.length).length,calLow=Math.round(t.calories*.85),calHigh=Math.round(t.calories*1.1),calDone=x.kcal>=calLow&&x.kcal<=calHigh;return [
 {label:'Calories within plan',done:calDone,detail:x.kcal<calLow?`${fmt(calLow-x.kcal)} kcal remaining before minimum`:x.kcal>calHigh?`${fmt(x.kcal-calHigh)} kcal above range`:'Within target range',nav:'diary'},
 {label:'Protein target',done:x.protein>=t.protein,detail:`${fmt(x.protein,1)} / ${fmt(t.protein)} g`,nav:'diary'},
 {label:'Main meals recorded',done:mainLogged===3,detail:`${mainLogged} / 3 meals`,action:'chooseMeal'},
 {label:p.exercises.length?'Workout completed':'Recovery day',done:p.exercises.length?d.workout.completed:true,detail:p.exercises.length?p.name:'No strength workout scheduled',nav:'workout'},
 {label:'Steps recorded',done:Boolean(d.stepLogged||Number(d.steps)>0),detail:d.stepLogged||d.steps?`${fmt(d.steps)} steps recorded`:'No total recorded',nav:'activity'},
 {label:'Steps goal reached',done:Number(d.steps)>=state.profile.stepGoal,detail:`${fmt(d.steps)} / ${fmt(state.profile.stepGoal)}`,nav:'activity'},
 {label:'Water goal',done:d.water>=state.profile.waterGoal,detail:`${fmt(d.water/1000,1)} / ${fmt(state.profile.waterGoal/1000,1)} L`,nav:'water'},
 {label:'Sleep recorded',done:Boolean(d.sleepLogged),detail:d.sleepLogged?`${fmt(d.sleep,1)} h recorded`:'Bedtime and wake time missing',nav:'activity'},
 {label:'Sleep goal reached',done:Boolean(d.sleepLogged)&&d.sleep>=state.profile.sleepGoal,detail:`${fmt(d.sleep,1)} / ${fmt(state.profile.sleepGoal,1)} h`,nav:'activity'},
 {label:'Fiber target',done:x.fiber>=t.fiber,detail:`${fmt(x.fiber,1)} / ${fmt(t.fiber)} g`,nav:'diary'}]}
renderDashboard=function(){const d=dayData(),t=calcTargets(),x=totalsForDay(),checks=checklistItems(),missing=checks.filter(c=>!c.done),remaining={k:Math.max(0,t.calories-x.kcal),p:Math.max(0,t.protein-x.protein),w:Math.max(0,state.profile.waterGoal-d.water),s:Math.max(0,state.profile.stepGoal-d.steps)};return `${pageHead(`Today, ${state.profile.name}`,`${new Date(state.selectedDate+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'})}`,`<button class="btn outline small" data-nav="settings">Edit goals</button>`)}<div class="grid grid-lg-2"><div class="card hero-card"><div class="ring" style="--p:${pct(x.kcal,t.calories)}"><div class="ring-content"><b>${fmt(x.kcal)}</b><span>of ${fmt(t.calories)} kcal</span></div></div><div><div class="strong">Daily nutrition</div>${['protein','carbs','fat'].map(k=>`<div class="macro-row"><label>${k[0].toUpperCase()+k.slice(1)}</label><div class="progress"><i style="width:${pct(x[k],t[k])}%"></i></div><b>${fmt(x[k])}/${fmt(t[k])}g</b></div>`).join('')}<div class="tiny muted">Remaining: ${fmt(remaining.k)} kcal · ${fmt(remaining.p)} g protein</div></div></div><div class="grid grid-2">${ftMetricNav('Steps',d.steps,state.profile.stepGoal,'steps','activity',d.stepLogged||d.steps>0)}${ftMetricNav('Water',d.water/1000,state.profile.waterGoal/1000,'L','water',true)}${ftMetricNav('Weight',latestWeight(),state.profile.goalWeight,'kg','progress',true)}${ftMetricNav('Sleep',d.sleep,state.profile.sleepGoal,'h','activity',d.sleepLogged)}</div></div><div class="section-title"><h2>Quick actions</h2></div><div class="quick-grid activity-actions"><button class="quick-btn" data-choose-meal="1">Log food<small>Breakfast, lunch, dinner and more</small></button><button class="quick-btn" data-log-steps="1">Log steps<small>${fmt(remaining.s)} remaining</small></button><button class="quick-btn" data-nav="workout">Log workout<small>Track every set</small></button><button class="quick-btn" data-nav="water">Log water<small>${fmt(remaining.w)} ml remaining</small></button><button class="quick-btn" data-nav="activity">Log sleep<small>Bedtime and wake time</small></button><button class="quick-btn" data-measure="1">Body stats<small>Weight and waist</small></button></div><div class="grid grid-lg-2"><div><div class="section-title"><h2>Daily checklist</h2><small>${checks.length-missing.length}/${checks.length}</small></div><div class="card card-pad check-list">${missing.length?`<div class="missing-banner"><b>${missing.length} checks still incomplete</b><span>${missing.slice(0,3).map(x=>x.label).join(', ')}</span></div>`:''}${checks.map(c=>`<div class="check-row auto-check ${c.done?'done':'missing'}"><span class="status-dot">${c.done?'✓':'!'}</span><div class="auto-check-main"><b>${c.label}</b><span>${c.detail}</span></div>${c.done?'':c.action==='chooseMeal'?`<button class="btn small outline" data-choose-meal="1">Add</button>`:`<button class="btn small outline" data-nav="${c.nav}">Open</button>`}</div>`).join('')}</div></div><div><div class="section-title"><h2>What to eat next</h2><button class="btn small outline" data-apply-today-plan="1">Fill empty meals</button></div>${renderSuggestions()}</div></div><div class="section-title"><h2>Today’s plan</h2><button class="btn small outline" data-nav="plans">Full plan</button></div><div class="card card-pad">${todayPlanPreview()}</div><div class="section-title"><h2>Daily notes</h2></div><div class="card card-pad"><textarea class="textarea" id="dailyNotes" placeholder="Energy, hunger, pain, wins, observations...">${escapeHtml(d.notes||'')}</textarea></div>`}

function ftAddWater(amount,label){const d=dayData(),v=Math.max(0,Number(amount)||0);if(!v)return;d.waterEntries.push({id:'water-'+Date.now()+'-'+Math.random().toString(16).slice(2),amount:v,label:label||`${v} ml`,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});d.water=round(d.waterEntries.reduce((s,x)=>s+Number(x.amount||0),0));render();toast(`Added ${fmt(v)} ml`)}

tton>`}).join('')}</div>`}

function ftPreviousExerciseLog(id){const dates=Object.keys(state.diary).filter(x=>x<state.selectedDate).sort().reverse();for(const date of dates){const log=state.diary[date]?.workout?.logs?.[id];if(log?.sets?.some(s=>s.result||s.weight))return {date,log}}return null}
function ftRestSeconds(rest){const s=String(rest||'');const nums=(s.match(/\d+/g)||[]).map(Number);if(/min/i.test(s))return (nums[0]||1)*60;return nums[0]||90}

ass="set-input" inputmode="decimal" data-set-result="${e.id}|${i}" value="${escapeHtml(s.result||'')}" placeholder="${timed?'sec':'reps'}"><input class="set-input" type="number" min="0" max="5" data-set-rir="${e.id}|${i}" value="${escapeHtml(s.rir||'')}" placeholder="RIR"><button class="set-check ${s.done?'done':''}" data-set-done-v4="${e.id}|${i}">✓</button></div>`:`<div class="set-row"><span class="set-label">${i+1}</span><input class="set-input" type="number" inputmode="decimal" min="0" step="0.5" data-set-weight="${e.id}|${i}" value="${escapeHtml(s.weight||'')}" placeholder="kg"><input class="set-input" inputmode="numeric" data-set-result="${e.id}|${i}" value="${escapeHtml(s.result||'')}" placeholder="reps"><input class="set-input" type="number" min="0" max="5" data-set-rir="${e.id}|${i}" value="${escapeHtml(s.rir||'')}" placeholder="RIR"><button class="set-check ${s.done?'done':''}" data-set-done-v4="${e.id}|${i}">✓</button></div>`).join('')}</div><div class="set-actions"><button class="btn small outline" data-add-set="${e.id}">Add set</button>${log.sets.length>1?`<button class="btn small outline" data-remove-set="${e.id}">Remove last</button>`:''}<button class="btn small outline" data-rest-timer="${ftRestSeconds(e.rest)}">Rest ${escapeHtml(e.rest)}</button></div></div>`}
renderWorkout=function(){const p=workoutForDate(),d=dayData(),days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];syncWorkoutCompletion();const completed=p.exercises.filter(id=>exerciseDone(exById(id),ensureSetLog(exById(id),d))).length;return `${pageHead('Workout','Log each set, compare previous performance and use RIR',`<button class="btn outline small" data-edit-workout="1">Edit day</button>`)}<div class="tabs">${days.map((x,i)=>{const plan=state.workoutPlan.find(p=>p.day===i);return `<button class="tab ${p.day===i?'active':''}" data-workout-day-v4="${i}">${x} · ${plan?.name||'Rest'}</button>`}).join('')}</div><div class="card exercise-card" style="margin-top:12px"><div class="food-card-top"><div><h3>${p.name}</h3><p>${p.type} · ${p.exercises.length} activities</p><div class="workout-progress-note">${completed}/${p.exercises.length} activities completed</div></div><span class="pill good">Research aligned</span></div><div style="margin-top:10px">${p.exercises.map(id=>renderExercise(exById(id),d)).join('')||'<div class="empty">Rest, gentle walking and mobility as comfortable.</div>'}</div>${p.exercises.length?`<button class="btn ${d.workout.completed?'outline':'primary'} wide" style="margin-top:14px" data-finish-workout-v4="1">${d.workout.completed?'All logged sets completed':'Complete filled sets'}</button>`:''}</div><div class="section-title"><h2>Logging guide</h2></div><div class="card card-pad"><div class="notice">Enter actual load and reps for every set. RIR means how many good repetitions you believe remained. A set cannot be marked complete until its result is entered. Previous-session values are shown for comparison.</div></div>`}

/* ---------- practical weekly plans ---------- */
function ftRecipeAllowed(r){const ex=(state.profile.excludedFoods||'').toLowerCase().split(',').map(x=>x.trim()).filter(Boolean);const text=[r.name,...(r.ingredients||[])].join(' ').toLowerCase();return !ex.some(x=>text.includes(x))}
function ftMondayOfSelected(){const dt=new Date(state.selectedDate+'T12:00:00'),day=dt.getDay(),diff=day===0?-6:1-day;dt.setDate(dt.getDate()+diff);return dt}

 if(b.dataset.confirmPlanDay){ftApplyPlanDay(Number(b.dataset.confirmPlanDay));return}
 if(b.dataset.deleteMeasureV4!==undefined){const idx=Number(b.dataset.deleteMeasureV4),item=state.measurements.splice(idx,1)[0];render();ftShowUndo('Measurement deleted',()=>{state.measurements.splice(idx,0,item);render()});return}
 if('saveProfileV4' in b.dataset){const keys=['name','sex','age','height','weight','goalWeight','goal','activity','rate','diet','proteinPerKg','workoutDays','stepGoal','waterGoal','sleepGoal','fiberGoal','manualCalories','manualProtein','manualCarbs','manualFat','excludedFoods','allergies','maxPrepTime'];keys.forEach(k=>{const el=document.getElementById('p-'+k);if(el)state.profile[k]=['name','sex','goal','diet','excludedFoods','allergies'].includes(k)?el.value:Number(el.value)});state.profile.accent=document.getElementById('accentPicker')?.value||state.profile.accent;saveState();render();toast('Settings saved');return}
 return ftV4OldClick(e)};

const ftV4OldInput=handleInput;
handleInput=function(e){ftV4OldInput(e);if(e.target.dataset.servingQty||e.target.dataset.servingFood){const prefix=e.target.dataset.servingPrefix,fid=e.target.dataset.servingQty||e.target.dataset.servingFood;ftUpdateServingPreview(prefix,fid)}if(['sleepStart','sleepEnd','sleepAwake'].includes(e.target.id))ftSleepPreview();if(e.target.id==='recipeFoodSelect')ftUpdateRecipeUnit();if(e.target.id==='cr-servings')ftRenderRecipeDraft();if(e.target.dataset.viewRecipeServings){const r=allRecipes().find(x=>x.id===e.target.dataset.viewRecipeServings);if(r)ftRenderViewedRecipe(r,Math.max(.25,Number(e.target.value)||1));}if(e.target.dataset.setRir){const [id,idx]=e.target.dataset.setRir.split('|');ensureSetLog(exById(id)).sets[Number(idx)].rir=e.target.value;saveState()}};

/* capture RIR input because old handler does not know it */
document.addEventListener('input',e=>{if(e.target.dataset.setRir){const [id,idx]=e.target.dataset.setRir.split('|');ensureSetLog(exById(id)).sets[Number(idx)].rir=e.target.value;saveState()}},{capture:true});

/* keep legacy +250 shortcuts consistent with entry model */
document.addEventListener('click',e=>{const b=e.target.closest?.('[data-water]');if(!b)return;e.stopImmediatePropagation();const amount=Number(b.dataset.water)||0;if(amount>0)ftAddWater(amount,'Quick add');else if(amount<0){const d=dayData(),last=d.waterEntries.at(-1);if(last){d.waterEntries.pop();d.water=round(d.waterEntries.reduce((s,x)=>s+Number(x.amount||0),0));render();toast('Last water entry removed')}}},{capture:true});

render=function(){document.documentElement.style.setProperty('--accent',state.profile.accent||'#78e23f');document.getElementById('globalDate').value=state.selectedDate;document.getElementById('headerSubtitle').textContent=`${goalLabel()} · ${state.profile.diet}`;const t=calcTargets();document.getElementById('sideTarget').textContent=`${fmt(t.calories)} kcal`;document.getElementById('sideGoal').textContent=goalLabel();renderNav();const main=document.getElementById('main');const fn={dashboard:renderDashboard,diary:renderDiary,workout:renderWorkout,foods:renderFoods,recipes:renderRecipes,plans:renderPlans,activity:window.renderActivityV4,progress:renderProgress,water:renderWater,settings:renderSettings}[state.activePage]||renderDashboard;main.innerHTML=`<section class="page active">${fn()}</section>`;if(state.activePage==='progress')requestAnimationFrame(drawChart);saveState()};

render();
})();

<script id="fittrack-v5-patch">
(()=>{
'use strict';
const FT_V5_VERSION='5.0';
state.favourites=Array.isArray(state.favourites)?state.favourites:[];
state.recentFoods=Array.isArray(state.recentFoods)?state.recentFoods:[];
state.recentRecipes=Array.isArray(state.recentRecipes)?state.recentRecipes:[];

const ftV5DayDataBase=dayData;
dayData=function(date=state.selectedDate){
 const d=ftV5DayDataBase(date);
 d.workout=d.workout||{completed:false,logs:{}};
 d.workout.sessionNote=d.workout.sessionNote||'';
 d.workout.discomfort=Number(d.workout.discomfort)||0;
 d.workout.energy=d.workout.energy||'';
 d.stepEntries=Array.isArray(d.stepEntries)?d.stepEntries:[];
 d.waterEntries=Array.isArray(d.waterEntries)?d.waterEntries:[];
 return d;
};

/* Additional practical household measures. Nutrition still derives from the stored per-100-g value. */
const FT_V5_SERVINGS={
 'appam':[['piece','1 appam',65]],'methi-thepla':[['piece','1 thepla',55]],'kachori':[['piece','1 kachori',80]],'aloo-tikki':[['piece','1 tikki',70]],
 'marie-biscuit':[['piece','1 biscuit',7]],'digestive-biscuit':[['piece','1 biscuit',15]],'protein-bar':[['piece','1 bar',60]],
 'paneer-tikka':[['piece','1 tikka piece',30],['serving','1 plate',150]],'chicken-tikka':[['piece','1 tikka piece',30],['serving','1 plate',150]],
 'chicken-kebab':[['piece','1 kebab',45],['serving','1 plate',150]],'fish-tikka':[['piece','1 tikka piece',35],['serving','1 plate',160]],
 'gulab-jamun':[['piece','1 piece',50]],'rasgulla':[['piece','1 piece',50]],'jalebi':[['piece','1 small jalebi',25]],'milk-barfi':[['piece','1 piece',40]],
 'pav-bhaji':[['plate','1 plate',350]],'bhel-puri':[['bowl','1 bowl',180]],'sweet-corn-chaat':[['cup','1 cup',160]],
 'tea-milk-sugar':[['cup','1 cup',180]],'tea-milk-no-sugar':[['cup','1 cup',180]],'coffee-milk-sugar':[['cup','1 cup',200]],
 'sweet-lassi':[['glass','1 glass',300]],'salted-lassi':[['glass','1 glass',300]],'orange-juice':[['glass','1 glass',250]],
 'coconut-water':[['glass','1 glass',250]],'protein-powder':[['scoop','1 scoop',30]],'whey-protein':[['scoop','1 scoop',30]]
};
Object.entries(FT_V5_SERVINGS).forEach(([id,list])=>{const f=allFoods().find(x=>x.id===id);if(f&&!Array.isArray(f.servings))f.servings=list.map(x=>({key:x[0],label:x[1],grams:x[2]}));});

function ftV5Normalize(s){
 return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\b(pulav|pulaav|pulau)\b/g,'pulao').replace(/\b(omlet|omelet)\b/g,'omelette').replace(/\bidly\b/g,'idli').replace(/\bpakoda\b/g,'pakora').replace(/\byoghurt\b/g,'yogurt').replace(/\bdahi\b/g,'curd').replace(/\bgolgappa\b/g,'pani puri').replace(/\bphulka\b/g,'roti').replace(/\s+/g,' ').trim();
}
function ftV5Distance(a,b){a=ftV5Normalize(a);b=ftV5Normalize(b);const m=a.length,n=b.length;if(!m)return n;if(!n)return m;const d=Array.from({length:m+1},()=>Array(n+1).fill(0));for(let i=0;i<=m;i++)d[i][0]=i;for(let j=0;j<=n;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return d[m][n];}
function ftV5FoodText(f){return ftV5Normalize([f.name,f.category,...(f.aliases||[])].join(' '));}
function ftV5SearchScore(f,q){
 const nq=ftV5Normalize(q),text=ftV5FoodText(f),name=ftV5Normalize(f.name);if(!nq)return 50;
 if(name===nq)return 0;if(name.startsWith(nq))return 1;if(name.includes(nq))return 2;if(text.includes(nq))return 3;
 const qwords=nq.split(' '),words=text.split(' ');if(qwords.every(qw=>words.some(w=>w.startsWith(qw))))return 4;
 let best=99;for(const qw of qwords)for(const w of words)best=Math.min(best,ftV5Distance(qw,w));return best<=2?6+best:999;
}
function ftV5FoodAllowed(f){const ex=String(state.profile.excludedFoods||'').toLowerCase().split(',').map(x=>x.trim()).filter(Boolean);return !ex.some(x=>ftV5FoodText(f).includes(ftV5Normalize(x)));}
function ftV5RecordRecent(id){if(!id)return;state.recentFoods=[id,...state.recentFoods.filter(x=>x!==id)].slice(0,12);saveState();}
function ftV5ToggleFavourite(id){state.favourites.includes(id)?state.favourites=state.favourites.filter(x=>x!==id):state.favourites.unshift(id);saveState();render();toast(state.favourites.includes(id)?'Added to favourites':'Removed from favourites');}
function ftV5DecorateFoodCards(){
 document.querySelectorAll('.food-card').forEach(card=>{if(card.querySelector('[data-v5-favorite]'))return;const name=card.querySelector('h3')?.textContent?.trim(),f=allFoods().find(x=>x.name===name);if(!f)return;const top=card.querySelector('.food-card-top');if(!top)return;top.classList.add('v5');const btn=document.createElement('button');btn.className='favorite-btn '+(state.favourites.includes(f.id)?'on':'');btn.dataset.v5Favorite=f.id;btn.setAttribute('aria-label','Toggle favourite');btn.textContent=state.favourites.includes(f.id)?'★':'☆';top.appendChild(btn);});
}
const ftV5OldFilterFoods=filterFoods;
filterFoods=function(){
 const q=(document.getElementById('foodSearch')?.value||'').trim(),cat=document.getElementById('foodCategory')?.value||'All';
 let arr=allFoods().filter(f=>(cat==='All'||f.category===cat)&&(foodDiet==='all'||f.diet===foodDiet)&&ftV5FoodAllowed(f));
 arr=arr.map(f=>({f,score:ftV5SearchScore(f,q)})).filter(x=>x.score<999).sort((a,b)=>{const af=state.favourites.includes(a.f.id)?-1:0,bf=state.favourites.includes(b.f.id)?-1:0;return af-bf||a.score-b.score||a.f.name.localeCompare(b.f.name)}).map(x=>x.f);
 const el=document.getElementById('foodList');if(el){el.innerHTML=arr.length?foodCards(arr):`<div class="card card-pad"><div class="empty">No matching food. Try another spelling or create a custom food.</div><button class="btn primary wide" data-custom-food-query="${escapeHtml(q)}">Create “${escapeHtml(q||'custom food')}”</button></div>`;el.insertAdjacentHTML('beforebegin',`<div class="search-result-count" id="v5SearchCount">${arr.length} result${arr.length===1?'':'s'}${q?` for “${escapeHtml(q)}”`:''}</div>`);document.querySelectorAll('#v5SearchCount').forEach((n,i)=>{if(i) n.remove()});requestAnimationFrame(ftV5DecorateFoodCards);}
};

function ftV5QuickFoodCard(f){return `<div class="card quick-food"><h3>${escapeHtml(f.name)}</h3><p>${escapeHtml(f.category)} · ${escapeHtml(f.source||'Reference/estimate')}</p><div class="quick-food-actions"><button class="btn small primary" data-direct-add="${f.id}">Add</button><button class="favorite-btn ${state.favourites.includes(f.id)?'on':''}" data-v5-favorite="${f.id}" aria-label="Toggle favourite">${state.favourites.includes(f.id)?'★':'☆'}</button></div></div>`;}
function ftV5QuickShelf(){const ids=[...state.favourites,...state.recentFoods].filter((x,i,a)=>a.indexOf(x)===i),foods=ids.map(id=>allFoods().find(f=>f.id===id)).filter(Boolean).slice(0,10);if(!foods.length)return `<div class="audit-note">Favourite foods and recently logged foods will appear here for faster logging.</div>`;return `<div class="quick-food-shelf">${foods.map(ftV5QuickFoodCard).join('')}</div>`;}
renderDiary=function(){const d=dayData(),t=calcTargets(),x=totalsForDay();return `${pageHead('Food diary','Meals and nutrition for the selected date',`<div class="diary-tools"><button class="btn outline small" data-v5-copy-yesterday="1">Copy yesterday</button><button class="btn primary small" data-choose-meal="1">Add item</button></div>`)}<div class="summary-strip">${[['Calories',x.kcal,t.calories,'kcal'],['Protein',x.protein,t.protein,'g'],['Carbs',x.carbs,t.carbs,'g'],['Fat',x.fat,t.fat,'g'],['Fiber',x.fiber,t.fiber,'g']].map(a=>`<div class="summary-item"><span>${a[0]}</span><b>${fmt(a[1],1)}</b><small class="muted">/ ${fmt(a[2])}${a[3]}</small></div>`).join('')}</div><div class="section-title"><h2>Favourites and recent foods</h2><button class="btn small outline" data-nav="foods">Browse foods</button></div>${ftV5QuickShelf()}<div class="section-title"><h2>Suggested next meal</h2><button class="btn small outline" data-apply-today-plan="1">Fill empty meals</button></div>${renderSuggestions()}<div class="stack" style="margin-top:16px">${MEALS.map(m=>renderMeal(m,d.meals[m])).join('')}</div><div class="section-title"><h2>Activity and recovery</h2></div><div class="card activity-link-card"><div><b>Steps and sleep are tracked by date</b><p class="tiny muted">Log the total from your device and sleep from bedtime to wake time.</p></div><button class="btn primary small" data-nav="activity">Open activity</button></div>`;};

/* More useful meal suggestions and plan generation. */
function ftV5RecipeAllowed(r){const ex=String(state.profile.excludedFoods||'').toLowerCase().split(',').map(x=>x.trim()).filter(Boolean),text=[r.name,...(r.ingredients||[])].join(' ').toLowerCase();return dietAllowed(r.diet)&&(!r.goal||(r.goal||[]).includes(state.profile.goal))&&!ex.some(x=>text.includes(x))&&(!state.profile.maxPrepTime||!r.time||Number(r.time)<=Number(state.profile.maxPrepTime));}
const FT_V5_MEAL_SHARE={Breakfast:.25,Lunch:.35,Dinner:.30,Snacks:.10};
function ftV5Monday(){const d=new Date(state.selectedDate+'T12:00:00'),diff=d.getDay()===0?-6:1-d.getDay();d.setDate(d.getDate()+diff);return d;}
function ftV5PlanDate(i){const d=ftV5Monday();d.setDate(d.getDate()+i);return localDate(d);}
function ftV5ChooseRecipe(meal,index,targetK,targetP){let pool=allRecipes().filter(r=>ftV5RecipeAllowed(r)&&r.meal===meal);if(!pool.length)pool=allRecipes().filter(ftV5RecipeAllowed);return pool.map((r,ri)=>{const serving=clamp(targetK/Math.max(1,r.macros.kcal),.5,1.75),k=r.macros.kcal*serving,p=r.macros.protein*serving;return {r,serving,score:Math.abs(k-targetK)+Math.abs(p-targetP)*8+((ri+index)%Math.max(1,pool.length))*.01};}).sort((a,b)=>a.score-b.score)[0]||null;}
function ftV5WeeklyPlan(){const t=calcTargets(),days=[];for(let i=0;i<7;i++){const meals={};let total={kcal:0,protein:0,carbs:0,fat:0,fiber:0};FT_CORE_MEALS.forEach((m,j)=>{const share=FT_V5_MEAL_SHARE[m]||.25,choice=ftV5ChooseRecipe(m,i+j,t.calories*share,t.protein*share);if(!choice)return;meals[m]=choice;Object.keys(total).forEach(k=>total[k]+=Number(choice.r.macros[k]||0)*choice.serving);});Object.keys(total).forEach(k=>total[k]=round(total[k],1));days.push({date:ftV5PlanDate(i),meals,total});}return days;}
function ftV5SuggestionData(){const meal=['Breakfast','Lunch','Dinner','Snacks'].find(m=>!dayData().meals[m]?.length)||'Snacks',t=calcTargets(),x=totalsForDay(),share=FT_V5_MEAL_SHARE[meal]||.25,targetK=Math.min(Math.max(150,t.calories-x.kcal),t.calories*share*1.3),targetP=Math.min(Math.max(10,t.protein-x.protein),t.protein*share*1.4);let pool=allRecipes().filter(r=>ftV5RecipeAllowed(r)&&r.meal===meal);return pool.map(r=>{const serving=clamp(targetK/Math.max(1,r.macros.kcal),.5,1.5),k=r.macros.kcal*serving,p=r.macros.protein*serving;return {meal,r,serving,score:Math.abs(k-targetK)+Math.abs(p-targetP)*7};}).sort((a,b)=>a.score-b.score).slice(0,3);}
renderSuggestions=function(){const s=ftV5SuggestionData();return `<div class="suggestion-list">${s.length?s.map(({meal,r,serving})=>`<div class="card suggestion-card"><div class="suggestion-top"><div><h3>${escapeHtml(r.name)}</h3><p>${meal} · ${fmt(r.macros.kcal*serving)} kcal · ${fmt(r.macros.protein*serving,1)} g protein · ${fmt(serving,2)} serving</p></div><span class="pill">${r.diet==='nonveg'?'Non-veg':r.diet==='egg'?'Egg':'Veg'}</span></div><div class="recipe-actions"><button class="btn small outline" data-view-recipe="${r.id}">View</button><button class="btn small primary" data-v5-add-suggestion="${r.id}|${meal}|${serving}">Add to ${meal}</button></div></div>`).join(''):'<div class="audit-note">No suitable recipe matches the current diet, exclusions and preparation-time settings.</div>'}</div>`;};
renderPlans=function(){const t=calcTargets(),plan=ftV5WeeklyPlan(),days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];return `${pageHead('Adaptive plans',`Meals and portions adapt to your ${goalLabel().toLowerCase()} target`,`<button class="btn outline small" data-nav="settings">Change goal</button>`)}<div class="grid grid-2 grid-lg-4">${metricCard('Target calories',t.calories,t.tdee,'kcal')}${metricCard('Protein',t.protein,t.protein,'g')}${metricCard('Expected rate',state.profile.goal==='fat_loss'?state.profile.rate:0,Math.max(state.profile.rate,.1),'kg/wk')}${metricCard('Training',state.profile.workoutDays,4,'days')}</div><div class="section-title"><h2>Weekly meal plan</h2><small>Review the date and portions before applying</small></div><div class="grid grid-lg-2">${plan.map((p,i)=>{const dk=round(p.total.kcal-t.calories),dp=round(p.total.protein-t.protein);return `<div class="card plan-day"><div class="food-card-top"><div><h3>${days[i]}</h3><div class="plan-date">${new Date(p.date+'T12:00:00').toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'})}</div></div><button class="btn small primary" data-v5-preview-plan="${i}">Review and add</button></div><div class="plan-total"><span class="pill good">${fmt(p.total.kcal)} kcal</span><span class="pill">P ${fmt(p.total.protein)}g</span><span class="pill">C ${fmt(p.total.carbs)}g</span><span class="pill">F ${fmt(p.total.fat)}g</span></div><div class="tiny ${Math.abs(dk)<=100?'accent':'muted'}">Difference: ${dk>=0?'+':''}${dk} kcal · ${dp>=0?'+':''}${dp} g protein</div>${FT_CORE_MEALS.map(m=>{const c=p.meals[m];return `<div class="plan-target-row"><span>${m}</span><div><b>${escapeHtml(c?.r?.name||'No match')}</b>${c?`<small>${fmt(c.serving,2)} serving · ${fmt(c.r.macros.kcal*c.serving)} kcal · P ${fmt(c.r.macros.protein*c.serving,1)}g</small>`:''}</div>${c?`<button class="btn small outline" data-view-recipe="${c.r.id}">View</button>`:'<span></span>'}</div>`;}).join('')}</div>`;}).join('')}</div><div class="section-title"><h2>Weekly workout structure</h2></div><div class="card card-pad">${[...state.workoutPlan].sort((a,b)=>(a.day||7)-(b.day||7)).map(p=>`<div class="check-row"><div><div class="strong">${['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][p.day]} · ${p.name}</div><div class="tiny muted">${p.exercises.length?p.exercises.map(id=>exById(id).name).slice(0,3).join(', '):'Recovery'}</div></div><span class="pill">${p.type}</span></div>`).join('')}</div>`;};

renderExercise=function(e,d){const log=ensureSetLog(e,d),done=exerciseDone(e,log);log.mode=log.mode||ftV5DefaultMode(e);if(e.group==='Cardio')return `<div class="exercise-block"><div class="exercise-header"><button class="exercise-check ${done?'done':''}" data-ex-check="${e.id}">✓</button><div><h3>${e.name}</h3><p>${e.reps} · ${e.cue}</p></div></div><div class="cardio-log"><div class="field"><label>Duration (min)</label><input class="set-input" type="number" min="0" step="1" data-cardio-duration="${e.id}" value="${log.cardio.duration||''}"></div><div class="field"><label>Distance (km, optional)</label><input class="set-input" type="number" min="0" step="0.1" data-cardio-distance="${e.id}" value="${log.cardio.distance||''}"></div><div class="field"><label>Effort RPE 1–10</label><input class="set-input" type="number" min="1" max="10" step="1" data-cardio-rpe="${e.id}" value="${log.cardio.rpe||''}"></div><button class="btn ${done?'outline':'primary'}" data-cardio-done="${e.id}">${done?'Completed':'Mark complete'}</button></div></div>`;
 const timed=/sec|min/i.test(e.reps),mode=log.mode,loadRequired=ftV5LoadRequired(e,mode),resultLabel=timed?'Time':'Reps',prev=ftV5PreviousLog(e.id);log.sets.forEach(s=>{if(s.rir===undefined)s.rir='';});return `<div class="exercise-block"><div class="exercise-header"><button class="exercise-check ${done?'done':''}" data-ex-check="${e.id}">✓</button><div><h3>${e.name}</h3><p>Target: ${e.sets} sets · ${e.reps}</p><p>${e.cue}</p>${prev?`<div class="previous-set">Previous ${prev.date} · ${ftV5ModeLabel(prev.log.mode||ftV5DefaultMode(e))}: ${prev.log.sets.map(s=>`${s.weight?`${s.weight} kg × `:''}${s.result||'—'}`).join(' · ')}</div>`:''}</div></div><div class="exercise-mode"><div class="field"><label>How are you performing this exercise?</label><select class="select" data-v5-exercise-mode="${e.id}">${[['external','External/machine load'],['bodyweight','Bodyweight only'],['added','Bodyweight + added load'],['assisted','Assisted machine']].map(([v,l])=>`<option value="${v}" ${mode===v?'selected':''}>${l}</option>`).join('')}</select></div><span class="pill">${ftV5ModeLabel(mode)}</span></div><div class="set-table v4">${loadRequired?`<div class="set-row head"><span>Set</span><span>${ftV5LoadLabel(mode)}</span><span>${resultLabel}</span><span>RIR</span><span>Done</span></div>`:`<div class="set-row head no-load"><span>Set</span><span>${resultLabel}</span><span>RIR</span><span>Done</span></div>`}${log.sets.map((s,i)=>loadRequired?`<div class="set-row"><span class="set-label">${i+1}</span><input class="set-input" type="number" inputmode="decimal" min="0" step="0.5" data-set-weight="${e.id}|${i}" value="${escapeHtml(s.weight||'')}" placeholder="kg"><input class="set-input" inputmode="numeric" data-set-result="${e.id}|${i}" value="${escapeHtml(s.result||'')}" placeholder="${timed?'sec':'reps'}"><input class="set-input" type="number" min="0" max="5" data-set-rir="${e.id}|${i}" value="${escapeHtml(s.rir||'')}" placeholder="RIR"><button class="set-check ${s.done?'done':''}" data-v5-set-done="${e.id}|${i}">✓</button></div>`:`<div class="set-row no-load"><span class="set-label">${i+1}</span><input class="set-input" inputmode="decimal" data-set-result="${e.id}|${i}" value="${escapeHtml(s.result||'')}" placeholder="${timed?'sec':'reps'}"><input class="set-input" type="number" min="0" max="5" data-set-rir="${e.id}|${i}" value="${escapeHtml(s.rir||'')}" placeholder="RIR"><button class="set-check ${s.done?'done':''}" data-v5-set-done="${e.id}|${i}">✓</button></div>`).join('')}</div><div class="set-actions"><button class="btn small outline" data-add-set="${e.id}">Add set</button>${log.sets.length>1?`<button class="btn small outline" data-remove-set="${e.id}">Remove last</button>`:''}<button class="btn small outline" data-rest-timer="${String(e.rest||'').includes('min')?(parseInt(e.rest)||1)*60:(parseInt(e.rest)||90)}">Rest ${escapeHtml(e.rest)}</button></div></div>`;};
renderWorkout=function(){const p=workoutForDate(),d=dayData(),days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];syncWorkoutCompletion();const completed=p.exercises.filter(id=>exerciseDone(exById(id),ensureSetLog(exById(id),d))).length;return `${pageHead('Workout','Log every set with the load mode that matches the exercise',`<button class="btn outline small" data-edit-workout="1">Edit day</button>`)}<div class="tabs">${days.map((x,i)=>{const plan=state.workoutPlan.find(p=>p.day===i);return `<button class="tab ${p.day===i?'active':''}" data-workout-day-v4="${i}">${x} · ${plan?.name||'Rest'}</button>`;}).join('')}</div><div class="card exercise-card" style="margin-top:12px"><div class="food-card-top"><div><h3>${p.name}</h3><p>${p.type} · ${p.exercises.length} activities</p><div class="workout-progress-note">${completed}/${p.exercises.length} activities completed</div></div><span class="pill good">Progressive plan</span></div><div style="margin-top:10px">${p.exercises.map(id=>renderExercise(exById(id),d)).join('')||'<div class="empty">Rest, gentle walking and mobility as comfortable.</div>'}</div>${p.exercises.length?`<button class="btn ${d.workout.completed?'outline':'primary'} wide" style="margin-top:14px" data-v5-finish-workout="1">${d.workout.completed?'Workout complete':'Complete all valid sets'}</button>`:''}</div><div class="section-title"><h2>Session check-in</h2></div><div class="card card-pad session-checkin"><div class="form-grid"><div class="field"><label>Energy</label><select class="select" id="v5WorkoutEnergy"><option value="">Select</option>${['Low','Normal','High'].map(x=>`<option ${d.workout.energy===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Pain or discomfort (0–10)</label><input class="input" id="v5WorkoutPain" type="number" min="0" max="10" value="${d.workout.discomfort||0}"></div></div><div class="field"><label>Workout notes</label><textarea class="textarea" id="v5WorkoutNote" placeholder="Technique, pain, sub const ftV5OldClick=handleClick;
handleClick=function(e){
 const b=e.target.closest?.('button,[data-nav]');if(!b)return;
 if(b.dataset.v5Favorite){ftV5ToggleFavourite(b.dataset.v5Favorite);return;}
 if('v5CopyYesterday' in b.dataset){const dt=new Date(state.selectedDate+'T12:00:00');dt.setDate(dt.getDate()-1);const prev=state.diary[localDate(dt)];if(!prev){toast('No data on the previous day');return;}let n=0;MEALS.forEach(m=>{if(!dayData().meals[m].length&&prev.meals?.[m]?.length){dayData().meals[m]=deepClone(prev.meals[m]);n++;}});render();toast(n?`Copied ${n} meal sections`:'Current meal sections are not empty');return;}
 if(b.dataset.v5AddSuggestion){const [id,meal,servingRaw]=b.dataset.v5AddSuggestion.split('|'),r=allRecipes().find(x=>x.id===id),serving=Number(servingRaw)||1;if(!r)return;dayData().meals[meal].push({kind:'recipe',ref:r.id,name:r.name,serving:round(serving,2),unit:'serving',...Object.fromEntries(Object.entries(r.macros).map(([k,v])=>[k,round(v*serving,1)]))});state.recentRecipes=[id,...state.recentRecipes.filter(x=>x!==id)].slice(0,10);render();toast(`Added to ${meal}`);return;}

 if(b.dataset.v5ConfirmPlan!==undefined){ftV5ApplyPlan(Number(b.dataset.v5ConfirmPlan));return;}
 if('v5CustomWalk' in b.dataset){openModal('Add walk or session',`<div class="form-grid"><div class="field"><label>Steps</label><input class="input" id="v5WalkSteps" type="number" min="1" value="1000"></div><div class="field"><label>Source</label><select class="select" id="v5WalkSource"><option>Outdoor walk</option><option>Treadmill</option><option>Manual estimate</option><option>Other</option></select></div></div><div class="field" style="margin-top:12px"><label>Are these steps already included in the saved daily total?</label><select class="select" id="v5WalkIncluded"><option value="yes">Yes — log the session only</option><option value="no">No — add them to the daily total</option></select></div><button class="btn primary wide" style="margin-top:14px" data-v5-save-walk="1">Save session</button>`);return;}
 if('v5SaveWalk' in b.dataset){const d=dayData(),steps=Math.max(0,Number(document.getElementById('v5WalkSteps').value)||0),source=document.getElementById('v5WalkSource').value,included=document.getElementById('v5WalkIncluded').value==='yes';if(!steps){alert('Enter session steps.');return;}d.stepEntries.push({id:'walk-'+Date.now(),steps,source,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),includedInTotal:included});if(!included){d.steps=Number(d.steps||0)+steps;d.stepLogged=true;d.stepUpdatedAt=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}closeModal();render();toast(included?'Session logged without changing total':'Session added to daily total');return;}
 if(b.dataset.v5SetDone){const [id,idx]=b.dataset.v5SetDone.split('|'),ex=exById(id),log=ensureSetLog(ex),s=log.sets[Number(idx)],mode=log.mode||ftV5DefaultMode(ex),need=ftV5LoadRequired(ex,mode);if(!s.result||(need&&s.weight==='')){toast(`Enter ${need?'load and ':''}${/sec|min/i.test(ex.reps)?'time':'reps'} first`);return;}s.done=!s.done;syncWorkoutCompletion();render();return;}
 if('v5FinishWorkout' in b.dataset){const p=workoutForDate();let done=0,missing=0;p.exercises.forEach(id=>{const ex=exById(id),log=ensureSetLog(ex);if(ex.group==='Cardio'){if(log.cardio.duration){log.cardio.done=true;done++;}else missing++;return;}const need=ftV5LoadRequired(ex,log.mode||ftV5DefaultMode(ex));log.sets.forEach(s=>{if(s.result&&(!need||s.weight!=='')){s.done=true;done++;}else missing++;});});syncWorkoutCompletion();render();toast(missing?`${done} valid sets completed; ${missing} still missing`:'Workout completed');return;}
 if('v5SaveMeasure' in b.dataset){const m={date:document.getElementById('m-date').value,weight:Number(document.getElementById('m-weight').value)||0,waist:Number(document.getElementById('m-waist').value)||0,bodyFat:Number(document.getElementById('m-bodyFat').value)||0,method:document.getElementById('m-method').value,note:document.getElementById('m-note').value.trim()};if(!m.date||!m.weight){alert('Date and weight are required.');return;}state.measurements=state.measurements.filter(x=>x.date!==m.date);state.measurements.push(m);state.profile.weight=m.weight;closeModal();render();toast('Measurement saved');return;}
 const recentId=b.dataset.pickerServing?.split('|')[0]||b.dataset.confirmServing||b.dataset.directAdd||b.dataset.calcServingAdd;if(recentId)ftV5RecordRecent(recentId);
 return ftV5OldClick(e);
};

 if(e.target.dataset.v5ExerciseMode){const ex=exById(e.target.dataset.v5ExerciseMode),log=ensureSetLog(ex);log.mode=e.target.value;saveState();render();return;}

<script id="fittrack-v53-input-fix">

 }

renderPlans=function(){const t=calcTargets(),ps=plan(),days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];return `${pageHead('Adaptive plans',`Meals rotate and portions adapt to your ${goalLabel().toLowerCase()} target`,`<button class="btn outline small" data-nav="settings">Change goal</button>`)}<div class="grid grid-2 grid-lg-4">${metricCard('Target calories',t.calories,t.tdee,'kcal')}${metricCard('Protein',t.protein,t.protein,'g')}${metricCard('Expected rate',state.profile.goal==='fat_loss'?state.profile.rate:0,Math.max(state.profile.rate,.1),'kg/wk')}${metricCard('Training',state.profile.workoutDays,4,'days')}</div><div class="section-title"><h2>Weekly meal plan</h2><small>Meals rotate; review date and portions before applying</small></div><div class="grid grid-lg-2">${ps.map((p,i)=>{const dk=round(p.total.kcal-t.calories),dp=round(p.total.protein-t.protein);return `<div class="card plan-day"><div class="food-card-top"><div><h3>${days[i]}</h3><div class="plan-date">${new Date(p.date+'T12:00:00').toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'})}</div></div><button class="btn small primary" data-v5-preview-plan="${i}">Review and add</button></div><div class="plan-total"><span class="pill good">${fmt(p.total.kcal)} kcal</span><span class="pill">P ${fmt(p.total.protein)}g</span><span class="pill">C ${fmt(p.total.carbs)}g</span><span class="pill">F ${fmt(p.total.fat)}g</span></div><div class="tiny ${Math.abs(dk)<=100?'accent':'muted'}">Difference: ${dk>=0?'+':''}${dk} kcal · ${dp>=0?'+':''}${dp} g protein</div>${FT_CORE_MEALS.map(m=>{const c=p.meals[m];return `<div class="plan-target-row"><span>${m}</span><div><b>${escapeHtml(c?.r?.name||'No match')}</b>${c?`<small>${fmt(c.serving,2)} serving · ${fmt(c.r.macros.kcal*c.serving)} kcal · P ${fmt(c.r.macros.protein*c.serving,1)}g</small>`:''}</div>${c?`<button class="btn small outline" data-view-recipe="${c.r.id}">View</button>`:'<span></span>'}</div>`;}).join('')}</div>`;}).join('')}</div><div class="section-title"><h2>Weekly workout structure</h2></div><div class="card card-pad">${[...state.workoutPlan].sort((a,b)=>(a.day||7)-(b.day||7)).map(p=>`<div class="check-row"><div><div class="strong">${['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][p.day]} · ${p.name}</div><div class="tiny muted">${p.exercises.length?p.exercises.map(id=>exById(id).name).slice(0,3).join(', '):'Recovery'}</div></div><span class="pill">${p.type}</span></div>`).join('')}</div>`;};

<script id="fittrack-v57-quality-patch">
(()=>{

function avg(a){return a.reduce((s,x)=>s+Number(x.weight||0),0)/Math.max(1,a.length)}
function calibration(){
 const ms=[...state.measurements].filter(x=>Number(x.weight)>0).sort((a,b)=>a.date.localeCompare(b.date));
 if(ms.length<4)return {ready:false,reason:`Add at least ${4-ms.length} more weight measurements.`};

 openModal(`Create and add to ${meal}`,`<div class="audit-note">Enter nutrition for one normal serving. Approximate grams or ml are only used for conversion, so you do not need to weigh the item.</div><div class="v7-grid" style="margin-top:12px"><div class="field full"><label>Name</label><input class="input" id="v7-name" value="${escapeHtml(q)}"></div><div class="field full"><label>Alternative spellings</label><input class="input" id="v7-alias" placeholder="Comma separated"></div><div class="field"><label>Category</label><input class="input" id="v7-cat" value="Custom"></div><div class="field"><label>Diet type</label><select class="select" id="v7-diet"><option value="veg">Vegetarian / drink</option><option value="egg">Contains egg</option><option value="nonveg">Non-vegetarian</option></select></div><div class="field"><label>Serving name</label><input class="input" id="v7-label" value="1 serving" placeholder="1 piece, bowl, bottle"></div><div class="field"><label>Approx. grams or ml</label><input class="input" id="v7-grams" type="number" min="1" value="100"><div class="field-help">Keep 100 when unknown.</div></div><div class="field"><label>Calories per serving</label><input class="input" id="v7-kcal" type="number" min="0"></div><div class="field"><label>Protein per serving (g)</label><input class="input" id="v7-pro" type="number" min="0" step="0.1" value="0"></div><div class="field"><label>Carbs per serving (g)</label><input class="input" id="v7-carb" type="number" min="0" step="0.1" value="0"></div><div class="field"><label>Fat per serving (g)</label><input class="input" id="v7-fat" type="number" min="0" step="0.1" value="0"></div><div class="field"><label>Fibre per serving (g)</label><input class="input" id="v7-fib" type="number" min="0" step="0.1" value="0"></div><div class="field"><label>Source / brand</label><input class="input" id="v7-source" placeholder="Package label, restaurant, estimate"></div></div><button class="btn primary wide" style="margin-top:14px" data-v7-save="${escapeHtml(meal)}">Save and add to ${escapeHtml(meal)}</button>`);
 requestAnimationFrame(()=>{
  document.getElementById('v7-name')?.focus();
  const saveBtn=document.querySelector('[data-v7-save]');
  if(saveBtn)saveBtn.onclick=(ev)=>{ev.preventDefault();ev.stopPropagation();saveCustom(meal)};
 });
}
function saveCustom(meal){
 const name=document.getElementById('v7-name')?.value.trim(),g=Math.max(1,Number(document.getElementById('v7-grams')?.value)||100),k=Number(document.getElementById('v7-kcal')?.value);
 if(!name){alert('Enter a name.');return}if(!Number.isFinite(k)||k<0){alert('Enter calories for one serving.');return}
 const vals={kcal:k,protein:Math.max(0,Number(document.getElementById('v7-pro')?.value)||0),carbs:Math.max(0,Number(document.getElementById('v7-carb')?.value)||0),fat:Math.max(0,Number(document.getElementById('v7-fat')?.value)||0),fiber:Math.max(0,Number(document.getElementById('v7-fib')?.value)||0)},id='custom-'+Date.now(),label=document.getElementById('v7-label')?.value.trim()||'1 serving',z=100/g;
 const f={id,name,category:document.getElementById('v7-cat')?.value.trim()||'Custom',diet:document.getElementById('v7-diet')?.value||'veg',servingG:g,kcal:round(vals.kcal*z,2),protein:round(vals.protein*z,2),carbs:round(vals.carbs*z,2),fat:round(vals.fat*z,2),fiber:round(vals.fiber*z,2),source:document.getElementById('v7-source')?.value.trim()||'User supplied estimate',basis:'per 100 g/ml equivalent',custom:true,quality:'User supplied',aliases:(document.getElementById('v7-alias')?.value||'').split(',').map(x=>x.trim()).filter(Boolean),servings:[{key:'serving',label,grams:g}]};
 state.customFoods.push(f);dayData().meals[meal].push({kind:'food',ref:id,name,quantity:1,servingKey:'serving',display:label,grams:g,...Object.fromEntries(Object.entries(vals).map(([x,v])=>[x,round(v,1)]))});state.recentFoods=[id,...(state.recentFoods||[]).filter(x=>x!==id)].slice(0,12);saveState();closeModal();render();toast(`${name} added to ${meal}`);
}

let navHistory=[];const oldHead=pageHead;
pageHead=function(t,s,a=''){return `<div class="page-nav-row"><button class="btn outline small" data-v7-back="1" ${navHistory.length?'':'disabled'}>← Back</button><button class="btn outline small" data-v7-home="1" ${state.activePage==='dashboard'?'disabled':''}>Home</button></div>${oldHead(t,s,a)}`};
const oldClick=handleClick;
handleClick=function(e){const b=e.target.closest?.('button,[data-nav]');if(!b)return;if('v7Back' in b.dataset){state.activePage=navHistory.pop()||'dashboard';closeModal();render();scrollTo({top:0,behavior:'smooth'});return}if('v7Home' in b.dataset){if(state.activePage!=='dashboard')navHistory.push(state.activePage);state.activePage='dashboard';closeModal();render();scrollTo({top:0,behavior:'smooth'});return}if(b.dataset.v7Create){const [m,q='']=b.dataset.v7Create.split('|');openCustom(m||ftActivePickerMeal||'Other',decodeURIComponent(q));return}if(b.dataset.v7Save){saveCustom(b.dataset.v7Save);return}if(b.dataset.nav&&b.dataset.nav!=='more'&&b.dataset.nav!==state.activePage)navHistory.push(state.activePage);return oldClick(e)};
const oldRender=render;render=function(){oldRender();requestAnimationFrame(()=>{
 const i=document.getElementById('foodSearch');if(i)i.placeholder='Search omlete, omelette, beer, roti, brand...';
 const back=document.querySelector('[data-v7-back]');if(back)back.onclick=(ev)=>{ev.preventDefault();ev.stopPropagation();state.activePage=navHistory.pop()||'dashboard';closeModal();render();scrollTo({top:0,behavior:'smooth'})};
 const home=document.querySelector('[data-v7-home]');if(home)home.onclick=(ev)=>{ev.preventDefault();ev.stopPropagation();if(state.activePage!=='dashboard')navHistory.push(state.activePage);state.activePage='dashboard';closeModal();render();scrollTo({top:0,behavior:'smooth'})};
})};
render();
})();
</script>

</body></html>
