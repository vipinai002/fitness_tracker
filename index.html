<script id="fittrack-weekly-analysis">
(function(){
  'use strict';
  // Everything here is READ-ONLY: it inspects state.diary / state.measurements without
  // ever creating diary days (we never call dayData()/totalsForDay() for arbitrary dates,
  // since those auto-create entries) and never writes to state.

  function negZero(v){ return Object.is(v, -0) ? 0 : v; }
  function r1(v){ let x = Math.round((Number(v)||0) * 10) / 10; return negZero(x); }
  function r0(v){ let x = Math.round(Number(v)||0); return negZero(x); }

  // Shared percentage-change helper (Phase 4). curHas/prevHas express data presence.
  function ftWeeklyChange(cur, prev, curHas, prevHas){
    if(!curHas) return { kind:'no-current', text:'No data this week' };
    if(!prevHas) return { kind:'no-previous', text:'Not enough previous data' };
    if(prev === 0 && cur === 0) return { kind:'flat', text:'No change', value:0 };
    if(prev === 0 && cur > 0) return { kind:'new', text:'New this week' };
    let p = ((cur - prev) / Math.abs(prev)) * 100;
    let v = Math.round(p * 10) / 10;
    if(v === 0 || Object.is(v, -0)) return { kind:'flat', text:'No change', value:0 };
    const sign = v > 0 ? '+' : '';
    return { kind: v > 0 ? 'up' : 'down', value:v, text:`${sign}${v}%` };
  }

  function localKey(d){ // same scheme as the app's localDate(), avoids UTC shifting
    const z = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
    return z.toISOString().slice(0, 10);
  }

  function rangeFor(todayStr){
    const d = new Date(todayStr + 'T12:00:00');
    const off = (d.getDay() + 6) % 7;            // days since Monday (Mon=0 … Sun=6)
    const mon = new Date(d); mon.setDate(mon.getDate() - off);
    const curKeys = [], prevKeys = [];
    for(let i = 0; i <= off; i++){
      const c = new Date(mon); c.setDate(mon.getDate() + i); curKeys.push(localKey(c));
      const p = new Date(mon); p.setDate(mon.getDate() + i - 7); prevKeys.push(localKey(p));
    }
    return { off, elapsed: off + 1, curKeys, prevKeys };
  }

  function dayKcal(day){
    if(!day || !day.meals) return 0;
    let k = 0;
    for(const m in day.meals){ const a = day.meals[m]; if(Array.isArray(a)) for(const it of a) k += Number(it.kcal) || 0; }
    return k;
  }

  function collect(keys){
    let kcal = 0, protein = 0, water = 0, steps = 0, sleep = 0;
    let foodDays = 0, waterDays = 0, stepDays = 0, sleepDays = 0, workouts = 0;
    const dailyKcal = [];
    for(const key of keys){
      const day = state.diary ? state.diary[key] : undefined;   // never create
      const dk = dayKcal(day); dailyKcal.push(dk);
      if(!day){ continue; }
      let hasFood = false, p = 0;
      if(day.meals){ for(const m in day.meals){ const a = day.meals[m]; if(Array.isArray(a) && a.length){ hasFood = true; for(const it of a) p += Number(it.protein) || 0; } } }
      if(hasFood){ kcal += dk; protein += p; foodDays++; }
      const w = Number(day.water) || 0; if(w > 0){ water += w; waterDays++; }
      if(day.stepLogged || (Number(day.steps) || 0) > 0){ steps += Number(day.steps) || 0; stepDays++; }
      if(day.sleepLogged || (Number(day.sleep) || 0) > 0){ sleep += Number(day.sleep) || 0; sleepDays++; }
      if(day.workout && day.workout.completed) workouts++;
    }
    const n = keys.length || 1;
    return {
      n, dailyKcal,
      calAvg: kcal / n, proAvg: protein / n, waterAvg: water / n, stepAvg: steps / n,
      sleepAvg: sleepDays ? sleep / sleepDays : 0,
      workouts, foodDays, waterDays, stepDays, sleepDays,
    };
  }

  function weightInRange(keys){
    const set = new Set(keys);
    const ms = (state.measurements || [])
      .filter(m => m && set.has(m.date) && m.weight != null && m.weight !== '')
      .slice().sort((a, b) => a.date.localeCompare(b.date));
    if(!ms.length) return { count:0, first:null, last:null, net:0 };
    const first = Number(ms[0].weight), last = Number(ms[ms.length - 1].weight);
    return { count: ms.length, first, last, net: r1(last - first), firstDate: ms[0].date, lastDate: ms[ms.length - 1].date };
  }

  // Full read-only computation; exposed for tests.
  function ftWeekly(todayStr){
    todayStr = todayStr || (state && state.selectedDate) || localKey(new Date());
    const rg = rangeFor(todayStr);
    const cur = collect(rg.curKeys), prev = collect(rg.prevKeys);
    const t = calcTargets();
    const prof = state.profile || {};
    const calTarget = Number(t.calories) || 0;
    const proTarget = Number(t.protein) || 0;
    const waterGoal = Number(prof.waterGoal) || 0;
    const stepGoal = Number(prof.stepGoal) || 0;
    const sleepGoal = Number(prof.sleepGoal) || 0;
    const workGoal = Number(prof.workoutDays) || 0;
    const goalWeight = Number(prof.goalWeight) || 0;

    const m = {};
    m.calories = {
      current: cur.calAvg, previous: prev.calAvg, diff: r0(cur.calAvg - prev.calAvg),
      change: ftWeeklyChange(r0(cur.calAvg), r0(prev.calAvg), cur.foodDays > 0, prev.foodDays > 0),
      target: calTarget,
      closerToTarget: (cur.foodDays > 0 && prev.foodDays > 0 && calTarget > 0)
        ? (Math.abs(cur.calAvg - calTarget) < Math.abs(prev.calAvg - calTarget)) : null,
      coverage: { current: cur.foodDays, previous: prev.foodDays, of: rg.elapsed },
    };
    m.protein = {
      current: cur.proAvg, previous: prev.proAvg, diff: r0(cur.proAvg - prev.proAvg),
      change: ftWeeklyChange(r0(cur.proAvg), r0(prev.proAvg), cur.foodDays > 0, prev.foodDays > 0),
      target: proTarget,
      attainment: proTarget > 0 ? Math.min(100, Math.round(cur.proAvg / proTarget * 100)) : null,
      coverage: { current: cur.foodDays, previous: prev.foodDays, of: rg.elapsed },
    };
    m.water = {
      current: cur.waterAvg, previous: prev.waterAvg, diff: r0(cur.waterAvg - prev.waterAvg),
      change: ftWeeklyChange(r0(cur.waterAvg), r0(prev.waterAvg), cur.waterDays > 0, prev.waterDays > 0),
      goal: waterGoal,
      attainment: waterGoal > 0 ? Math.min(100, Math.round(cur.waterAvg / waterGoal * 100)) : null,
      coverage: { current: cur.waterDays, previous: prev.waterDays, of: rg.elapsed },
    };
    m.steps = {
      current: cur.stepAvg, previous: prev.stepAvg, diff: r0(cur.stepAvg - prev.stepAvg),
      change: ftWeeklyChange(r0(cur.stepAvg), r0(prev.stepAvg), cur.stepDays > 0, prev.stepDays > 0),
      goal: stepGoal,
      attainment: stepGoal > 0 ? Math.min(100, Math.round(cur.stepAvg / stepGoal * 100)) : null,
      coverage: { current: cur.stepDays, previous: prev.stepDays, of: rg.elapsed },
    };
    // Workouts are a count over the range; data is always "present" (range has days),
    // so prev=0/cur>0 reads as "New this week" and 0/0 as "No change".
    m.workouts = {
      current: cur.workouts, previous: prev.workouts, diff: cur.workouts - prev.workouts,
      change: ftWeeklyChange(cur.workouts, prev.workouts, true, true),
      goal: workGoal,
      coverage: { current: cur.workouts, previous: prev.workouts, of: rg.elapsed },
    };
    m.sleep = {
      current: cur.sleepAvg, previous: prev.sleepAvg, diff: r1(cur.sleepAvg - prev.sleepAvg),
      change: ftWeeklyChange(r1(cur.sleepAvg), r1(prev.sleepAvg), cur.sleepDays > 0, prev.sleepDays > 0),
      goal: sleepGoal,
      coverage: { current: cur.sleepDays, previous: prev.sleepDays, of: rg.elapsed },
    };
    const cw = weightInRange(rg.curKeys), pw = weightInRange(rg.prevKeys);
    let dir;
    if(cw.count < 1) dir = { text: 'No measurements this week', neutral: true };
    else if(!goalWeight) dir = { text: 'No target weight set — shown without judgement', neutral: true };
    else if(Math.abs(cw.net) < 0.05) dir = { text: 'No measured change toward your target', neutral: true };
    else if(Math.abs(cw.last - goalWeight) < Math.abs(cw.first - goalWeight)) dir = { text: 'Moving toward your target weight' };
    else if(Math.abs(cw.last - goalWeight) > Math.abs(cw.first - goalWeight)) dir = { text: 'Moving away from your target weight' };
    else dir = { text: 'Holding relative to your target', neutral: true };
    m.weight = {
      current: cw.last, previous: pw.last, first: cw.first, net: cw.net, prevNet: pw.net,
      diff: (cw.count && pw.count) ? r1(cw.net - pw.net) : null,
      hasCurrent: cw.count >= 1, hasPrevious: pw.count >= 1,
      goalWeight, direction: dir,
      coverage: { current: cw.count, previous: pw.count, of: rg.elapsed },
    };

    // Overall goal-adherence (Phase 5): mean of eligible goal-attainment scores [0,1],
    // never an average of raw percentage-changes. Direction: higher = closer to goals.
    function eligible(key){
      switch(key){
        case 'calories': return calTarget > 0 && cur.foodDays > 0 && prev.foodDays > 0
          ? [1 - Math.min(1, Math.abs(cur.calAvg - calTarget) / calTarget),
             1 - Math.min(1, Math.abs(prev.calAvg - calTarget) / calTarget)] : null;
        case 'protein': return proTarget > 0 && cur.foodDays > 0 && prev.foodDays > 0
          ? [Math.min(1, cur.proAvg / proTarget), Math.min(1, prev.proAvg / proTarget)] : null;
        case 'water': return waterGoal > 0 && cur.waterDays > 0 && prev.waterDays > 0
          ? [Math.min(1, cur.waterAvg / waterGoal), Math.min(1, prev.waterAvg / waterGoal)] : null;
        case 'steps': return stepGoal > 0 && cur.stepDays > 0 && prev.stepDays > 0
          ? [Math.min(1, cur.stepAvg / stepGoal), Math.min(1, prev.stepAvg / stepGoal)] : null;
        case 'sleep': return sleepGoal > 0 && cur.sleepDays > 0 && prev.sleepDays > 0
          ? [1 - Math.min(1, Math.abs(cur.sleepAvg - sleepGoal) / sleepGoal),
             1 - Math.min(1, Math.abs(prev.sleepAvg - sleepGoal) / sleepGoal)] : null;
        case 'workouts': {
          if(!(workGoal > 0)) return null;
          const scaled = workGoal * (rg.elapsed / 7) || 1;
          return [Math.min(1, cur.workouts / scaled), Math.min(1, prev.workouts / scaled)];
        }
      }
      return null;
    }
    const keys = ['calories','protein','water','steps','sleep','workouts'];
    let cs = 0, ps = 0, used = 0; const usedKeys = [];
    for(const k of keys){ const e = eligible(k); if(e){ cs += e[0]; ps += e[1]; used++; usedKeys.push(k); } }
    const overall = used >= 2
      ? { enough: true, current: Math.round(cs / used * 100), previous: Math.round(ps / used * 100), metrics: usedKeys }
      : { enough: false };
    if(overall.enough){ overall.diffPts = negZero(overall.current - overall.previous); }

    return {
      today: todayStr, off: rg.off, elapsed: rg.elapsed,
      curKeys: rg.curKeys, prevKeys: rg.prevKeys,
      ranges: {
        current: { start: rg.curKeys[0], end: rg.curKeys[rg.curKeys.length - 1] },
        previous: { start: rg.prevKeys[0], end: rg.prevKeys[rg.prevKeys.length - 1] },
      },
      raw: { cur, prev },
      metrics: m, overall,
    };
  }

  // ── rendering ──────────────────────────────────────────────────────────────
  const esc = (v) => (window.escapeHtml ? escapeHtml(v) : String(v == null ? '' : v));
  function fmtDate(key){ return new Date(key + 'T12:00:00').toLocaleDateString(undefined, { weekday:'short', day:'numeric', month:'short' }); }
  function dayLabel(key){ return new Date(key + 'T12:00:00').toLocaleDateString(undefined, { weekday:'short' }); }

  function pill(change){
    let arrow = '';
    if(change.kind === 'up') arrow = '<span class="wk-arrow">▲</span>';
    else if(change.kind === 'down') arrow = '<span class="wk-arrow">▼</span>';
    return `<span class="wk-pill" data-wk-change data-wk-kind="${change.kind}">${arrow}${esc(change.text)}</span>`;
  }

  function hm(diffH){
    let mins = Math.round((Number(diffH) || 0) * 60);
    if(mins === 0) return '0 min';
    const sign = mins < 0 ? '-' : '+';
    mins = Math.abs(mins);
    const h = Math.floor(mins / 60), mm = mins % 60;
    let s = sign;
    if(h) s += h + ' h';
    if(mm) s += (h ? ' ' : '') + mm + ' min';
    return s;
  }

  function metricCard(name, label, valueHtml, prevHtml, diffHtml, change, covHtml, noteHtml){
    return `<div class="card wk-card" data-wk-metric="${name}">
      <div class="wk-head"><span class="wk-label">${esc(label)}</span>${pill(change)}</div>
      <div class="wk-now" data-wk-now>${valueHtml}</div>
      <div class="wk-prev" data-wk-prev>${prevHtml}</div>
      ${diffHtml ? `<div class="wk-diff" data-wk-diff>${diffHtml}</div>` : ''}
      ${noteHtml ? `<div class="wk-note" data-wk-note>${noteHtml}</div>` : ''}
      <div class="wk-cov" data-wk-cov>${covHtml}</div>
    </div>`;
  }

  function chartHtml(data){
    const cur = data.raw.cur.dailyKcal, prev = data.raw.prev.dailyKcal;
    const max = Math.max(0, ...cur, ...prev);
    if(max <= 0 || (data.raw.cur.foodDays === 0 && data.raw.prev.foodDays === 0)){
      return `<div class="card wk-chart" data-wk-chart="empty"><div class="wk-empty">Not enough food data to chart this week yet.</div></div>`;
    }
    const cols = data.curKeys.map((key, i) => {
      const c = cur[i] || 0, p = prev[i] || 0;
      const ch = max > 0 ? Math.round(c / max * 100) : 0;
      const ph = max > 0 ? Math.round(p / max * 100) : 0;
      return `<div class="wk-col"><div class="wk-pair">
        <div class="wk-bar prev" style="height:${ph}%" title="Last week ${esc(dayLabel(data.prevKeys[i]))}: ${fmt(p)} kcal"></div>
        <div class="wk-bar cur" style="height:${ch}%" title="This week ${esc(dayLabel(key))}: ${fmt(c)} kcal"></div>
      </div><div class="wk-col-label">${esc(dayLabel(key))}</div></div>`;
    }).join('');
    return `<div class="card wk-chart" data-wk-chart="bars">
      <div class="wk-bars">${cols}</div>
      <div class="wk-legend"><span><i class="cur"></i>This week</span><span><i class="prev"></i>Last week</span><span>Daily calories (kcal), axis from 0</span></div>
    </div>`;
  }

  function buildHtml(){
    let data;
    try { data = ftWeekly(); }
    catch(e){ return ''; }
    const m = data.metrics;
    const elapsedNote = `${data.elapsed} day${data.elapsed === 1 ? '' : 's'} so far`;

    // Overall summary
    let summary;
    if(data.overall.enough){
      const dp = data.overall.diffPts;
      const dpTxt = dp === 0 ? 'No change in adherence' : `${dp > 0 ? '+' : ''}${dp} points vs last week`;
      summary = `<div class="card wk-summary" data-wk-overall="ok">
        <div class="wk-summary-top"><h3>Weekly progress compared with last week</h3>${pill({ kind: dp > 0 ? 'up' : dp < 0 ? 'down' : 'flat', text: dpTxt })}</div>
        <div class="wk-scores">
          <div class="wk-score"><span>This week</span><b data-wk-overall-current>${data.overall.current}%</b></div>
          <div class="wk-score"><span>Last week</span><b data-wk-overall-previous>${data.overall.previous}%</b></div>
        </div>
        <p>Overall goal-adherence score across ${data.overall.metrics.length} comparable goals (calories, protein, water, steps, sleep and workouts where a goal and data exist). Higher means closer to your targets; it is not an average of the raw percentage changes below.</p>
      </div>`;
    } else {
      summary = `<div class="card wk-summary" data-wk-overall="insufficient">
        <div class="wk-summary-top"><h3>Weekly progress compared with last week</h3></div>
        <p data-wk-overall-msg>Not enough data for an overall progress score. Log a few goals across both weeks to unlock it.</p>
      </div>`;
    }

    // Cards
    const cards = [];
    // Calories
    cards.push(metricCard('calories', 'Avg calories',
      m.calories.change.kind === 'no-current' ? '<small>No data this week</small>' : `${fmt(r0(m.calories.current))} <small>kcal/day</small>`,
      `Last week: ${m.calories.coverage.previous ? fmt(r0(m.calories.previous)) + ' kcal/day' : 'no data'}`,
      (m.calories.coverage.current && m.calories.coverage.previous) ? `Difference: ${m.calories.diff > 0 ? '+' : ''}${fmt(m.calories.diff)} kcal/day` : '',
      m.calories.change,
      `Food logged ${m.calories.coverage.current} of ${m.calories.coverage.of} days (prev ${m.calories.coverage.previous})`,
      m.calories.target ? `Target ${fmt(m.calories.target)} kcal${m.calories.closerToTarget === null ? '' : (m.calories.closerToTarget ? ' · closer to target than last week' : ' · farther from target than last week')}` : ''
    ));
    // Protein
    cards.push(metricCard('protein', 'Avg protein',
      m.protein.change.kind === 'no-current' ? '<small>No data this week</small>' : `${fmt(r0(m.protein.current))} <small>g/day</small>`,
      `Last week: ${m.protein.coverage.previous ? fmt(r0(m.protein.previous)) + ' g/day' : 'no data'}`,
      (m.protein.coverage.current && m.protein.coverage.previous) ? `Difference: ${m.protein.diff > 0 ? '+' : ''}${fmt(m.protein.diff)} g/day` : '',
      m.protein.change,
      `Food logged ${m.protein.coverage.current} of ${m.protein.coverage.of} days (prev ${m.protein.coverage.previous})`,
      m.protein.attainment !== null ? `${m.protein.attainment}% of ${fmt(m.protein.target)} g goal` : ''
    ));
    // Water (display in litres to match the app)
    cards.push(metricCard('water', 'Avg water',
      m.water.change.kind === 'no-current' ? '<small>No data this week</small>' : `${fmt(m.water.current / 1000, 2)} <small>L/day</small>`,
      `Last week: ${m.water.coverage.previous ? fmt(m.water.previous / 1000, 2) + ' L/day' : 'no data'}`,
      (m.water.coverage.current && m.water.coverage.previous) ? `Difference: ${m.water.diff > 0 ? '+' : ''}${fmt(m.water.diff / 1000, 2)} L/day` : '',
      m.water.change,
      `Water logged ${m.water.coverage.current} of ${m.water.coverage.of} days (prev ${m.water.coverage.previous})`,
      m.water.attainment !== null ? `${m.water.attainment}% of ${fmt(m.water.goal / 1000, 1)} L goal` : ''
    ));
    // Steps
    cards.push(metricCard('steps', 'Avg steps',
      m.steps.change.kind === 'no-current' ? '<small>No data this week</small>' : `${fmt(r0(m.steps.current))} <small>/day</small>`,
      `Last week: ${m.steps.coverage.previous ? fmt(r0(m.steps.previous)) + '/day' : 'no data'}`,
      (m.steps.coverage.current && m.steps.coverage.previous) ? `Difference: ${m.steps.diff > 0 ? '+' : ''}${fmt(m.steps.diff)}/day` : '',
      m.steps.change,
      `Steps logged ${m.steps.coverage.current} of ${m.steps.coverage.of} days (prev ${m.steps.coverage.previous})`,
      m.steps.attainment !== null ? `${m.steps.attainment}% of ${fmt(m.steps.goal)} step goal` : ''
    ));
    // Workouts
    cards.push(metricCard('workouts', 'Workouts',
      `${fmt(m.workouts.current)} <small>session${m.workouts.current === 1 ? '' : 's'}</small>`,
      `Last week: ${fmt(m.workouts.previous)} session${m.workouts.previous === 1 ? '' : 's'}`,
      `Difference: ${m.workouts.diff > 0 ? '+' : ''}${fmt(m.workouts.diff)}`,
      m.workouts.change,
      `${m.workouts.coverage.current} completed this week (prev ${m.workouts.coverage.previous})`,
      m.workouts.goal ? `Goal ${fmt(m.workouts.goal)} sessions/week` : ''
    ));
    // Sleep
    cards.push(metricCard('sleep', 'Avg sleep',
      m.sleep.change.kind === 'no-current' ? '<small>No data this week</small>' : `${fmt(m.sleep.current, 1)} <small>h/night</small>`,
      `Last week: ${m.sleep.coverage.previous ? fmt(m.sleep.previous, 1) + ' h' : 'no data'}`,
      (m.sleep.coverage.current && m.sleep.coverage.previous) ? `Difference: ${hm(m.sleep.diff)}` : '',
      m.sleep.change,
      `Sleep logged ${m.sleep.coverage.current} of ${m.sleep.coverage.of} nights (prev ${m.sleep.coverage.previous})`,
      m.sleep.goal ? `Goal ${fmt(m.sleep.goal, 1)} h` : ''
    ));
    // Weight (no percentage — net change + direction)
    let wVal, wPrev, wDiff, wChange, wNote;
    if(!m.weight.hasCurrent){
      wVal = '<small>No measurements this week</small>'; wPrev = ''; wDiff = '';
      wChange = { kind:'no-current', text:'No data this week' };
      wNote = m.weight.goalWeight ? `Target ${fmt(m.weight.goalWeight, 1)} kg` : 'No target weight set';
    } else {
      wVal = `${m.weight.net > 0 ? '+' : ''}${fmt(m.weight.net, 1)} <small>kg this week</small>`;
      wPrev = `${fmt(m.weight.first, 1)} kg → ${fmt(m.weight.current, 1)} kg`;
      wDiff = m.weight.hasPrevious ? `Last week: ${m.weight.prevNet > 0 ? '+' : ''}${fmt(m.weight.prevNet, 1)} kg net` : 'Not enough previous data';
      wChange = { kind: m.weight.direction.neutral ? 'flat' : 'flat', text: m.weight.direction.text };
      wNote = m.weight.goalWeight ? `Target ${fmt(m.weight.goalWeight, 1)} kg` : 'No target weight set';
    }
    cards.push(metricCard('weight', 'Weight trend', wVal, wPrev, wDiff, wChange,
      `Measurements ${m.weight.coverage.current} this week (prev ${m.weight.coverage.previous})`, wNote));

    return `<div class="section-title"><h2>Weekly analysis</h2><small>${esc(elapsedNote)}</small></div>
    <div class="wk-wrap" data-weekly-analysis="1">
      <div class="wk-ranges">
        <div class="wk-range-chip" data-wk-range="current"><span>This week (Mon–today)</span><b>${esc(fmtDate(data.ranges.current.start))} – ${esc(fmtDate(data.ranges.current.end))}</b></div>
        <div class="wk-range-chip" data-wk-range="previous"><span>Last week (same days)</span><b>${esc(fmtDate(data.ranges.previous.start))} – ${esc(fmtDate(data.ranges.previous.end))}</b></div>
      </div>
      ${summary}
      <div class="wk-grid">${cards.join('')}</div>
      ${chartHtml(data)}
    </div>`;
  }

  // Wrap the active global renderProgress (read-only) to inject the analysis.
  const baseProgress = renderProgress;
  renderProgress = function(){
    let html = baseProgress();
    let block;
    try { block = buildHtml(); } catch(e){ block = ''; }
    if(!block) return html;
    const marker = '<div class="section-title"><h2>Trend</h2>';
    if(html.includes(marker)) return html.replace(marker, block + marker);
    const last7 = '<div class="section-title"><h2>Last 7 days</h2>';
    if(html.includes(last7)) return html.replace(last7, block + last7);
    return html + block;
  };

  window.ftWeekly = ftWeekly;
  window.ftWeeklyChange = ftWeeklyChange;

  // If the app is already showing Progress, re-render so the section appears immediately.
  if(state && state.activePage === 'progress' && typeof render === 'function') render();
})();
</script>

<script id="ft-c7-repeat-logging">
/* Commit 7 — Recent foods, favourites, saved meals and copy-meal shortcuts.
   This is the final override layer. It reuses the active c4 picker (card markup, basket,
   id generation) exposed on window.ftC4*, and never rewrites diary history just to display
   Recent/Favourites/Saved meals. */
(function(){
'use strict';
const C7MEALS = (typeof MEALS !== 'undefined') ? MEALS : ['Breakfast','Lunch','Dinner','Snacks','Supplements','Other'];

/* ── state: additive, backward-compatible. Normalised on every render so a freshly imported
      legacy backup (which lacks these fields) is always safe before any view reads them. ── */
function c7Normalise(){
  if(!Array.isArray(state.favourites)) state.favourites = [];
  if(!Array.isArray(state.savedMeals)) state.savedMeals = [];
  if(!Array.isArray(state.recentFoods)) state.recentFoods = [];
}
c7Normalise();
const c7BaseRender = render;
render = function(){ c7Normalise(); return c7BaseRender.apply(this, arguments); };

/* ── stable identity helpers (kind:ref) ── */
function c7Kind(entry){ return entry && (entry.kind === 'supplement' ? 'supplement' : entry.kind === 'recipe' ? 'recipe' : 'food'); }
function c7Key(entry){ return (entry && entry.ref != null) ? `${c7Kind(entry)}:${entry.ref}` : null; }
function c7Parse(key){ const i = String(key).indexOf(':'); return { kind: String(key).slice(0, i), ref: String(key).slice(i + 1) }; }
function c7Resolve(kind, ref){ return kind === 'recipe' ? allRecipes().find(r => r.id === ref) : foodById(ref); }

/* ── local-date helpers (noon anchor → no UTC/DST shift) ── */
function c7PrevDate(dateStr){ const d = new Date(dateStr + 'T12:00:00'); d.setDate(d.getDate() - 1); return localDate(d); }
function c7DiaryDatesDesc(){ return Object.keys(state.diary || {}).sort().reverse(); }

/* ── PART 1: Recent — derived live from diary, deduped by stable identity ── */
function c7RecentItems(limit = 24){
  const seen = new Map();                       // key → {key,kind,ref,date,quantity,servingKey,name}
  for(const date of c7DiaryDatesDesc()){        // newest date first
    const day = state.diary[date];
    if(!day || !day.meals) continue;
    for(const meal of C7MEALS){
      const arr = day.meals[meal];
      if(!Array.isArray(arr)) continue;
      for(const entry of arr){
        const key = c7Key(entry);
        if(!key) continue;
        const prev = seen.get(key);
        // First date encountered is the most recent; within that date the latest entry wins.
        if(!prev || prev.date === date){
          seen.set(key, {
            key, kind: c7Kind(entry), ref: entry.ref, date, name: entry.name,
            quantity: entry.kind === 'recipe' ? (Number(entry.serving) || Number(entry.quantity) || 1) : (Number(entry.quantity) || 1),
            servingKey: entry.servingKey || null
          });
        }
      }
    }
  }
  return [...seen.values()]
    .sort((a, b) => a.date < b.date ? 1 : a.date > b.date ? -1 : 0)
    .map(it => ({ ...it, item: c7Resolve(it.kind, it.ref) }))
    .filter(it => it.item)                       // deleted/missing refs drop out — cannot re-log
    .slice(0, limit);
}

/* ── PART 2: Favourites — foods/supplements stored as legacy id strings (kept in sync with the
      v5 quick shelf), recipes as {kind,ref} objects. ── */
function c7IsFav(key){
  const { kind, ref } = c7Parse(key);
  return state.favourites.some(f => typeof f === 'string'
    ? (kind !== 'recipe' && f === ref)
    : (f && f.kind === kind && f.ref === ref));
}
function c7ToggleFav(key){
  const { kind, ref } = c7Parse(key);
  if(c7IsFav(key)){
    state.favourites = state.favourites.filter(f => typeof f === 'string'
      ? !(kind !== 'recipe' && f === ref)
      : !(f && f.kind === kind && f.ref === ref));
    toast('Removed from favourites');
  } else {
    state.favourites.unshift(kind === 'recipe' ? { kind, ref } : ref);
    toast('Added to favourites');
  }
  saveState();
}
function c7FavList(){
  return state.favourites.map(f => {
    if(typeof f === 'string'){ const item = foodById(f); return { kind: item ? c7Kind(item) : 'food', ref: f, item: item || null }; }
    if(!f) return null;
    return { kind: f.kind, ref: f.ref, item: c7Resolve(f.kind, f.ref) || null };
  }).filter(Boolean);
}

/* ── picker view switching ── */
function c7Meal(){ return document.getElementById('pickerMeal')?.value || window.ftC7Meal || 'Breakfast'; }
function c7SyncTabs(view){
  document.querySelectorAll('.c7-tab').forEach(t => t.setAttribute('aria-selected', String(t.dataset.c7View === view)));
}
function c7DecorateFavStars(){
  document.querySelectorAll('#pickerList .food-card[data-selection-key]').forEach(card => {
    if(card.querySelector('[data-c7-fav]')) return;
    const top = card.querySelector('.food-card-top'); if(!top) return;
    const key = card.dataset.selectionKey, on = c7IsFav(key);
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'c7-fav-btn' + (on ? ' on' : '');
    btn.dataset.c7Fav = key;
    btn.setAttribute('aria-pressed', on ? 'true' : 'false');
    btn.setAttribute('aria-label', on ? 'Remove from favourites' : 'Add to favourites');
    btn.textContent = on ? '★' : '☆';
    top.appendChild(btn);
  });
}
function c7PrefillRecent(items){
  items.forEach(it => {
    if(it.kind === 'recipe') return;
    const qtyEl = document.getElementById(`pick-${it.item.id}-qty`);
    const unitEl = document.getElementById(`pick-${it.item.id}-unit`);
    if(unitEl && it.servingKey && [...unitEl.options].some(o => o.value === it.servingKey)) unitEl.value = it.servingKey;
    if(qtyEl && Number.isFinite(Number(it.quantity)) && Number(it.quantity) > 0){
      qtyEl.value = it.quantity;
      qtyEl.dispatchEvent(new Event('input', { bubbles: true }));  // refresh preview + select-action dataset
    }
  });
}
const c7PriorRenderPicker = renderPicker;          // the active c4 renderPicker
renderPicker = function(meal){
  meal = meal || c7Meal();
  const view = window.ftC7PickerView || 'search';
  c7SyncTabs(view);
  const searchRow = document.querySelector('.picker-search-row');
  if(searchRow) searchRow.style.display = (view === 'search') ? '' : 'none';
  if(view === 'search'){ c7PriorRenderPicker(meal); c7DecorateFavStars(); return; }
  const el = document.getElementById('pickerList');
  if(!el){ c7PriorRenderPicker(meal); return; }
  if(view === 'recent'){
    const items = c7RecentItems(24);
    el.innerHTML = items.length
      ? items.map(it => it.kind === 'recipe' ? window.ftC4RecipeCard(it.item, meal) : window.ftC4FoodCard(it.item, meal)).join('')
      : '<div class="empty card">No recent items yet. Foods you log appear here for quick re-logging.</div>';
    if(items.length) c7PrefillRecent(items);
  } else if(view === 'favourites'){
    const favs = c7FavList();
    el.innerHTML = favs.length
      ? favs.map(fav => fav.item
          ? (fav.kind === 'recipe' ? window.ftC4RecipeCard(fav.item, meal) : window.ftC4FoodCard(fav.item, meal))
          : `<div class="card food-card c7-unavailable"><div class="food-card-top"><div><h3>${escapeHtml(fav.ref)}</h3><p>Unavailable from the current library</p></div><span class="result-kind">${escapeHtml(fav.kind)}</span></div><button class="btn small outline" data-c7-fav="${escapeHtml(fav.kind + ':' + fav.ref)}" style="margin-top:8px">Remove from favourites</button></div>`).join('')
      : '<div class="empty card">No favourites yet. Tap the star on any item to add it here.</div>';
  } else if(view === 'saved'){
    const meals = state.savedMeals || [];
    el.innerHTML = meals.length
      ? meals.map(sm => c7SavedCard(sm, meal)).join('')
      : '<div class="empty card">No saved meals yet. Open a populated meal in the diary and choose "Save as meal".</div>';
  }
  if(window.ftC4EnsureBasketUi) window.ftC4EnsureBasketUi();   // keep the basket / review tray visible
  c7DecorateFavStars();
};

/* ── inject the picker navigation when the picker opens ── */
const c7BaseFoodPicker = foodPicker;
foodPicker = function(meal){
  window.ftC7PickerView = 'search';
  window.ftC7Meal = meal;
  const out = c7BaseFoodPicker(meal);
  c7InjectNav(meal);
  return out;
};
function c7InjectNav(meal){
  const body = document.querySelector('.modal-body');
  const searchRow = body && body.querySelector('.picker-search-row');
  if(!body || !searchRow || body.querySelector('.c7-picker-nav')) return;
  const tabs = [
    { id: 'search', label: 'Search' },
    { id: 'recent', label: 'Recent' },
    { id: 'favourites', label: 'Favourites' },
    { id: 'saved', label: 'Saved meals' }
  ];
  const nav = document.createElement('div');
  nav.className = 'c7-picker-nav';
  nav.setAttribute('role', 'tablist');
  nav.setAttribute('aria-label', 'Picker sections');
  nav.innerHTML = tabs.map(t => `<button type="button" class="c7-tab" role="tab" data-c7-view="${t.id}" aria-selected="${t.id === 'search'}">${t.label}</button>`).join('');
  searchRow.before(nav);
}

/* ── PART 3: Saved meals ── */
function c7MakeSavedId(){ return `ftmeal-${Date.now().toString(36)}-${Math.random().toString(16).slice(2)}`; }
function c7NowStamp(){ return new Date().toISOString(); }
function c7TemplateItems(entries){
  return entries.map(e => {
    const kind = c7Kind(e);
    const t = {
      kind, ref: e.ref, name: e.name,
      quantity: kind === 'recipe' ? (Number(e.serving) || Number(e.quantity) || 1) : (Number(e.quantity) || 1),
      servingKey: e.servingKey || (kind === 'recipe' ? 'serving' : 'grams'),
      servingLabel: e.servingLabel || e.unit || 'serving',
      grams: Number(e.grams) || 0,
      kcal: Number(e.kcal) || 0, protein: Number(e.protein) || 0, carbs: Number(e.carbs) || 0, fat: Number(e.fat) || 0, fiber: Number(e.fiber) || 0
    };
    if(kind === 'supplement'){ t.doseAmount = e.doseAmount; t.doseUnit = e.doseUnit; t.activeIngredient = e.activeIngredient; t.labelDependent = !!e.labelDependent; }
    return t;
  });
}
function c7SaveMealTemplate(section, name){
  const entries = (dayData().meals[section] || []);
  if(!entries.length){ toast('Nothing to save in this section'); return; }
  const stamp = c7NowStamp();
  state.savedMeals.unshift({ id: c7MakeSavedId(), name: name || `${section} meal`, created: stamp, updated: stamp, section, items: c7TemplateItems(entries) });
  saveState(); render();
  toast(`Saved meal "${name || section + ' meal'}"`);
}
function c7SavedCard(sm, meal){
  const n = sm.items.length, kcal = sm.items.reduce((s, i) => s + (Number(i.kcal) || 0), 0);
  return `<div class="card food-card c7-saved-card" data-c7-saved-id="${escapeHtml(sm.id)}"><div class="food-card-top"><div><h3>${escapeHtml(sm.name)}</h3><p>${n} item${n === 1 ? '' : 's'} · ${fmt(kcal)} kcal · from ${escapeHtml(sm.section || 'Meal')}</p></div><span class="result-kind">Saved meal</span></div><div class="c7-saved-actions"><button class="btn primary small" data-c7-saved-load="${escapeHtml(sm.id + '|' + meal)}">Load into basket</button><button class="btn small outline" data-c7-saved-rename="${escapeHtml(sm.id)}">Rename</button><button class="btn small outline" data-c7-saved-edit="${escapeHtml(sm.id)}">Edit</button><button class="btn small danger-btn" data-c7-saved-delete="${escapeHtml(sm.id)}">Delete</button></div></div>`;
}
function c7BasketItemFromTemplate(t){
  if(t.kind === 'recipe'){
    const r = allRecipes().find(x => x.id === t.ref);
    if(!r) return null;
    const serv = Number(t.quantity) || 1;
    return { kind: 'recipe', key: `recipe:${t.ref}`, ref: t.ref, name: r.name, quantity: serv, serving: serv, servingKey: 'serving', servingLabel: serv === 1 ? 'serving' : 'servings', grams: 0, unit: 'serving',

function c7LoadSavedMeal(id, meal){

  for(const t of sm.items){

function c7CopyItemFrom(entry){

    quantity: kind === 'recipe' ? (Number(entry.serving) || Number(entry.quantity) || 1) : (Number(entry.quantity) || 1),
    servingKey: entry.servingKey || (kind === 'recipe' ? 'serving' : 'grams'),
    snapshot: { kcal: Number(entry.kcal) || 0, protein: Number(entry.protein) || 0, carbs: Number(entry.carbs) || 0, fat: Number(entry.fat) || 0, fiber: Number(entry.fiber) || 0, grams: Number(entry.grams) || 0, servingLabel: entry.servingLabel || entry.unit || 'serving', doseAmount: entry.doseAmount, doseUnit: entry.doseUnit, activeIngredient: entry.activeIngredient, labelDependent: entry.labelDependent }
  };

function c7RecalcCopyItem(it){
  const qty = Number(it.quantity);
  if(it.kind === 'recipe'){
    const r = allRecipes().find(x => x.id === it.ref);
    it.available = !!r;
    if(r){ const s = (Number.isFinite(qty) && qty > 0) ? qty : 1;
      it.servingLabel = s === 1 ? 'serving' : 'servings'; it.grams = 0; it.unit = 'serving';
      it.kcal = round(Number(r.macros?.kcal || 0) * s, 1); it.protein = round(Number(r.macros?.protein || 0) * s, 1);
      it.carbs = round(Number(r.macros?.carbs || 0) * s, 1); it.fat = round(Number(r.macros?.fat || 0) * s, 1); it.fiber = round(Number(r.macros?.fiber || 0) * s, 1);
    } else { Object.assign(it, it.snapshot); it.unit = 'serving'; }
    return;
  }
  const f = foodById(it.ref);
  it.available = !!f;
  if(f){
    const s = window.ftC4ServingByKey ? window.ftC4ServingByKey(f, it.servingKey) : window.ftServingByKey(f, it.servingKey);
    it.servingKey = s.key;
    const g = (Number.isFinite(qty) && qty > 0 ? qty : 0) * Number(s.grams || 0), m = macroForFood(f, g);
    it.grams = round(g, 1); it.servingLabel = window.ftQtyLabel ? window.ftQtyLabel(qty, s) : s.label; it.unit = s.key === 'grams' ? 'g' : s.label;

    it.doseAmount = f.doseAmount; it.doseUnit = f.doseUnit; it.activeIngredient = f.activeIngredient; it.labelDependent = !!f.labelDependent;

    Object.assign(it, { grams: it.snapshot.grams, servingLabel: it.snapshot.servingLabel, unit: it.snapshot.servingLabel,

      doseAmount: it.snapshot.doseAmount, doseUnit: it.snapshot.doseUnit, activeIngredient: it.snapshot.activeIngredient, labelDependent: it.snapshot.labelDependent });
  }
}

function c7On(selector, fn){
  const handler = e => {
    const t = e.target && (e.target.nodeType === 1 ? e.target : e.target.parentElement);
    const b = t && t.closest ? t.closest(selector) : null;
    if(!b) return;
    e.preventDefault(); e.stopImmediatePropagation();
    fn(b, e);
  };
  document.addEventListener('click', handler, true);
}

   #pickerSearch, whose change event re-renders the picker and would detach the star before the

   pointerdown; the trailing "ghost" click of that same tap is suppressed (it lands within 700ms of
   the pointerdown). Keyboard activation (Enter/Space → click only, no pointerdown) still toggles. */

document.addEventListener('click', e => { const b = c7FavTarget(e); if(!b) return; e.preventDefault(); e.stopImmediatePropagation(); if(c7FavNow() - c7FavPdTime < 700) return; c7FavToggleFrom(b); }, true);

  'Importing this backup will replace all current FitTrack data.\n\n' +
  'A recovery copy of your current data will be saved before import.\n\n' +
  'Continue?';
var FT_RESTORE_CONFIRM =
  'Restore the data saved before the last successful import?\n\n' +
  'This will replace the currently loaded data.';

function ftIsPlainObject(v){
  return v !== null && typeof v === 'object' && Object.prototype.toString.call(v) === '[object Object]';
}

/* Recognized top-level FitTrack fields and their required basic types. Any present
   field must match; unknown fields are preserved for forward compatibility. */
var FT_FIELD_TYPES = {
  profile:'object', settings:'object', diary:'object',
  measurements:'array', customFoods:'array', customRecipes:'array',
  workoutPlan:'array', favourites:'array', savedMeals:'array', recentFoods:'array',
  selectedDate:'string', activePage:'string'
};
/* Fields strong enough to identify a value as a FitTrack backup. */
var FT_SIGNATURE_FIELDS = ['profile','diary','measurements','customFoods','customRecipes','workoutPlan','settings','favourites','savedMeals','recentFoods'];

function ftTypeOk(value, type){
  if(type === 'array') return Array.isArray(value);
  if(type === 'object') return ftIsPlainObject(value);
  if(type === 'string') return typeof value === 'string';
  return true;
}

/* Validate a parsed backup value WITHOUT mutating global state or localStorage.
   Returns { valid, candidateState, errors, warnings, detectedVersion }. */
function ftValidateBackup(parsed){
  var result = { valid:false, candidateState:null, errors:[], warnings:[], detectedVersion:null };
  if(!ftIsPlainObject(parsed)){                       // rejects null, arrays, primitives
    result.errors.push('Not a FitTrack backup object.');
    return result;
  }
  var keys = Object.keys(parsed);
  var recognized = keys.filter(function(k){ return FT_SIGNATURE_FIELDS.indexOf(k) !== -1; });
  if(recognized.length < 3){                          // rejects {}, unknown-only objects
    result.errors.push('File does not contain enough recognizable FitTrack data.');
    return result;
  }
  Object.keys(FT_FIELD_TYPES).forEach(function(k){    // basic-type check for present fields
    if(parsed[k] !== undefined && !ftTypeOk(parsed[k], FT_FIELD_TYPES[k])){
      result.errors.push('Field "' + k + '" has an unexpected type.');
    }
  });
  if(ftIsPlainObject(parsed.diary)){                  // light corruption check on diary days
    var corrupt = Object.keys(parsed.diary).some(function(d){ return !ftIsPlainObject(parsed.diary[d]); });
    if(corrupt) result.errors.push('Diary contains corrupted day entries.');
  }
  if(result.errors.length) return result;
  if(recognized.indexOf('favourites') === -1 || recognized.indexOf('savedMeals') === -1){
    result.warnings.push('Older backup: newer optional fields are missing and will be created empty.');
  }
  result.detectedVersion = (typeof parsed.appVersion === 'string' && parsed.appVersion) ||
    (parsed.savedMeals !== undefined ? 'current' : 'legacy');
  /* Build a normalized, fully isolated candidate (mirrors loadState + c7Normalise) so a
     legacy backup is immediately safe; unknown fields survive via the spread. */
  var candidate = Object.assign({}, initialState(), parsed);
  candidate.profile = Object.assign({}, DEFAULT_PROFILE, (parsed.profile || {}));
  candidate.workoutPlan = Array.isArray(parsed.workoutPlan) ? parsed.workoutPlan : deepClone(DEFAULT_WORKOUT_PLAN);
  if(!ftIsPlainObject(candidate.settings)) candidate.settings = { showSources:true };
  if(!Array.isArray(candidate.favourites)) candidate.favourites = [];
  if(!Array.isArray(candidate.savedMeals)) candidate.savedMeals = [];
  if(!Array.isArray(candidate.recentFoods)) candidate.recentFoods = [];
  result.candidateState = deepClone(candidate);       // isolated from parsed and from live state
  result.valid = true;
  return result;
}
window.ftValidateBackup = ftValidateBackup;

/* ── localStorage helpers (test hooks __ftFailSave / __ftFailRecoveryWrite simulate failures) ── */
function ftReadMain(){ try{ return localStorage.getItem(APP_KEY); }catch(e){ return null; } }
function ftWriteMain(str){
  if(window.__ftFailSave) return false;
  try{ localStorage.setItem(APP_KEY, str); return true; }catch(e){ return false; }
}
function ftRestoreMain(str){
  try{ if(str === null) localStorage.removeItem(APP_KEY); else localStorage.setItem(APP_KEY, str); }catch(e){}
}

/* Read + validate the recovery record. Returns the record or null. */
function ftGetRecovery(){
  var raw;
  try{ raw = localStorage.getItem(FT_RECOVERY_KEY); }catch(e){ return null; }
  if(!raw) return null;
  var rec;
  try{ rec = JSON.parse(raw); }catch(e){ return null; }
  if(!ftIsPlainObject(rec) || !rec.state || !ftValidateBackup(rec.state).valid) return null;
  return rec;
}
window.ftGetRecovery = ftGetRecovery;

/* Write the pre-import recovery copy. Returns true only when written AND verifiable.
   On any failure the previous recovery value (if any) is left untouched. */
function ftWriteRecovery(currentState){
  if(window.__ftFailRecoveryWrite) return false;
  var record = {
    createdAt: new Date().toISOString(),
    source: 'pre-import',
    appStorageKey: APP_KEY,
    state: deepClone(currentState)
  };
  var prev = null;
  try{ prev = localStorage.getItem(FT_RECOVERY_KEY); }catch(e){}
  try{ localStorage.setItem(FT_RECOVERY_KEY, JSON.stringify(record)); }
  catch(e){ return false; }                           // quota/failure: previous value remains
  if(!ftGetRecovery()){                               // verify it parses + its state validates
    try{ if(prev === null) localStorage.removeItem(FT_RECOVERY_KEY); else localStorage.setItem(FT_RECOVERY_KEY, prev); }catch(e){}
    return false;
  }
  return true;
}

/* Atomically replace global state with `candidate`, persisting + verifying. On any failure the
   original in-memory state and main localStorage string are restored. Returns true on success. */
function ftApplyState(candidate){
  var originalState = state;
  var originalMain = ftReadMain();
  var nextState = deepClone(candidate);
  state = nextState;
  if(!ftWriteMain(JSON.stringify(nextState))){
    state = originalState; ftRestoreMain(originalMain); return false;
  }
  var rb = ftReadMain();                              // verify the stored state reads back
  try{ if(!rb || !ftIsPlainObject(JSON.parse(rb))) throw new Error('unreadable'); }
  catch(e){ state = originalState; ftRestoreMain(originalMain); return false; }
  try{ render(); }
  catch(e){ state = originalState; ftRestoreMain(originalMain); try{ render(); }catch(_e){} return false; }
  if(window.ftApplyTheme && state.settings) window.ftApplyTheme(state.settings.theme);
  return true;
}

function ftResetInput(input){ try{ if(input) input.value=''; }catch(e){} }

/* Active import handler (delegated from the page-level change listener). */
function ftHandleJsonImport(input){
  var file = input && input.files && input.files[0];
  if(!file){ ftResetInput(input); return; }
  var reader = new FileReader();
  reader.onerror = function(){
    alert('Import failed: the selected file could not be read.');
    ftResetInput(input);
  };
  reader.onload = function(){
    var parsed;
    try{ parsed = JSON.parse(reader.result); }
    catch(e){
      alert('Import failed: this file is not valid JSON, so nothing was changed.');
      ftResetInput(input); return;
    }
    var v = ftValidateBackup(parsed);
    if(!v.valid){
      alert('Import failed: this file does not look like a FitTrack backup, so nothing was changed.');
      ftResetInput(input); return;
    }
    if(!confirm(FT_IMPORT_CONFIRM)){                  // cancel: no recovery write, no state change
      toast('Import cancelled');
      ftResetInput(input); return;
    }
    if(!ftWriteRecovery(state)){                      // abort if the recovery copy cannot be saved
      alert('Import stopped: a recovery copy of your current data could not be saved, so nothing was changed.');
      ftResetInput(input); return;
    }
    if(ftApplyState(v.candidateState)){
      toast('Backup imported');
    } else {
      alert('Import failed. Your original data has been restored.');
    }
    ftResetInput(input);
  };
  reader.readAsText(file);
}
window.ftHandleJsonImport = ftHandleJsonImport;

/* Restore the data saved before the last successful import. Keeps the recovery copy afterward. */
function ftRestorePreImport(){
  var rec = ftGetRecovery();
  if(!rec){
    alert('The recovery backup could not be read, so your current data was kept.');
    render(); return;
  }
  if(!confirm(FT_RESTORE_CONFIRM)) return;            // cancel: current state untouched
  var v = ftValidateBackup(rec.state);
  if(!v.valid){
    alert('The recovery backup is invalid, so your current data was kept.');
    return;
  }
  if(ftApplyState(v.candidateState)){
    toast('Pre-import data restored');
  } else {
    alert('Restore failed. Your current data has been kept.');
  }
}
window.ftRestorePreImport = ftRestorePreImport;

function ftClearRecovery(){
  if(!confirm('Delete the saved pre-import recovery copy? This cannot be undone.')) return;
  try{ localStorage.removeItem(FT_RECOVERY_KEY); }catch(e){}
  toast('Recovery backup cleared');
  render();
}
window.ftClearRecovery = ftClearRecovery;

/* Settings: show the restore action + timestamp only when a valid recovery backup exists. */
var ftPrevRenderSettings = renderSettings;
renderSettings = function(){
  var html = ftPrevRenderSettings();
  var rec = ftGetRecovery();
  if(rec){
    var when = rec.createdAt, nice = when;
    try{ nice = new Date(when).toLocaleString(); }catch(e){}
    html += '<div class="section-title"><h2>Recovery backup</h2></div>' +
      '<div class="card card-pad">' +
      '<div class="tiny muted" id="ftRecoveryStamp" data-recovery-at="' + escapeHtml(when) + '">A recovery copy of the data from before your last import was saved on ' + escapeHtml(nice) + '.</div>' +
      '<div class="grid grid-2" style="margin-top:12px">' +
      '<button class="btn primary" data-ft-restore-import="1">Restore pre-import backup</button>' +
      '<button class="btn danger-btn" data-ft-clear-recovery="1">Delete recovery backup</button>' +
      '</div></div>';
  }
  return html;
};

document.addEventListener('click', function(e){
  var b = e.target && e.target.closest && e.target.closest('button');
  if(!b || !b.dataset) return;
  if(b.dataset.ftRestoreImport){ ftRestorePreImport(); return; }
  if(b.dataset.ftClearRecovery){ ftClearRecovery(); return; }
});

render();
})();
</script>
</body></html>
